# 创意喵 API 简表
# 只记录请求入参和成功响应 data 结构；错误和异常统一处理。

[meta]
openapi = "3.0.3"
title = "创意喵平台 API"
version = "1.0.0"
base_url = "http://localhost:8080/api/v1"
response_wrapper = "{ code: number, message: string, data: T }"
output_scope = "endpoint.output 只写 data 的结构，不重复 code/message 外壳。"
error_policy = "错误响应统一使用 code/message/data，不在每个接口重复记录；认证、权限、参数、业务错误由全局中间件或统一响应处理。"

# 约定：! 表示必填，? 表示可选；auth = public | bearer | admin；output 为成功响应的 data。

