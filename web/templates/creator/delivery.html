{{ define "creator/delivery.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交付管理 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link href="/static/css/custom.css" rel="stylesheet">
  <link href="/static/css/ui-enhancements.css" rel="stylesheet">
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <style>
    #drop-zone { cursor: pointer; min-height: 150px; transition: all 0.3s; }
    #drop-zone.drag-over { background: var(--color-primary-light) !important; border-color: var(--color-primary) !important; }
    .preview-item img { width: 100%; height: 150px; object-fit: cover; border-radius: var(--radius-sm); }
  </style>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">交付管理</h1>
        <p class="page-subtitle">提交作品并追踪交付状态</p>
      </div>

      <!-- 待交付任务 -->
      <div class="card mb-4 animate-fade-in-up">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">待交付任务</h5>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadData()">刷新</button>
        </div>
        <div class="card-body">
          <div id="pending-delivery-list">
            <div class="text-center py-5 text-muted">
              <div class="spinner-paw mb-2">
                <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
                  <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </div>
              <p class="small mb-0">加载中...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 交付历史 -->
      <div class="card animate-fade-in-up stagger-2">
        <div class="card-header d-flex align-items-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <h5 class="mb-0">交付历史</h5>
        </div>
        <div class="card-body">
          <div id="delivery-history-list">
            <div class="text-center py-5 text-muted">
              <div class="spinner-paw mb-3">
                <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
                  <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </div>
              <p class="small mb-0">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 交付 Modal -->
  <div class="modal fade" id="deliveryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">提交交付</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="delivery-claim-id">
          <div class="mb-3">
            <label for="delivery-content" class="form-label">交付内容描述</label>
            <textarea class="form-control" id="delivery-content" rows="5" placeholder="请详细描述您的交付内容，包括完成情况、亮点说明等"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">上传作品文件</label>
            <div id="drop-zone" class="border border-2 border-dashed rounded p-4 text-center bg-secondary">
              <div>
                <div class="mb-2" style="font-size: 48px;">📁</div>
                <p class="mb-1 fw-bold">点击或拖拽文件到此处上传</p>
                <small class="text-muted">支持图片和视频文件</small>
              </div>
            </div>
            <input type="file" id="file-input" class="d-none" accept="image/*,video/*" multiple>
          </div>
          <div id="file-preview" class="mb-3"></div>
          <div class="alert alert-primary mb-0">
            <strong>提示：</strong> 交付后需等待商家在48小时内验收，超时将自动通过验收。
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="submitDelivery()">提交交付</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .spinner-paw { display: flex; justify-content: center; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script defer src="/static/js/upload.js"></script>
  <script>
    requireAuth();

    let uploadedFiles = [];
    const deliveryModal = new bootstrap.Modal(document.getElementById('deliveryModal'));

    function loadData() {
      loadPendingDeliveries();
      loadDeliveryHistory();
    }

    function loadPendingDeliveries() {
      apiRequest('/creator/claims?status=claimed', 'GET')
        .then(data => {
          const container = document.getElementById('pending-delivery-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(claim => `
              <div class="card mb-3">
                <div class="card-body">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <h5>${escapeHtml(claim.task_title || '任务')}</h5>
                      <p class="text-muted mb-2">${escapeHtml(claim.task_description || '')}</p>
                      <div class="small text-muted">
                        <span>单价: ¥${claim.task_price}</span>
                        <span class="ms-3">截止: ${formatDate(claim.task_deadline)}</span>
                      </div>
                    </div>
                    <button class="btn btn-primary" onclick="openDeliveryModal(${claim.id})">提交交付</button>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="text-center py-5 text-muted">暂无待交付任务</div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('pending-delivery-list').innerHTML = '<div class="text-center py-5 text-danger">加载失败</div>';
        });
    }

    function loadDeliveryHistory() {
      apiRequest('/submissions', 'GET')
        .then(data => {
          const container = document.getElementById('delivery-history-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(sub => `
              <div class="card mb-3">
                <div class="card-body">
                  <div class="d-flex justify-content-between align-items-start">
                    <div>
                      <h6>${escapeHtml(sub.task_title || '任务')}</h6>
                      <p class="text-muted small mb-2">${escapeHtml(sub.content || '')}</p>
                      <div class="small text-muted">提交时间: ${formatDate(sub.created_at)}</div>
                    </div>
                    <span class="badge bg-${getStatusColor(sub.status)}">${getStatusText(sub.status)}</span>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="text-center py-5 text-muted">暂无交付历史</div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('delivery-history-list').innerHTML = '<div class="text-center py-5 text-danger">加载失败</div>';
        });
    }

    function openDeliveryModal(claimId) {
      document.getElementById('delivery-claim-id').value = claimId;
      document.getElementById('delivery-content').value = '';
      document.getElementById('file-preview').innerHTML = '';
      uploadedFiles = [];
      deliveryModal.show();
    }

    function submitDelivery() {
      const claimId = document.getElementById('delivery-claim-id').value;
      const content = document.getElementById('delivery-content').value.trim();

      if (!content) {
        showError('请填写交付内容描述');
        return;
      }

      const submissionData = {
        claim_id: parseInt(claimId),
        content: content,
        file_urls: ensureArray(uploadedFiles).map(f => f.url).join(',')
      };

      apiRequest('/submissions', 'POST', submissionData)
        .then(data => {
          if (data.code === 0) {
            showSuccess('交付提交成功');
            deliveryModal.hide();
            loadData();
          } else {
            showError(data.message || '提交失败');
          }
        })
        .catch(err => {
          showError('提交失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = { 'pending': 'warning', 'approved': 'success', 'rejected': 'danger' };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待审核', 'approved': '已通过', 'rejected': '已拒绝' };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 文件上传
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', handleFiles);

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles({ target: { files: e.dataTransfer.files } });
    });

    function handleFiles(e) {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        uploadFile(file).then(url => {
          uploadedFiles.push({ name: file.name, url: url });
          renderFilePreview();
        }).catch(err => {
          showError('文件上传失败: ' + file.name);
        });
      });
    }

    function uploadFile(file) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append('file', file);

        fetch('/api/v1/upload', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
          body: formData
        })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) resolve(data.data.url);
          else reject(data.message);
        })
        .catch(reject);
      });
    }

    function renderFilePreview() {
      const container = document.getElementById('file-preview');
      container.innerHTML = ensureArray(uploadedFiles).map((file, idx) => `
        <div class="d-flex align-items-center justify-content-between p-2 border rounded mb-2">
          <span class="small">${escapeHtml(file.name)}</span>
          <button class="btn btn-sm btn-outline-danger" onclick="removeFile(${idx})">删除</button>
        </div>
      `).join('');
    }

    function removeFile(idx) {
      uploadedFiles.splice(idx, 1);
      renderFilePreview();
    }

    loadData();
  </script>
</body>
</html>
{{ end }}
