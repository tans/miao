{{ define "delivery.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交付管理 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { background-color: white; border-radius: 8px; padding: 1rem; }
    .sidebar .list-group-item { border: none; border-radius: 6px; margin-bottom: 0.25rem; }
    .sidebar .list-group-item.active { background-color: #0d6efd; color: white; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; }
    #drop-zone { cursor: pointer; min-height: 150px; transition: all 0.3s; }
    #drop-zone.drag-over { background: #e7f3ff !important; border-color: #0d6efd !important; }
    .preview-item img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
    .urgent-card { border-left: 4px solid #dc3545; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="sidebar">
          <div class="list-group">
            <a href="/creator/dashboard.html" class="list-group-item list-group-item-action">工作台</a>
            <a href="/creator/task_hall.html" class="list-group-item list-group-item-action">任务大厅</a>
            <a href="/creator/claim_list.html" class="list-group-item list-group-item-action">我的认领</a>
            <a href="/creator/my_submissions.html" class="list-group-item list-group-item-action">我的交付</a>
            <a href="/creator/delivery.html" class="list-group-item list-group-item-action active">交付管理</a>
            <a href="/creator/wallet.html" class="list-group-item list-group-item-action">我的钱包</a>
            <a href="/creator/transactions.html" class="list-group-item list-group-item-action">收益明细</a>
          </div>
        </div>
      </div>

      <div class="col-md-10">
        <div class="content-area mb-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 text-warning">⏰ 待交付任务</h4>
            <button class="btn btn-sm btn-outline-primary" onclick="loadData()">
              <i class="bi bi-arrow-clockwise"></i> 刷新
            </button>
          </div>
          <div id="pending-delivery-list">
            <div class="text-center py-5 text-muted">
              <div class="spinner-border" role="status"></div>
              <p class="mt-2">加载中...</p>
            </div>
          </div>
        </div>

        <div class="content-area">
          <h4 class="mb-4">📋 交付历史</h4>
          <div id="delivery-history-list">
            <div class="text-center py-5 text-muted">
              <div class="spinner-border" role="status"></div>
              <p class="mt-2">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 交付 Modal -->
  <div class="modal fade" id="deliveryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title">提交交付</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="delivery-claim-id">
          <div class="mb-3">
            <label for="delivery-content" class="form-label">交付内容描述 <span class="text-danger">*</span></label>
            <textarea class="form-control" id="delivery-content" rows="5" placeholder="请详细描述您的交付内容，包括完成情况、亮点说明等..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">上传作品文件</label>
            <div id="drop-zone" class="border border-2 border-dashed rounded p-4 text-center" style="background: #f8f9fa;">
              <div>
                <div class="mb-2" style="font-size: 48px;">📁</div>
                <p class="mb-1 fw-bold">点击或拖拽文件到此处上传</p>
                <small class="text-muted">支持 JPG、PNG、GIF、WEBP 格式，单个文件不超过 5MB</small>
              </div>
            </div>
            <input type="file" id="file-input" class="d-none" accept="image/*" multiple>
          </div>
          <div id="file-preview" class="mb-3"></div>
          <div class="alert alert-info mb-0">
            <strong>💡 提示：</strong> 交付后需等待商家在48小时内验收，超时将自动通过验收。
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-success" onclick="submitDelivery()">
            <i class="bi bi-check-circle"></i> 确认交付
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 详情 Modal -->
  <div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">交付详情</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="detail-modal-content">
          <div class="text-center py-4">加载中...</div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/upload.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
    const claimStatusMap = {
      0: { label: '已认领', class: 'bg-light text-dark' },
      1: { label: '已提交', class: 'bg-info text-white' },
      2: { label: '已验收', class: 'bg-success text-white' },
      3: { label: '已取消', class: 'bg-secondary text-white' },
      4: { label: '超时', class: 'bg-warning text-dark' },
      5: { label: '已退回', class: 'bg-danger text-white' }
    };

    let countdownInterval;
    let fileUploader = null;

    document.addEventListener('DOMContentLoaded', function() {
      const role = localStorage.getItem('current_role') || localStorage.getItem('role');
      if (role !== 'creator') {
        showError('无权访问此页面');
        setTimeout(() => window.location.href = '/auth/login.html', 1500);
        return;
      }

      // 初始化文件上传器
      if (typeof initFileUploader === 'function') {
        fileUploader = initFileUploader({
          inputId: 'file-input',
          previewId: 'file-preview',
          dropZoneId: 'drop-zone',
          maxSize: 5 * 1024 * 1024,
          allowedTypes: ['image/jpeg', 'image/png', 'image/gif', 'image/webp'],
          multiple: true
        });
      }

      loadData();
    });

    function loadData() {
      Promise.all([
        apiRequest('/creator/claims?status=0', 'GET'),
        apiRequest('/creator/claims?status=1', 'GET')
      ])
        .then(([pendingData, historyData]) => {
          if (pendingData.code === 0) {
            renderPendingDelivery(pendingData.data || []);
          }
          if (historyData.code === 0) {
            renderDeliveryHistory(historyData.data || []);
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderPendingDelivery(claims) {
      const container = document.getElementById('pending-delivery-list');
      if (claims.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">暂无待交付任务</div>';
        return;
      }

      container.innerHTML = claims.map(claim => {
        const deadline = claim.expires_at || addHours(new Date(claim.created_at), 24);
        const countdown = getCountdown(deadline);
        const isUrgent = new Date(deadline) - new Date() < 2 * 60 * 60 * 1000;

        return `
          <div class="card mb-3 ${isUrgent ? 'urgent-card' : ''}">
            <div class="card-body">
              <div class="row align-items-center">
                <div class="col-md-8">
                  <h5 class="mb-2">任务 #${claim.task_id}</h5>
                  <div class="d-flex gap-3 mb-2">
                    <span class="badge bg-primary">单价: ¥${(claim.reward || 0).toFixed(2)}</span>
                    <span class="text-muted small">认领时间: ${new Date(claim.created_at).toLocaleString('zh-CN')}</span>
                  </div>
                  ${claim.content ? `<p class="text-muted mb-0">${escapeHtml(claim.content).substring(0, 100)}...</p>` : ''}
                </div>
                <div class="col-md-4 text-end">
                  <div class="mb-2">
                    <span class="badge ${isUrgent ? 'bg-danger' : 'bg-warning text-dark'}">剩余时间</span>
                  </div>
                  <h4 class="${isUrgent ? 'text-danger' : 'text-warning'} countdown mb-3" data-deadline="${deadline}">
                    ${countdown}
                  </h4>
                  <button class="btn btn-success" onclick="openDeliveryModal(${claim.id})">
                    <i class="bi bi-upload"></i> 立即交付
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      startCountdown();
    }

    function renderDeliveryHistory(claims) {
      const container = document.getElementById('delivery-history-list');
      if (claims.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">暂无交付记录</div>';
        return;
      }

      container.innerHTML = `
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>任务ID</th>
                <th>交付时间</th>
                <th>交付内容</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${claims.map(claim => {
                const status = claimStatusMap[claim.status] || claimStatusMap[0];
                return `
                  <tr>
                    <td>#${claim.task_id}</td>
                    <td>${claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-'}</td>
                    <td>${escapeHtml(claim.content || '').substring(0, 40)}...</td>
                    <td><span class="badge ${status.class}">${status.label}</span></td>
                    <td>
                      <button class="btn btn-sm btn-outline-primary" onclick="viewDetail(${claim.id})">
                        <i class="bi bi-eye"></i> 查看
                      </button>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function startCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        document.querySelectorAll('.countdown').forEach(el => {
          const deadline = el.dataset.deadline;
          el.textContent = getCountdown(deadline);
        });
      }, 1000);
    }

    function getCountdown(dateStr) {
      const deadline = new Date(dateStr);
      const now = new Date();
      const diff = deadline - now;

      if (diff <= 0) return '已超时';

      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      if (hours > 24) {
        const days = Math.floor(hours / 24);
        return `${days}天${hours % 24}小时`;
      }
      return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function addHours(date, hours) {
      return new Date(date.getTime() + hours * 60 * 60 * 1000);
    }

    function openDeliveryModal(claimId) {
      document.getElementById('delivery-claim-id').value = claimId;
      document.getElementById('delivery-content').value = '';
      if (fileUploader) {
        fileUploader.clear();
      }
      new bootstrap.Modal(document.getElementById('deliveryModal')).show();
    }

    async function submitDelivery() {
      const claimId = document.getElementById('delivery-claim-id').value;
      const content = document.getElementById('delivery-content').value.trim();

      if (!content) {
        showError('请输入交付内容描述');
        return;
      }

      const files = fileUploader ? fileUploader.getFiles() : [];
      if (files.length === 0) {
        if (!confirm('未上传作品文件，确定要提交吗？')) {
          return;
        }
      }

      try {
        showLoading('提交中...');

        let fileUrls = [];
        if (files.length > 0 && fileUploader.uploadFiles) {
          const uploadResult = await fileUploader.uploadFiles('/api/v1/upload', {
            claim_id: claimId,
            type: 'delivery'
          });
          if (uploadResult && uploadResult.urls) {
            fileUrls = uploadResult.urls;
          }
        }

        const deliveryData = {
          content: content,
          file_urls: fileUrls
        };

        apiRequest('/creator/claim/' + claimId + '/submit', 'PUT', deliveryData)
          .then(data => {
            hideLoading();
            if (data.code === 0) {
              showSuccess('交付成功');
              bootstrap.Modal.getInstance(document.getElementById('deliveryModal')).hide();
              loadData();
            } else {
              showError(data.message || '交付失败');
            }
          })
          .catch(err => {
            hideLoading();
            showError('提交失败');
            console.error(err);
          });
      } catch (error) {
        hideLoading();
        showError('提交失败，请稍后重试');
        console.error(error);
      }
    }

    function viewDetail(claimId) {
      apiRequest('/creator/claim/' + claimId, 'GET')
        .then(data => {
          if (data.code === 0) {
            const claim = data.data;
            const status = claimStatusMap[claim.status] || claimStatusMap[0];

            document.getElementById('detail-modal-content').innerHTML = `
              <div class="row">
                <div class="col-md-8">
                  <h5 class="mb-3">任务 #${claim.task_id}</h5>
                  <hr>
                  <h6>交付内容：</h6>
                  <p class="text-muted">${escapeHtml(claim.content || '-')}</p>
                  ${claim.review_comment ? `
                    <hr>
                    <h6>商家回复：</h6>
                    <div class="alert alert-info">${escapeHtml(claim.review_comment)}</div>
                  ` : ''}
                </div>
                <div class="col-md-4">
                  <div class="card bg-light">
                    <div class="card-body">
                      <p><strong>状态：</strong><br><span class="badge ${status.class}">${status.label}</span></p>
                      <p><strong>单价：</strong><br>¥${(claim.reward || 0).toFixed(2)}</p>
                      <p><strong>认领时间：</strong><br>${new Date(claim.created_at).toLocaleString('zh-CN')}</p>
                      <p class="mb-0"><strong>交付时间：</strong><br>${claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-'}</p>
                    </div>
                  </div>
                </div>
              </div>
            `;
            new bootstrap.Modal(document.getElementById('detailModal')).show();
          }
        })
        .catch(err => {
          showError('加载详情失败');
          console.error(err);
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
