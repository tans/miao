{{ define "creator/transactions.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收益明细 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link href="/static/css/custom.css" rel="stylesheet">
  <link href="/static/css/ui-enhancements.css" rel="stylesheet">
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">收益明细</h1>
        <p class="page-subtitle">查看所有收入和支出记录</p>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4 animate-fade-in-up">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label fw-medium">开始日期</label>
              <input type="date" class="form-control" id="start-date">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">结束日期</label>
              <input type="date" class="form-control" id="end-date">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">交易类型</label>
              <select class="form-select" id="type-filter">
                <option value="">全部</option>
                <option value="income">收入</option>
                <option value="withdraw">提现</option>
                <option value="margin">保证金</option>
              </select>
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary btn-action w-100" onclick="loadTransactions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                筛选
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 交易列表 -->
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>时间</th>
              <th>类型</th>
              <th>金额</th>
              <th>余额</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody id="transactions-list">
            <tr><td colspan="5" class="text-center text-muted">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action svg { flex-shrink: 0; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadTransactions() {
      const startDate = document.getElementById('start-date').value;
      const endDate = document.getElementById('end-date').value;
      const type = document.getElementById('type-filter').value;

      let params = [];
      if (startDate) params.push(`start_date=${startDate}`);
      if (endDate) params.push(`end_date=${endDate}`);
      if (type) params.push(`type=${type}`);
      const query = params.length > 0 ? '?' + params.join('&') : '';

      apiRequest(`/creator/transactions${query}`, 'GET')
        .then(data => {
          const tbody = document.getElementById('transactions-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            tbody.innerHTML = ensureArray(data.data).map(tx => `
              <tr>
                <td>${tx.created_at || '-'}</td>
                <td>${getTypeText(tx.type)}</td>
                <td class="${tx.amount > 0 ? 'text-success' : 'text-danger'}">
                  ${tx.amount > 0 ? '+' : ''}¥${Math.abs(tx.amount || 0)}
                </td>
                <td>¥${tx.balance || 0}</td>
                <td>${tx.remark || '-'}</td>
              </tr>
            `).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无交易记录</td></tr>';
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function getTypeText(type) {
      const texts = { 'income': '收入', 'withdraw': '提现', 'margin': '保证金', 'refund': '退款' };
      return texts[type] || type;
    }

    loadTransactions();
  </script>
</body>
</html>
{{ end }}
