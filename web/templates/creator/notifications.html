{{ define "notifications.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的通知 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">我的通知</h1>
        <p class="page-subtitle">查看平台发送的所有通知消息</p>
      </div>

      <!-- 操作栏 -->
      <div class="card mb-4">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-primary active" onclick="filterNotifications('all')">全部</button>
            <button type="button" class="btn btn-outline-primary" onclick="filterNotifications('unread')">未读</button>
            <button type="button" class="btn btn-outline-primary" onclick="filterNotifications('read')">已读</button>
          </div>
          <button class="btn btn-sm btn-outline-secondary" onclick="markAllAsRead()">全部标为已读</button>
        </div>
      </div>

      <!-- 通知列表 -->
      <div id="notification-list">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">加载中...</p>
        </div>
      </div>

      <!-- 分页 -->
      <div id="pagination-container" class="d-flex justify-content-center mt-4"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    let currentFilter = 'all';
    let currentPage = 1;
    const pageSize = 10;

    function filterNotifications(filter) {
      currentFilter = filter;
      currentPage = 1;
      document.querySelectorAll('.btn-group .btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      loadNotifications();
    }

    function loadNotifications() {
      const container = document.getElementById('notification-list');

      apiRequest(`/creator/notifications?page=${currentPage}&page_size=${pageSize}&filter=${currentFilter}`, 'GET')
        .then(data => {
          if (data.code === 0 && data.data && data.data.notifications && data.data.notifications.length > 0) {
            const notifications = data.data.notifications;
            const total = data.data.total || 0;
            const totalPages = Math.ceil(total / pageSize);

            container.innerHTML = notifications.map(notification => `
              <div class="card mb-3 ${notification.is_read ? '' : 'border-primary'}">
                <div class="card-body">
                  <div class="row">
                    <div class="col-md-8">
                      <div class="d-flex align-items-center mb-2">
                        ${!notification.is_read ? '<span class="badge bg-primary me-2">新</span>' : ''}
                        <h5 class="mb-0">${escapeHtml(notification.title || '通知')}</h5>
                      </div>
                      <p class="text-muted mb-2">${escapeHtml(notification.content || '')}</p>
                      <div class="text-muted small">
                        <span class="me-3">类型：${getNotificationTypeText(notification.type)}</span>
                        <span>${notification.created_at || '-'}</span>
                      </div>
                    </div>
                    <div class="col-md-4 text-end d-flex flex-column justify-content-center">
                      ${!notification.is_read ? `
                        <button class="btn btn-sm btn-outline-primary" onclick="markAsRead(${notification.id})">标为已读</button>
                      ` : ''}
                      <button class="btn btn-sm btn-outline-secondary mt-2" onclick="viewNotificationDetail(${notification.id})">查看详情</button>
                    </div>
                  </div>
                </div>
              </div>
            `).join('');

            renderPagination(totalPages);
          } else {
            container.innerHTML = '<div class="card"><div class="card-body text-center text-muted py-5">暂无通知</div></div>';
            document.getElementById('pagination-container').innerHTML = '';
          }
        })
        .catch(err => {
          console.error(err);
          container.innerHTML = '<div class="card"><div class="card-body text-center text-danger py-5">加载失败</div></div>';
        });
    }

    function renderPagination(totalPages) {
      const container = document.getElementById('pagination-container');
      if (totalPages <= 1) {
        container.innerHTML = '';
        return;
      }

      let html = '<nav><ul class="pagination">';

      // Previous button
      html += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="goToPage(${currentPage - 1}); return false;">上一页</a>
      </li>`;

      // Page numbers
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
            <a class="page-link" href="#" onclick="goToPage(${i}); return false;">${i}</a>
          </li>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        }
      }

      // Next button
      html += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="goToPage(${currentPage + 1}); return false;">下一页</a>
      </li>`;

      html += '</ul></nav>';
      container.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadNotifications();
    }

    function markAsRead(id) {
      apiRequest(`/creator/notifications/${id}/read`, 'POST')
        .then(data => {
          if (data.code === 0) {
            showToast('已标为已读', 'success');
            loadNotifications();
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function markAllAsRead() {
      apiRequest('/creator/notifications/read-all', 'POST')
        .then(data => {
          if (data.code === 0) {
            showToast('全部已标为已读', 'success');
            loadNotifications();
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function viewNotificationDetail(id) {
      window.location.href = `/messages.html?id=${id}`;
    }

    function getNotificationTypeText(type) {
      const texts = {
        1: '系统通知',
        2: '任务通知',
        3: '审核通知',
        4: '资金通知',
        5: '申诉通知'
      };
      return texts[type] || '其他';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadNotifications();
  </script>
</body>
</html>
{{ end }}
