{{ define "task_detail.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务详情 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container mt-4">
    <div class="content-area">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">任务详情</h4>
        <a href="/creator/task_hall.html" class="btn btn-outline-secondary">返回任务大厅</a>
      </div>

      <div id="task-detail">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const taskId = urlParams.get('id');

      if (!taskId) {
        showError('缺少任务ID');
        setTimeout(() => window.location.href = '/creator/task_hall.html', 1500);
        return;
      }

      loadTaskDetail(taskId);
    });

    function loadTaskDetail(taskId) {
      apiRequest('/creator/task/' + taskId, 'GET')
        .then(data => {
          if (data.code === 0) {
            renderTaskDetail(data.data);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderTaskDetail(task) {
      const statusMap = {
        1: { label: '待审核', class: 'bg-warning' },
        2: { label: '进行中', class: 'bg-success' },
        3: { label: '已完成', class: 'bg-secondary' },
        4: { label: '已关闭', class: 'bg-dark' }
      };

      const status = statusMap[task.status] || statusMap[1];

      document.getElementById('task-detail').innerHTML = `
        <div class="row">
          <div class="col-md-8">
            <h3 class="mb-3">${escapeHtml(task.title)}</h3>
            <div class="mb-3">
              <span class="badge ${status.class}">${status.label}</span>
              <span class="badge bg-light text-dark ms-2">视频任务</span>
            </div>
            <div class="card mb-3">
              <div class="card-body">
                <h6>任务描述</h6>
                <p class="text-muted">${escapeHtml(task.description)}</p>
              </div>
            </div>
            ${task.requirements ? `
              <div class="card mb-3">
                <div class="card-body">
                  <h6>任务要求</h6>
                  <p class="text-muted">${escapeHtml(task.requirements)}</p>
                </div>
              </div>
            ` : ''}
          </div>
          <div class="col-md-4">
            <div class="card bg-primary text-white mb-3">
              <div class="card-body text-center">
                <h6>单价</h6>
                <h2>¥${(task.unit_price || 0).toFixed(2)}</h2>
              </div>
            </div>
            <div class="card mb-3">
              <div class="card-body">
                <p><strong>剩余数量：</strong> ${task.remaining_count || 0}</p>
                <p><strong>总数量：</strong> ${task.total_count || 0}</p>
                <p><strong>发布时间：</strong><br>${new Date(task.created_at).toLocaleString('zh-CN')}</p>
                <p class="mb-0"><strong>截止时间：</strong><br>${task.end_at ? new Date(task.end_at).toLocaleString('zh-CN') : '无限制'}</p>
              </div>
            </div>
            ${task.status === 2 && task.remaining_count > 0 ? `
              <button class="btn btn-primary w-100" onclick="claimTask(${task.id})">
                <i class="bi bi-hand-thumbs-up"></i> 立即认领
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }

    function claimTask(taskId) {
      if (!confirm('确定要认领这个任务吗？')) return;

      apiRequest('/creator/task/' + taskId + '/claim', 'POST')
        .then(data => {
          if (data.code === 0) {
            showSuccess('认领成功');
            setTimeout(() => window.location.href = '/creator/claim_list.html', 1500);
          } else {
            showError(data.message || '认领失败');
          }
        })
        .catch(err => {
          showError('认领失败');
          console.error(err);
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
