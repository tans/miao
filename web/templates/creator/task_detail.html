{{ define "creator/task_detail.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务详情 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="mb-4">
        <a href="/creator/task_hall.html" class="btn btn-outline-secondary">← 返回任务大厅</a>
      </div>

      <div id="task-detail">
        <div class="text-center py-5">
          <div class="spinner-paw mb-3">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </div>
          <p class="text-muted small mb-0">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .spinner-paw { display: flex; justify-content: center; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('id');

    if (!taskId) {
      showError('缺少任务ID');
      setTimeout(() => window.location.href = '/creator/task_hall.html', 1500);
    } else {
      loadTaskDetail(taskId);
    }

    function loadTaskDetail(taskId) {
      apiRequest('/tasks/' + taskId, 'GET')
        .then(data => {
          if (data.code === 0) {
            renderTaskDetail(data.data);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderTaskDetail(task) {
      const container = document.getElementById('task-detail');
      container.innerHTML = `
        <div class="row">
          <div class="col-lg-8">
            <div class="card mb-4 animate-fade-in-up">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <h2 class="mb-0">${escapeHtml(task.title)}</h2>
                  <span class="badge bg-${getStatusColor(task.status)}">${getStatusText(task.status)}</span>
                </div>

                <div class="mb-4">
                  <h5 class="mb-3">任务描述</h5>
                  <p class="text-muted">${escapeHtml(task.description)}</p>
                </div>

                ${task.requirements ? `
                  <div class="mb-4">
                    <h5 class="mb-3">交付要求</h5>
                    <p class="text-muted">${escapeHtml(task.requirements)}</p>
                  </div>
                ` : ''}

                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">单价</div>
                        <div class="h4 mb-0 text-primary">¥${task.price}</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">需求数量</div>
                        <div class="h4 mb-0">${task.quantity}</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">已认领</div>
                        <div class="h4 mb-0">${task.claimed_count || 0}</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">截止时间</div>
                        <div class="h6 mb-0">${formatDate(task.deadline)}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card sticky-top animate-fade-in-up stagger-2" style="top: 100px;">
              <div class="card-body">
                <h5 class="mb-4">操作</h5>
                ${task.is_available ? `
                  <button class="btn btn-primary w-100 mb-3" onclick="claimTask(${task.id})">认领任务</button>
                ` : ''}
                <a href="/creator/task_hall.html" class="btn btn-outline-secondary w-100">返回任务大厅</a>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function claimTask(taskId) {
      if (!confirm('确认认领此任务？')) return;

      apiRequest('/creator/claim', 'POST', { task_id: taskId })
        .then(data => {
          if (data.code === 0) {
            showSuccess('认领成功');
            setTimeout(() => {
              window.location.href = '/creator/claim_list.html';
            }, 1000);
          } else {
            showError(data.message || '认领失败');
          }
        })
        .catch(err => {
          showError('认领失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = {
        1: 'warning',   // 待审核
        2: 'success',   // 已上架/待认领
        3: 'primary',   // 进行中
        4: 'secondary', // 已结束
        5: 'danger'     // 已取消
      };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = {
        1: '待审核',
        2: '待认领',
        3: '进行中',
        4: '已完成',
        5: '已取消'
      };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
