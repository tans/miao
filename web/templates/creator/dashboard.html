{{ define "dashboard.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创作者中心 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">创作者中心</h1>
        <p class="page-subtitle">管理认领和查看收益</p>
      </div>

      <!-- 统计卡片 -->
      <div class="row g-4 mb-5">
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value text-success" id="balance">¥0</div>
            <div class="stat-label">账户余额</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="total-claims">0</div>
            <div class="stat-label">总认领数</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="completed-tasks">0</div>
            <div class="stat-label">已完成</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="total-earnings">¥0</div>
            <div class="stat-label">累计收益</div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- 快捷操作 -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">快捷操作</h5>
            </div>
            <div class="card-body">
              <div class="d-grid gap-3">
                <a href="/creator/task_hall.html" class="btn btn-primary">浏览任务大厅</a>
                <a href="/creator/claim_list.html" class="btn btn-outline-secondary">我的认领</a>
                <a href="/creator/delivery.html" class="btn btn-outline-secondary">交付管理</a>
                <a href="/creator/wallet.html" class="btn btn-outline-secondary">我的钱包</a>
              </div>
            </div>
          </div>
        </div>

        <!-- 最近认领 -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">最近认领</h5>
            </div>
            <div class="card-body">
              <div id="recent-claims">
                <div class="text-center py-3 text-muted">加载中...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadDashboard() {
      apiRequest('/creator/stats', 'GET')
        .then(data => {
          if (data.code === 0) {
            const stats = data.data || {};
            document.getElementById('balance').textContent = '¥' + (stats.balance || 0);
            document.getElementById('total-claims').textContent = stats.total_claims || 0;
            document.getElementById('completed-tasks').textContent = stats.completed_tasks || 0;
            document.getElementById('total-earnings').textContent = '¥' + (stats.total_earnings || 0);
          }
        })
        .catch(err => console.error(err));

      apiRequest('/creator/claims?limit=5', 'GET')
        .then(data => {
          const container = document.getElementById('recent-claims');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(claim => `
              <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                  <div class="fw-bold small">${escapeHtml(claim.task_title || '任务')}</div>
                  <div class="text-muted" style="font-size: 0.75rem;">${getStatusText(claim.status)}</div>
                </div>
                <a href="/creator/task_detail.html?id=${claim.task_id}" class="btn btn-sm btn-outline-secondary">查看</a>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="text-center py-3 text-muted">暂无认领</div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('recent-claims').innerHTML = '<div class="text-center py-3 text-danger">加载失败</div>';
        });
    }

    function getStatusText(status) {
      const texts = { 'claimed': '已认领', 'submitted': '已提交', 'approved': '已通过', 'rejected': '已拒绝' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadDashboard();
  </script>
</body>
</html>
{{ end }}
