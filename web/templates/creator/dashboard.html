{{ define "dashboard.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创作者中心 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <div id="navbar-container"></div>

  <div class="container-fluid py-4">
    <div class="row">
      <!-- 侧边栏 -->
      <div class="col-md-2">
        <div class="list-group">
          <a href="/creator/dashboard.html" class="list-group-item list-group-item-action active">工作台</a>
          <a href="/creator/task_hall.html" class="list-group-item list-group-item-action">任务大厅</a>
          <a href="/creator/claim_list.html" class="list-group-item list-group-item-action">我的认领</a>
          <a href="/creator/wallet.html" class="list-group-item list-group-item-action">钱包</a>
          <a href="/creator/transactions.html" class="list-group-item list-group-item-action">收益明细</a>
        </div>
      </div>

      <!-- 主内容 -->
      <div class="col-md-10">
        <h4 class="mb-4">创作者中心</h4>

        <!-- 等级卡片 -->
        <div class="card mb-4" id="level-card">
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col-md-2 text-center">
                <span id="level-icon" style="font-size: 48px;"></span>
              </div>
              <div class="col-md-10">
                <div class="row">
                  <div class="col-md-3">
                    <p class="mb-1 text-muted small">当前等级</p>
                    <h5 id="level-name" class="mb-0"></h5>
                  </div>
                  <div class="col-md-3">
                    <p class="mb-1 text-muted small">今日认领</p>
                    <h5 id="today-claims" class="mb-0">-</h5>
                  </div>
                  <div class="col-md-3">
                    <p class="mb-1 text-muted small">今日限额</p>
                    <h5 id="daily-limit" class="mb-0">-</h5>
                  </div>
                  <div class="col-md-3">
                    <p class="mb-1 text-muted small">抽成比例</p>
                    <h5 id="commission-rate" class="mb-0">-</h5>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row mb-4">
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">账户余额</p>
                <h4 class="text-success mb-0" id="balance">-</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">冻结保证金</p>
                <h4 class="text-warning mb-0" id="frozen-margin">-</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">待交付</p>
                <h4 class="mb-0" id="pending-delivery">-</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">已完成</p>
                <h4 class="mb-0" id="completed-count">-</h4>
              </div>
            </div>
          </div>
        </div>

        <!-- 图表 -->
        <div class="row mb-4">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">近7天收益</div>
              <div class="card-body">
                <canvas id="earningsChart" height="200"></canvas>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">任务状态</div>
              <div class="card-body">
                <canvas id="completionChart" height="200"></canvas>
              </div>
            </div>
          </div>
        </div>

        <!-- 快捷操作 -->
        <div class="row">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">快捷操作</div>
              <div class="card-body">
                <div class="d-grid gap-2">
                  <a href="/creator/task_hall.html" class="btn btn-primary">浏览任务</a>
                  <a href="/creator/claim_list.html" class="btn btn-outline-primary">我的认领</a>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">账户信息</div>
              <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">可用余额:</span>
                  <span class="fw-bold text-success" id="available-balance">-</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">信用积分:</span>
                  <span class="fw-bold" id="credit-score">-</span>
                </div>
                <div class="d-flex justify-content-between">
                  <span class="text-muted">累计收益:</span>
                  <span class="fw-bold" id="total-earnings">-</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
const levelMap = {
  1: { name: '青铜', color: '#CD7F32', icon: '🥉', dailyLimit: 3, commission: '20%' },
  2: { name: '白银', color: '#C0C0C0', icon: '🥈', dailyLimit: 10, commission: '15%' },
  3: { name: '黄金', color: '#FFD700', icon: '🥇', dailyLimit: 20, commission: '12%' },
  4: { name: '钻石', color: '#B9F2FF', icon: '💎', dailyLimit: 50, commission: '10%' }
};

let earningsChart = null;
let completionChart = null;

if (!requireAuth() || getUserRole() !== 'creator') {
  // 已重定向
} else {
  loadData();

  function loadData() {
    showLoading('加载工作台数据...');
    Promise.all([
      apiRequest('/creator/wallet', 'GET', null, false),
      apiRequest('/creator/claims', 'GET', null, false),
      apiRequest('/creator/transactions?limit=100', 'GET', null, false)
    ])
      .then(([walletData, claimsData, txData]) => {
        if (walletData.code === 0) renderWallet(walletData.data);
        if (claimsData.code === 0) {
          const claims = claimsData.data || [];
          renderClaims(claims);
          renderCompletionChart(claims);
        }
        if (txData.code === 0) {
          const transactions = txData.data.transactions || [];
          renderEarnings(transactions);
          renderEarningsChart(transactions);
        }
        hideLoading();
      })
      .catch(err => {
        hideLoading();
        showError('加载数据失败');
      });
  }

  function renderWallet(data) {
    const level = levelMap[data.level] || levelMap[1];
    document.getElementById('level-icon').textContent = level.icon;
    document.getElementById('level-name').textContent = level.name;
    document.getElementById('level-name').style.color = level.color;
    document.getElementById('daily-limit').textContent = level.dailyLimit + '单';
    document.getElementById('commission-rate').textContent = level.commission;

    const balance = data.balance || 0;
    const frozen = data.margin_frozen || 0;
    document.getElementById('balance').textContent = '¥' + balance.toFixed(2);
    document.getElementById('frozen-margin').textContent = '¥' + frozen.toFixed(2);
    document.getElementById('available-balance').textContent = '¥' + (balance - frozen).toFixed(2);
    document.getElementById('credit-score').textContent = data.total_score || 0;
  }

  function renderClaims(claims) {
    const today = new Date().toDateString();
    let todayCount = 0, pending = 0, completed = 0;
    claims.forEach(claim => {
      if (new Date(claim.created_at).toDateString() === today) todayCount++;
      if (claim.status === 0) pending++;
      if (claim.status === 2) completed++;
    });
    document.getElementById('today-claims').textContent = todayCount;
    document.getElementById('pending-delivery').textContent = pending;
    document.getElementById('completed-count').textContent = completed;
  }

  function renderEarnings(transactions) {
    let total = 0;
    transactions.forEach(tx => { if (tx.amount > 0) total += tx.amount; });
    document.getElementById('total-earnings').textContent = '¥' + total.toFixed(2);
  }

  function renderEarningsChart(transactions) {
    const last7Days = [];
    const earningsByDay = {};
    for (let i = 6; i >= 0; i--) {
      const date = new Date();
      date.setDate(date.getDate() - i);
      const dateStr = date.toISOString().split('T')[0];
      last7Days.push(dateStr);
      earningsByDay[dateStr] = 0;
    }
    transactions.forEach(tx => {
      if (tx.amount > 0) {
        const txDate = new Date(tx.created_at).toISOString().split('T')[0];
        if (earningsByDay.hasOwnProperty(txDate)) earningsByDay[txDate] += tx.amount;
      }
    });

    const ctx = document.getElementById('earningsChart');
    if (earningsChart) earningsChart.destroy();
    earningsChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: last7Days.map(date => {
          const d = new Date(date);
          return `${d.getMonth() + 1}/${d.getDate()}`;
        }),
        datasets: [{
          label: '收益 (¥)',
          data: last7Days.map(date => earningsByDay[date]),
          borderColor: '#0d6efd',
          backgroundColor: 'rgba(13, 110, 253, 0.1)',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { callback: value => '¥' + value }
          }
        }
      }
    });
  }

  function renderCompletionChart(claims) {
    const statusCount = { pending: 0, submitted: 0, completed: 0, rejected: 0 };
    claims.forEach(claim => {
      if (claim.status === 0) statusCount.pending++;
      else if (claim.status === 1) statusCount.submitted++;
      else if (claim.status === 2) statusCount.completed++;
      else if (claim.status === 5) statusCount.rejected++;
    });

    const ctx = document.getElementById('completionChart');
    if (completionChart) completionChart.destroy();
    completionChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['待交付', '待验收', '已完成', '已退回'],
        datasets: [{
          label: '任务数',
          data: [statusCount.pending, statusCount.submitted, statusCount.completed, statusCount.rejected],
          backgroundColor: ['#ffc107', '#0dcaf0', '#198754', '#dc3545']
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
      }
    });
  }
}
  </script>
</body>
</html>
{{ end }}
