{{ define "creator/my_submissions.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的交付 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link href="/static/css/custom.css" rel="stylesheet">
  <link href="/static/css/ui-enhancements.css" rel="stylesheet">
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">我的交付</h1>
        <p class="page-subtitle">查看所有提交的作品</p>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4 animate-fade-in-up">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label fw-medium">交付状态</label>
              <select class="form-select" id="status-filter">
                <option value="">全部</option>
                <option value="submitted">已提交</option>
                <option value="approved">已通过</option>
                <option value="rejected">已拒绝</option>
              </select>
            </div>
            <div class="col-md-4">
              <button class="btn btn-primary btn-action" onclick="loadSubmissions()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                筛选
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 交付列表 -->
      <div id="submissions-list"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action svg { flex-shrink: 0; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadSubmissions() {
      const status = document.getElementById('status-filter').value;
      const params = status ? `?status=${status}` : '';

      apiRequest(`/creator/submissions${params}`, 'GET')
        .then(data => {
          const container = document.getElementById('submissions-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(sub => `
              <div class="card mb-3">
                <div class="card-body">
                  <div class="row align-items-center">
                    <div class="col-md-6">
                      <h5 class="mb-1">${escapeHtml(sub.task_title || '任务')}</h5>
                      <div class="text-muted small">提交时间：${sub.created_at || '-'}</div>
                    </div>
                    <div class="col-md-3">
                      <span class="badge ${getStatusClass(sub.status)}">${getStatusText(sub.status)}</span>
                    </div>
                    <div class="col-md-3 text-end">
                      <a href="/creator/delivery.html?task_id=${sub.task_id}" class="btn btn-sm btn-outline-secondary">查看详情</a>
                    </div>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="card"><div class="card-body text-center text-muted py-5">暂无交付记录</div></div>';
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function getStatusClass(status) {
      const classes = { 'submitted': 'bg-info', 'approved': 'bg-success', 'rejected': 'bg-danger' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'submitted': '已提交', 'approved': '已通过', 'rejected': '已拒绝' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadSubmissions();
  </script>
</body>
</html>
{{ end }}
