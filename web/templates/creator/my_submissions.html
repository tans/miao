{{ define "my_submissions.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的交付 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { background-color: white; border-radius: 8px; padding: 1rem; }
    .sidebar .list-group-item { border: none; border-radius: 6px; margin-bottom: 0.25rem; }
    .sidebar .list-group-item.active { background-color: #0d6efd; color: white; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="sidebar">
          <div class="list-group">
            <a href="/creator/dashboard.html" class="list-group-item list-group-item-action">
              <i class="bi bi-speedometer2"></i> 工作台
            </a>
            <a href="/creator/task_hall.html" class="list-group-item list-group-item-action">
              <i class="bi bi-grid"></i> 任务大厅
            </a>
            <a href="/creator/claim_list.html" class="list-group-item list-group-item-action">
              <i class="bi bi-list-check"></i> 我的认领
            </a>
            <a href="/creator/my_submissions.html" class="list-group-item list-group-item-action active">
              <i class="bi bi-file-earmark-text"></i> 我的交付
            </a>
            <a href="/creator/wallet.html" class="list-group-item list-group-item-action">
              <i class="bi bi-wallet2"></i> 我的钱包
            </a>
            <a href="/creator/transactions.html" class="list-group-item list-group-item-action">
              <i class="bi bi-clock-history"></i> 收益明细
            </a>
          </div>
        </div>
      </div>

      <div class="col-md-10">
        <div class="content-area">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">我的交付</h4>
            <div class="btn-group" role="group">
              <button type="button" class="btn btn-sm btn-outline-primary active" onclick="filterByStatus('all')">全部</button>
              <button type="button" class="btn btn-sm btn-outline-primary" onclick="filterByStatus(1)">待提交</button>
              <button type="button" class="btn btn-sm btn-outline-primary" onclick="filterByStatus(2)">已提交</button>
              <button type="button" class="btn btn-sm btn-outline-primary" onclick="filterByStatus(3)">已通过</button>
            </div>
          </div>

          <div id="submissions-list">
            <div class="text-center py-5 text-muted">
              <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
              </div>
              <p class="mt-2">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
    const statusMap = {
      1: { label: '待提交', class: 'bg-secondary text-white' },
      2: { label: '已提交', class: 'bg-warning text-dark' },
      3: { label: '已通过', class: 'bg-success text-white' },
      4: { label: '已拒绝', class: 'bg-danger text-white' },
      5: { label: '已超时', class: 'bg-dark text-white' }
    };

    let allSubmissions = [];
    let currentFilter = 'all';

    document.addEventListener('DOMContentLoaded', function() {
      const role = localStorage.getItem('current_role') || localStorage.getItem('role');
      if (role !== 'creator') {
        showError('无权访问此页面');
        setTimeout(() => window.location.href = '/auth/login.html', 1500);
        return;
      }
      loadSubmissions();
    });

    function loadSubmissions() {
      apiRequest('/creator/claims', 'GET')
        .then(data => {
          if (data.code === 0) {
            allSubmissions = data.data || [];
            renderSubmissions(allSubmissions);
          } else {
            showError(data.message || '加载失败');
            document.getElementById('submissions-list').innerHTML =
              '<div class="text-center py-5 text-danger">加载失败</div>';
          }
        })
        .catch(err => {
          showError('加载失败');
          document.getElementById('submissions-list').innerHTML =
            '<div class="text-center py-5 text-danger">加载失败</div>';
        });
    }

    function filterByStatus(status) {
      currentFilter = status;
      document.querySelectorAll('.btn-group .btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');

      if (status === 'all') {
        renderSubmissions(allSubmissions);
      } else {
        renderSubmissions(allSubmissions.filter(s => s.status === status));
      }
    }

    function renderSubmissions(submissions) {
      const container = document.getElementById('submissions-list');

      if (submissions.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">暂无交付记录</div>';
        return;
      }

      container.innerHTML = submissions.map(submission => {
        const status = statusMap[submission.status] || statusMap[1];
        const claimTime = new Date(submission.created_at).toLocaleString('zh-CN');
        const submitTime = submission.submit_at ? new Date(submission.submit_at).toLocaleString('zh-CN') : '-';
        const expiresTime = submission.expires_at ? new Date(submission.expires_at).toLocaleString('zh-CN') : '-';

        return `
          <div class="card mb-3">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <span class="status-badge ${status.class}">${status.label}</span>
                  <span class="badge bg-light text-dark ms-2">任务ID: ${submission.task_id}</span>
                </div>
                <div class="text-end">
                  <div class="text-primary fw-bold">¥${(submission.reward || 0).toFixed(2)}</div>
                </div>
              </div>

              <div class="mb-2">
                <strong>交付内容：</strong>
                <p class="mb-0 text-muted">${escapeHtml(submission.content || '暂无交付内容')}</p>
              </div>

              ${submission.review_comment ? `
                <div class="alert alert-info mb-2">
                  <strong>审核意见：</strong> ${escapeHtml(submission.review_comment)}
                </div>
              ` : ''}

              <div class="row text-muted small">
                <div class="col-md-4">
                  <i class="bi bi-clock"></i> 认领时间：${claimTime}
                </div>
                <div class="col-md-4">
                  <i class="bi bi-check-circle"></i> 提交时间：${submitTime}
                </div>
                <div class="col-md-4">
                  <i class="bi bi-alarm"></i> 超时时间：${expiresTime}
                </div>
              </div>

              ${submission.status === 1 ? `
                <div class="mt-3">
                  <a href="/creator/delivery.html?claim_id=${submission.id}" class="btn btn-primary btn-sm">
                    <i class="bi bi-upload"></i> 提交交付
                  </a>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
