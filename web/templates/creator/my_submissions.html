{% raw %}{% extends "layout.html" %}

{% block title %}我的认领 - 创意喵{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/creator/dashboard.html" class="list-group-item list-group-item-action">首页</a>
      <a href="/creator/task_hall.html" class="list-group-item list-group-item-action">任务大厅</a>
      <a href="/creator/claim_list.html" class="list-group-item list-group-item-action">我的认领</a>
      <a href="/creator/delivery.html" class="list-group-item list-group-item-action">交付管理</a>
      <a href="/creator/wallet.html" class="list-group-item list-group-item-action">我的钱包</a>
      <a href="/creator/transactions.html" class="list-group-item list-group-item-action">收益明细</a>
    </div>
  </div>
  <div class="col-md-9">
    <h2 class="mb-4">我的认领</h2>
    <div class="card">
      <div class="card-body">
        <div id="claim-list" class="list-group list-group-flush">
          <div class="text-center py-4 text-muted">加载中...</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const statusMap = {
  1: { label: '待提交', class: 'bg-secondary' },
  2: { label: '已提交', class: 'bg-warning' },
  3: { label: '已通过', class: 'bg-success' },
  4: { label: '已取消', class: 'bg-danger' },
  5: { label: '已超时', class: 'bg-dark' }
};

const categoryMap = {
  1: '文案创作',
  2: '设计创意',
  3: '视频制作',
  4: '摄影拍照',
  5: '音乐音频',
  6: '程序开发',
  7: '其他'
};

if (!requireAuth() || getUserRole() !== 'creator') {
  // 已重定向
} else {
  loadClaims();

  function loadClaims() {
    apiRequest('/creator/claims')
      .then(data => {
        if (data.code === 0) {
          renderClaims(data.data || []);
        } else {
          document.getElementById('claim-list').innerHTML =
            '<div class="text-center py-4 text-danger">加载失败</div>';
        }
      })
      .catch(() => {
        document.getElementById('claim-list').innerHTML =
          '<div class="text-center py-4 text-danger">加载失败</div>';
      });
  }

  function renderClaims(claims) {
    const container = document.getElementById('claim-list');
    if (claims.length === 0) {
      container.innerHTML = '<div class="text-center py-4 text-muted">暂无认领记录</div>';
      return;
    }

    container.innerHTML = claims.map(claim => {
      const status = statusMap[claim.status] || statusMap[1];
      const claimTime = new Date(claim.created_at).toLocaleString('zh-CN');
      const expiresTime = claim.expires_at ? new Date(claim.expires_at).toLocaleString('zh-CN') : '-';
      const submitTime = claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-';

      return `
        <div class="list-group-item">
          <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1">
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="badge ${status.class}">${status.label}</span>
                <small class="text-muted">任务ID: ${claim.task_id}</small>
              </div>
              <p class="mb-1">${escapeHtml(claim.content || '暂无交付内容')}</p>
              <small class="text-muted">
                认领时间: ${claimTime} |
                提交时间: ${submitTime} |
                超时时间: ${expiresTime}
              </small>
              ${claim.review_comment ? `<p class="mb-0 text-muted small mt-1"><strong>审核意见:</strong> ${escapeHtml(claim.review_comment)}</p>` : ''}
            </div>
            <div class="ms-3">
              ${claim.status === 1 ? `<span class="text-muted small">等待提交</span>` : ''}
              ${claim.status === 2 ? `<span class="text-warning small">等待验收</span>` : ''}
              ${claim.status === 3 ? `<span class="text-success small">已通过</span>` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
}
</script>
{% endblock %}
{% endraw %}
