{{ define "wallet.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的钱包 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">我的钱包</h1>
        <p class="page-subtitle">管理账户余额和提现</p>
      </div>

      <!-- 余额卡片 -->
      <div class="row g-4 mb-5">
        <div class="col-md-6">
          <div class="card">
            <div class="card-body text-center py-5">
              <div class="text-muted mb-2">账户余额</div>
              <div class="display-4 text-success mb-3" id="balance">¥0</div>
              <button class="btn btn-primary" onclick="showWithdrawModal()">申请提现</button>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-body text-center py-5">
              <div class="text-muted mb-2">冻结保证金</div>
              <div class="display-4 text-warning mb-3" id="frozen-margin">¥0</div>
              <div class="small text-muted">任务完成后自动解冻</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 提现记录 -->
      <div class="card">
        <div class="card-header">
          <h5 class="mb-0">提现记录</h5>
        </div>
        <div class="card-body">
          <div class="table-responsive">
            <table class="table">
              <thead>
                <tr>
                  <th>申请时间</th>
                  <th>金额</th>
                  <th>状态</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="withdraw-list">
                <tr><td colspan="4" class="text-center text-muted">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 提现模态框 -->
  <div class="modal fade" id="withdrawModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">申请提现</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">提现金额</label>
            <input type="number" class="form-control" id="withdraw-amount" placeholder="请输入金额">
          </div>
          <div class="mb-3">
            <label class="form-label">支付宝账号</label>
            <input type="text" class="form-control" id="alipay-account" placeholder="请输入支付宝账号">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="submitWithdraw()">提交</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();
    requireRole('creator');

    let withdrawModal;

    function loadWallet() {
      apiRequest('/creator/wallet', 'GET')
        .then(data => {
          if (data.code === 0) {
            const wallet = data.data || {};
            document.getElementById('balance').textContent = '¥' + (wallet.balance || 0);
            document.getElementById('frozen-margin').textContent = '¥' + (wallet.frozen_margin || 0);
          }
        })
        .catch(err => console.error(err));

      apiRequest('/creator/withdrawals', 'GET')
        .then(data => {
          const tbody = document.getElementById('withdraw-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            tbody.innerHTML = data.data.map(w => `
              <tr>
                <td>${w.created_at || '-'}</td>
                <td>¥${w.amount || 0}</td>
                <td><span class="badge ${getStatusClass(w.status)}">${getStatusText(w.status)}</span></td>
                <td>${w.remark || '-'}</td>
              </tr>
            `).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">暂无提现记录</td></tr>';
          }
        })
        .catch(err => console.error(err));
    }

    function showWithdrawModal() {
      if (!withdrawModal) {
        withdrawModal = new bootstrap.Modal(document.getElementById('withdrawModal'));
      }
      withdrawModal.show();
    }

    function submitWithdraw() {
      const amount = document.getElementById('withdraw-amount').value;
      const account = document.getElementById('alipay-account').value;

      if (!amount || !account) {
        showToast('请填写完整信息', 'warning');
        return;
      }

      apiRequest('/creator/withdraw', 'POST', { amount: parseFloat(amount), alipay_account: account })
        .then(data => {
          if (data.code === 0) {
            showToast('提现申请已提交', 'success');
            withdrawModal.hide();
            loadWallet();
          } else {
            showToast(data.message || '提交失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('提交失败', 'danger');
        });
    }

    function getStatusClass(status) {
      const classes = { 'pending': 'bg-warning', 'approved': 'bg-success', 'rejected': 'bg-danger' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待审核', 'approved': '已通过', 'rejected': '已拒绝' };
      return texts[status] || status;
    }

    loadWallet();
  </script>
</body>
</html>
{{ end }}
