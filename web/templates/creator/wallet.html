{{ define "wallet.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的钱包 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid py-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/creator/dashboard.html" class="list-group-item list-group-item-action">工作台</a>
          <a href="/creator/task_hall.html" class="list-group-item list-group-item-action">任务大厅</a>
          <a href="/creator/claim_list.html" class="list-group-item list-group-item-action">我的认领</a>
          <a href="/creator/wallet.html" class="list-group-item list-group-item-action active">钱包</a>
          <a href="/creator/transactions.html" class="list-group-item list-group-item-action">收益明细</a>
        </div>
      </div>

      <div class="col-md-10">
        <h4 class="mb-4">我的钱包</h4>

        <div class="row mb-4">
          <div class="col-md-4">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">账户余额</p>
                <h3 class="text-success mb-0" id="balance">-</h3>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">冻结保证金</p>
                <h3 class="text-warning mb-0" id="frozen">-</h3>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">可提现金额</p>
                <h3 class="text-primary mb-0" id="available">-</h3>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">等级信息</div>
              <div class="card-body">
                <div class="d-flex align-items-center mb-3">
                  <span id="level-icon" style="font-size: 48px;"></span>
                  <div class="ms-3">
                    <h5 id="level-name" class="mb-1"></h5>
                    <p class="text-muted mb-0">抽成比例: <span id="commission"></span></p>
                  </div>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">信用积分:</span>
                  <span class="fw-bold" id="credit-score">-</span>
                </div>
                <div class="d-flex justify-content-between">
                  <span class="text-muted">每日认领限额:</span>
                  <span class="fw-bold" id="daily-limit">-</span>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">提现</div>
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label">提现金额</label>
                  <input type="number" class="form-control" id="withdraw-amount" placeholder="请输入提现金额">
                </div>
                <button class="btn btn-primary w-100" onclick="withdraw()">申请提现</button>
                <p class="text-muted small mt-2 mb-0">提现将在1-3个工作日到账</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
const levelMap = {
  1: { name: '青铜', icon: '🥉', dailyLimit: 3, commission: '20%' },
  2: { name: '白银', icon: '🥈', dailyLimit: 10, commission: '15%' },
  3: { name: '黄金', icon: '🥇', dailyLimit: 20, commission: '12%' },
  4: { name: '钻石', icon: '💎', dailyLimit: 50, commission: '10%' }
};

if (!requireAuth() || getUserRole() !== 'creator') {
  // 已重定向
} else {
  loadWallet();

  function loadWallet() {
    apiRequest('/creator/wallet', 'GET')
      .then(data => {
        if (data.code === 0) {
          const wallet = data.data;
          const balance = wallet.balance || 0;
          const frozen = wallet.margin_frozen || 0;
          const level = levelMap[wallet.level] || levelMap[1];

          document.getElementById('balance').textContent = '¥' + balance.toFixed(2);
          document.getElementById('frozen').textContent = '¥' + frozen.toFixed(2);
          document.getElementById('available').textContent = '¥' + (balance - frozen).toFixed(2);
          document.getElementById('level-icon').textContent = level.icon;
          document.getElementById('level-name').textContent = level.name;
          document.getElementById('commission').textContent = level.commission;
          document.getElementById('daily-limit').textContent = level.dailyLimit + '单/天';
          document.getElementById('credit-score').textContent = wallet.total_score || 0;
        }
      })
      .catch(() => showError('加载钱包信息失败'));
  }

  function withdraw() {
    const amount = parseFloat(document.getElementById('withdraw-amount').value);
    if (!amount || amount <= 0) {
      showError('请输入有效的提现金额');
      return;
    }

    if (!confirm(`确认提现 ¥${amount.toFixed(2)}?`)) return;

    apiRequest('/creator/withdraw', 'POST', { amount })
      .then(data => {
        if (data.code === 0) {
          showSuccess('提现申请已提交');
          document.getElementById('withdraw-amount').value = '';
          loadWallet();
        } else {
          showError(data.message || '提现失败');
        }
      })
      .catch(() => showError('提现失败'));
  }
}
  </script>
</body>
</html>
{{ end }}
