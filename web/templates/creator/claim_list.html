{{ define "claim_list.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的认领 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">我的认领</h1>
        <p class="page-subtitle">管理所有认领的任务</p>
      </div>

      <!-- 统计卡片 -->
      <div class="row g-4 mb-5">
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="today-claims">0</div>
            <div class="stat-label">今日认领</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="pending-delivery">0</div>
            <div class="stat-label">待交付</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="pending-review">0</div>
            <div class="stat-label">待验收</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="completed">0</div>
            <div class="stat-label">已完成</div>
          </div>
        </div>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">状态</label>
              <select class="form-select" id="status-filter">
                <option value="">全部</option>
                <option value="claimed">已认领</option>
                <option value="submitted">已提交</option>
                <option value="approved">已通过</option>
                <option value="rejected">已拒绝</option>
              </select>
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary" onclick="loadClaims()">筛选</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 认领列表 -->
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>任务标题</th>
              <th>认领时间</th>
              <th>截止时间</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="claims-list">
            <tr><td colspan="5" class="text-center text-muted">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadStats() {
      apiRequest('/creator/claim-stats', 'GET')
        .then(data => {
          if (data.code === 0) {
            const stats = data.data || {};
            document.getElementById('today-claims').textContent = stats.today_claims || 0;
            document.getElementById('pending-delivery').textContent = stats.pending_delivery || 0;
            document.getElementById('pending-review').textContent = stats.pending_review || 0;
            document.getElementById('completed').textContent = stats.completed || 0;
          }
        })
        .catch(err => console.error(err));
    }

    function loadClaims() {
      const status = document.getElementById('status-filter').value;
      const params = status ? `?status=${status}` : '';

      apiRequest(`/creator/claims${params}`, 'GET')
        .then(data => {
          const tbody = document.getElementById('claims-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            tbody.innerHTML = ensureArray(data.data).map(claim => `
              <tr>
                <td>${escapeHtml(claim.task_title || '任务')}</td>
                <td>${claim.claimed_at || '-'}</td>
                <td>${claim.deadline || '-'}</td>
                <td><span class="badge ${getStatusClass(claim.status)}">${getStatusText(claim.status)}</span></td>
                <td>
                  <a href="/creator/task_detail.html?id=${claim.task_id}" class="btn btn-sm btn-outline-secondary">查看</a>
                  ${claim.status === 'claimed' ? `<a href="/creator/delivery.html?task_id=${claim.task_id}" class="btn btn-sm btn-primary">交付</a>` : ''}
                </td>
              </tr>
            `).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">暂无认领记录</td></tr>';
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function getStatusClass(status) {
      const classes = { 'claimed': 'bg-info', 'submitted': 'bg-warning', 'approved': 'bg-success', 'rejected': 'bg-danger' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'claimed': '已认领', 'submitted': '已提交', 'approved': '已通过', 'rejected': '已拒绝' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadStats();
    loadClaims();
  </script>
</body>
</html>
{{ end }}
