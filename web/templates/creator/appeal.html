{{ define "creator/appeal.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发起申诉 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container" style="max-width: 800px;">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">发起申诉</h1>
        <p class="page-subtitle">对任务验收结果提出异议</p>
      </div>

      <div class="card mb-4 animate-fade-in-up">
        <div class="card-body">
          <div class="alert alert-info mb-4 d-flex align-items-start gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flex-shrink-0 mt-1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <div><strong>申诉说明：</strong> 如果您对任务验收结果有异议，可以在此发起申诉。平台将在3个工作日内处理您的申诉。</div>
          </div>

          <form id="appeal-form">
            <div class="mb-4">
              <label class="form-label fw-medium">选择认领记录 <span class="text-danger">*</span></label>
              <select class="form-select" id="claim-id" required>
                <option value="">加载中...</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">申诉类型 <span class="text-danger">*</span></label>
              <select class="form-select" id="appeal-type" required>
                <option value="">请选择...</option>
                <option value="1">验收不公</option>
                <option value="2">恶意拒绝</option>
                <option value="3">任务描述不符</option>
                <option value="4">其他</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">申诉理由 <span class="text-danger">*</span></label>
              <textarea class="form-control" id="appeal-reason" rows="6" required placeholder="请详细描述您的申诉理由..."></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">证据材料</label>
              <input type="file" class="form-control" id="evidence-files" multiple>
              <div class="form-text">支持上传图片、文档等证据材料</div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg btn-action">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                提交申诉
              </button>
              <a href="/creator/appeal_list.html" class="btn btn-outline-secondary">查看申诉记录</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action svg { flex-shrink: 0; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadRejectedClaims() {
      apiRequest('/creator/claims?status=rejected', 'GET')
        .then(data => {
          const select = document.getElementById('claim-id');
          if (data.code === 0 && data.data && data.data.length > 0) {
            select.innerHTML = '<option value="">请选择...</option>' +
              ensureArray(data.data).map(claim => `<option value="${claim.id}">${escapeHtml(claim.task_title || '任务')} - ${claim.claimed_at}</option>`).join('');
          } else {
            select.innerHTML = '<option value="">暂无可申诉的认领记录</option>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('claim-id').innerHTML = '<option value="">加载失败</option>';
        });
    }

    document.getElementById('appeal-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const claimId = document.getElementById('claim-id').value;
      const appealType = document.getElementById('appeal-type').value;
      const reason = document.getElementById('appeal-reason').value;

      if (!claimId || !appealType || !reason) {
        showToast('请填写完整信息', 'warning');
        return;
      }

      const formData = {
        claim_id: parseInt(claimId),
        appeal_type: parseInt(appealType),
        reason: reason
      };

      apiRequest('/creator/appeal', 'POST', formData)
        .then(data => {
          if (data.code === 0) {
            showToast('申诉已提交', 'success');
            setTimeout(() => {
              window.location.href = '/creator/appeal_list.html';
            }, 1500);
          } else {
            showToast(data.message || '提交失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('提交失败', 'danger');
        });
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadRejectedClaims();
  </script>
</body>
</html>
{{ end }}
