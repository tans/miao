{{ define "appeal.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发起申诉 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container" style="max-width: 800px;">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">发起申诉</h1>
        <p class="page-subtitle">对任务验收结果提出异议</p>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <div class="alert alert-info mb-4">
            <strong>💡 申诉说明：</strong> 如果您对任务验收结果有异议，可以在此发起申诉。平台将在3个工作日内处理您的申诉。
          </div>

          <form id="appeal-form">
            <div class="mb-4">
              <label class="form-label">选择认领记录 <span class="text-danger">*</span></label>
              <select class="form-select" id="claim-id" required>
                <option value="">加载中...</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label">申诉类型 <span class="text-danger">*</span></label>
              <select class="form-select" id="appeal-type" required>
                <option value="">请选择...</option>
                <option value="1">验收不公</option>
                <option value="2">恶意拒绝</option>
                <option value="3">任务描述不符</option>
                <option value="4">其他</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label">申诉理由 <span class="text-danger">*</span></label>
              <textarea class="form-control" id="appeal-reason" rows="6" required placeholder="请详细描述您的申诉理由..."></textarea>
            </div>

            <div class="mb-4">
              <label class="form-label">证据材料</label>
              <input type="file" class="form-control" id="evidence-files" multiple>
              <div class="form-text">支持上传图片、文档等证据材料</div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg">提交申诉</button>
              <a href="/creator/appeal_list.html" class="btn btn-outline-secondary">查看申诉记录</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadRejectedClaims() {
      apiRequest('/creator/claims?status=rejected', 'GET')
        .then(data => {
          const select = document.getElementById('claim-id');
          if (data.code === 0 && data.data && data.data.length > 0) {
            select.innerHTML = '<option value="">请选择...</option>' +
              data.data.map(claim => `<option value="${claim.id}">${escapeHtml(claim.task_title || '任务')} - ${claim.claimed_at}</option>`).join('');
          } else {
            select.innerHTML = '<option value="">暂无可申诉的认领记录</option>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('claim-id').innerHTML = '<option value="">加载失败</option>';
        });
    }

    document.getElementById('appeal-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const claimId = document.getElementById('claim-id').value;
      const appealType = document.getElementById('appeal-type').value;
      const reason = document.getElementById('appeal-reason').value;

      if (!claimId || !appealType || !reason) {
        showToast('请填写完整信息', 'warning');
        return;
      }

      const formData = {
        claim_id: parseInt(claimId),
        appeal_type: parseInt(appealType),
        reason: reason
      };

      apiRequest('/creator/appeal', 'POST', formData)
        .then(data => {
          if (data.code === 0) {
            showToast('申诉已提交', 'success');
            setTimeout(() => {
              window.location.href = '/creator/appeal_list.html';
            }, 1500);
          } else {
            showToast(data.message || '提交失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('提交失败', 'danger');
        });
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadRejectedClaims();
  </script>
</body>
</html>
{{ end }}
