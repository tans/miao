{{ define "task_hall.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务大厅 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">任务大厅</h1>
        <p class="page-subtitle">浏览并认领适合你的视频任务</p>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <input type="text" class="form-control" id="search-keyword" placeholder="搜索任务标题或关键词">
            </div>
            <div class="col-md-3">
              <select class="form-select" id="filter-status">
                <option value="">全部状态</option>
                <option value="pending">待认领</option>
                <option value="in_progress">进行中</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-select" id="sort-by">
                <option value="created_at">最新发布</option>
                <option value="price">价格从高到低</option>
                <option value="deadline">截止时间</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100" onclick="loadTasks()">搜索</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 统计信息 -->
      <div class="row g-4 mb-5">
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-value" id="total-tasks">0</div>
            <div class="stat-label">可认领任务</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-value" id="avg-price">¥0</div>
            <div class="stat-label">平均单价</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="stat-card">
            <div class="stat-value" id="my-claims">0</div>
            <div class="stat-label">我的认领</div>
          </div>
        </div>
      </div>

      <!-- 任务列表 -->
      <div id="task-list" class="row g-4"></div>

      <!-- 空状态 -->
      <div id="empty-state" class="text-center py-5" style="display: none;">
        <p class="text-muted">暂无可认领的任务</p>
        <a href="/creator/dashboard.html" class="btn btn-outline-secondary">返回工作台</a>
      </div>
    </div>
  </div>

  <div id="loading-overlay" style="display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center;">
    <div class="spinner-border text-primary"></div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();
    requireRole('creator');

    let allTasks = [];

    function loadTasks() {
      showLoading();
      apiRequest('/tasks', 'GET')
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            allTasks = data.data || [];
            renderTasks(allTasks);
            updateStats(allTasks);
          } else {
            showError(data.message || '加载任务失败');
          }
        })
        .catch(err => {
          hideLoading();
          showError('加载任务失败');
          console.error(err);
        });
    }

    function renderTasks(tasks) {
      const container = document.getElementById('task-list');
      const emptyState = document.getElementById('empty-state');

      if (!tasks || tasks.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = tasks.map(task => `
        <div class="col-md-6 col-lg-4">
          <div class="card h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <h5 class="mb-0">${escapeHtml(task.title)}</h5>
                <span class="badge bg-${getStatusColor(task.status)}">${getStatusText(task.status)}</span>
              </div>
              <p class="text-muted small mb-3">${escapeHtml(task.description || '').substring(0, 80)}${task.description && task.description.length > 80 ? '...' : ''}</p>
              <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                  <div class="text-muted small">单价</div>
                  <div class="fw-bold text-primary">¥${task.price}</div>
                </div>
                <div>
                  <div class="text-muted small">需求数量</div>
                  <div class="fw-bold">${task.quantity}</div>
                </div>
                <div>
                  <div class="text-muted small">已认领</div>
                  <div class="fw-bold">${task.claimed_count || 0}</div>
                </div>
              </div>
              <div class="mb-3">
                <div class="text-muted small">截止时间</div>
                <div class="small">${formatDate(task.deadline)}</div>
              </div>
              <div class="d-flex gap-2">
                <a href="/creator/task_detail.html?id=${task.id}" class="btn btn-outline-secondary btn-sm flex-grow-1">查看详情</a>
                ${task.status === 'pending' ? `<button class="btn btn-primary btn-sm" onclick="claimTask(${task.id})">认领任务</button>` : ''}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateStats(tasks) {
      const availableTasks = tasks.filter(t => t.status === 'pending');
      document.getElementById('total-tasks').textContent = availableTasks.length;

      if (availableTasks.length > 0) {
        const avgPrice = availableTasks.reduce((sum, t) => sum + parseFloat(t.price), 0) / availableTasks.length;
        document.getElementById('avg-price').textContent = '¥' + avgPrice.toFixed(2);
      }

      apiRequest('/creator/claims', 'GET')
        .then(data => {
          if (data.code === 0) {
            document.getElementById('my-claims').textContent = (data.data || []).length;
          }
        })
        .catch(err => console.error(err));
    }

    function claimTask(taskId) {
      if (!confirm('确认认领此任务？')) return;

      showLoading();
      apiRequest('/claims', 'POST', { task_id: taskId })
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            showSuccess('认领成功');
            setTimeout(() => {
              window.location.href = '/creator/claim_list.html';
            }, 1000);
          } else {
            showError(data.message || '认领失败');
          }
        })
        .catch(err => {
          hideLoading();
          showError('认领失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = {
        'pending': 'success',
        'in_progress': 'primary',
        'completed': 'secondary',
        'cancelled': 'danger'
      };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = {
        'pending': '待认领',
        'in_progress': '进行中',
        'completed': '已完成',
        'cancelled': '已取消'
      };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showLoading() {
      document.getElementById('loading-overlay').style.display = 'flex';
    }

    function hideLoading() {
      document.getElementById('loading-overlay').style.display = 'none';
    }

    loadTasks();
  </script>
</body>
</html>
{{ end }}
