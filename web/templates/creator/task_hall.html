{{ define "task_hall.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务大厅 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid py-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/creator/dashboard.html" class="list-group-item list-group-item-action">工作台</a>
          <a href="/creator/task_hall.html" class="list-group-item list-group-item-action active">任务大厅</a>
          <a href="/creator/claim_list.html" class="list-group-item list-group-item-action">我的认领</a>
          <a href="/creator/wallet.html" class="list-group-item list-group-item-action">钱包</a>
          <a href="/creator/transactions.html" class="list-group-item list-group-item-action">收益明细</a>
        </div>
      </div>

      <div class="col-md-10">
        <h4 class="mb-4">任务大厅</h4>

        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">任务分类</label>
                <select class="form-select" id="category-filter" onchange="loadTasks()">
                  <option value="">全部分类</option>
                  <option value="1">文案创作</option>
                  <option value="2">设计创意</option>
                  <option value="3">视频制作</option>
                  <option value="4">摄影拍照</option>
                  <option value="5">音乐音频</option>
                  <option value="6">程序开发</option>
                  <option value="7">其他</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">排序方式</label>
                <select class="form-select" id="sort-filter" onchange="loadTasks()">
                  <option value="latest">最新发布</option>
                  <option value="price_desc">价格从高到低</option>
                  <option value="price_asc">价格从低到高</option>
                </select>
              </div>
              <div class="col-md-4">
                <label class="form-label">关键词搜索</label>
                <input type="text" class="form-control" id="search-input" placeholder="搜索任务">
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100" onclick="loadTasks()">搜索</button>
              </div>
            </div>
          </div>
        </div>

        <div id="task-list" class="row g-3">
          <div class="col-12 text-center py-4 text-muted">加载中...</div>
        </div>

        <nav class="mt-4">
          <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
const categoryMap = {
  1: '文案创作', 2: '设计创意', 3: '视频制作',
  4: '摄影拍照', 5: '音乐音频', 6: '程序开发', 7: '其他'
};

let currentPage = 1;
const itemsPerPage = 20;
let totalPages = 1;

if (!requireAuth() || getUserRole() !== 'creator') {
  // 已重定向
} else {
  loadTasks();

  document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loadTasks();
  });

  function loadTasks() {
    const category = document.getElementById('category-filter').value;
    const sortBy = document.getElementById('sort-filter').value;
    const keyword = document.getElementById('search-input').value.trim();

    const params = new URLSearchParams();
    params.append('page', currentPage);
    params.append('limit', itemsPerPage);
    if (category) params.append('category', category);
    if (keyword) params.append('keyword', keyword);
    if (sortBy) params.append('sort', sortBy);

    apiRequest(`/creator/tasks?${params.toString()}`, 'GET')
      .then(data => {
        if (data.code === 0) {
          const tasks = data.data.data || [];
          const total = data.data.total || 0;
          totalPages = Math.ceil(total / itemsPerPage);
          renderTasks(tasks);
          renderPagination();
        } else {
          document.getElementById('task-list').innerHTML =
            '<div class="col-12 text-center py-4 text-danger">加载失败</div>';
        }
      })
      .catch(() => {
        document.getElementById('task-list').innerHTML =
          '<div class="col-12 text-center py-4 text-danger">加载失败</div>';
      });
  }

  function renderTasks(tasks) {
    const container = document.getElementById('task-list');
    if (tasks.length === 0) {
      container.innerHTML = '<div class="col-12 text-center py-4 text-muted">暂无可认领任务</div>';
      return;
    }

    container.innerHTML = tasks.map(task => {
      const category = categoryMap[task.category] || '其他';
      const remaining = task.remaining_count || 0;
      const canClaim = remaining > 0;

      return `
        <div class="col-md-6 col-lg-4">
          <div class="card h-100">
            <div class="card-body">
              <div class="d-flex justify-content-between mb-2">
                <span class="badge bg-success">可认领</span>
                <small class="text-muted">${category}</small>
              </div>
              <h5 class="card-title">${escapeHtml(task.title)}</h5>
              <p class="card-text small text-muted">${escapeHtml((task.description || '').substring(0, 60))}...</p>
              <div class="d-flex justify-content-between mb-2">
                <div>
                  <span class="text-primary fw-bold fs-5">¥${task.unit_price || 0}</span>
                  <small class="text-muted">/份</small>
                </div>
                <span class="badge bg-light text-dark">剩余 ${remaining}</span>
              </div>
            </div>
            <div class="card-footer bg-transparent">
              <button class="btn btn-primary btn-sm w-100 ${!canClaim ? 'disabled' : ''}"
                      onclick="claimTask(${task.id})" ${!canClaim ? 'disabled' : ''}>
                立即认领
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderPagination() {
    const pagination = document.getElementById('pagination');
    if (totalPages <= 1) {
      pagination.innerHTML = '';
      return;
    }

    let html = `
      <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="changePage(${currentPage - 1}); return false;">上一页</a>
      </li>
    `;

    for (let i = 1; i <= Math.min(totalPages, 5); i++) {
      html += `
        <li class="page-item ${i === currentPage ? 'active' : ''}">
          <a class="page-link" href="#" onclick="changePage(${i}); return false;">${i}</a>
        </li>
      `;
    }

    html += `
      <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
        <a class="page-link" href="#" onclick="changePage(${currentPage + 1}); return false;">下一页</a>
      </li>
    `;

    pagination.innerHTML = html;
  }

  function changePage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    loadTasks();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function claimTask(taskId) {
    if (!confirm('确认认领此任务?')) return;

    apiRequest('/creator/claim', 'POST', { task_id: taskId })
      .then(data => {
        if (data.code === 0) {
          showSuccess('认领成功!');
          loadTasks();
        } else {
          showError(data.message || '认领失败');
        }
      })
      .catch(() => showError('认领失败'));
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
}
  </script>
</body>
</html>
{{ end }}
