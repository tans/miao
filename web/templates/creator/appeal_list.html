{{ define "appeal_list.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申诉记录 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">申诉记录</h1>
        <p class="page-subtitle">查看所有申诉的处理状态</p>
      </div>

      <div class="mb-4 text-end">
        <a href="/creator/appeal.html" class="btn btn-primary">发起申诉</a>
      </div>

      <div id="appeal-list"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();
    requireRole('creator');

    function loadAppeals() {
      apiRequest('/creator/appeals', 'GET')
        .then(data => {
          const container = document.getElementById('appeal-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = data.data.map(appeal => `
              <div class="card mb-3">
                <div class="card-body">
                  <div class="row">
                    <div class="col-md-8">
                      <h5 class="mb-2">${escapeHtml(appeal.task_title || '任务')}</h5>
                      <div class="text-muted small mb-2">申诉类型：${getAppealTypeText(appeal.appeal_type)}</div>
                      <div class="mb-2">${escapeHtml(appeal.reason || '')}</div>
                      <div class="text-muted small">提交时间：${appeal.created_at || '-'}</div>
                    </div>
                    <div class="col-md-4 text-end">
                      <span class="badge ${getStatusClass(appeal.status)} mb-2">${getStatusText(appeal.status)}</span>
                      ${appeal.admin_reply ? `<div class="alert alert-info small mt-2"><strong>平台回复：</strong>${escapeHtml(appeal.admin_reply)}</div>` : ''}
                    </div>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="card"><div class="card-body text-center text-muted py-5">暂无申诉记录</div></div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('appeal-list').innerHTML = '<div class="card"><div class="card-body text-center text-danger py-5">加载失败</div></div>';
        });
    }

    function getAppealTypeText(type) {
      const texts = { 1: '验收不公', 2: '恶意拒绝', 3: '任务描述不符', 4: '其他' };
      return texts[type] || '未知';
    }

    function getStatusClass(status) {
      const classes = { 'pending': 'bg-warning', 'approved': 'bg-success', 'rejected': 'bg-danger' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待处理', 'approved': '已通过', 'rejected': '已驳回' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadAppeals();
  </script>
</body>
</html>
{{ end }}
