{{define "error.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 创意喵</title>
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
    <link href="/static/css/custom.css" rel="stylesheet">
    <link href="/static/css/ui-enhancements.css" rel="stylesheet">
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #F8F8F8;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 400px;
        }
        .error-icon {
            margin-bottom: 20px;
        }
        .error-icon svg {
            width: 64px;
            height: 64px;
        }
        .error-message {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #FF2442;
            color: white;
            text-decoration: none;
            border-radius: 24px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #E61E3A;
        }
    </style>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#6c757d">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <div class="error-message">{{.Message}}</div>
        <a href="javascript:history.back()" class="back-btn">返回</a>
    </div>
</body>
</html>
{{end}}
