{{define "error.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - 创意喵</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #F8F8F8;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            max-width: 400px;
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 18px;
            color: #333;
            margin-bottom: 30px;
        }
        .back-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #FF2442;
            color: white;
            text-decoration: none;
            border-radius: 24px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #E61E3A;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">😕</div>
        <div class="error-message">{{.Message}}</div>
        <a href="javascript:history.back()" class="back-btn">返回</a>
    </div>
</body>
</html>
{{end}}
