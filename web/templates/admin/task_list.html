{{ define "task_list.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务管理 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">任务管理</h1>
        <p class="page-subtitle">管理平台所有任务</p>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">状态</label>
              <select class="form-select" id="status-filter">
                <option value="">全部</option>
                <option value="pending">待审核</option>
                <option value="published">已发布</option>
                <option value="completed">已完成</option>
                <option value="cancelled">已取消</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">搜索</label>
              <input type="text" class="form-control" id="search-input" placeholder="任务标题或ID">
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary" onclick="loadTasks()">筛选</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 任务列表 -->
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>商家</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tasks-list">
            <tr><td colspan="6" class="text-center text-muted">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadTasks() {
      const status = document.getElementById('status-filter').value;
      const search = document.getElementById('search-input').value;

      let params = [];
      if (status) params.push(`status=${status}`);
      if (search) params.push(`search=${encodeURIComponent(search)}`);
      const query = params.length > 0 ? '?' + params.join('&') : '';

      apiRequest(`/admin/tasks${query}`, 'GET')
        .then(data => {
          const tbody = document.getElementById('tasks-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            tbody.innerHTML = ensureArray(data.data).map(task => `
              <tr>
                <td>${task.id}</td>
                <td>${escapeHtml(task.title || '任务')}</td>
                <td>${escapeHtml(task.business_name || '-')}</td>
                <td><span class="badge ${getStatusClass(task.status)}">${getStatusText(task.status)}</span></td>
                <td>${task.created_at || '-'}</td>
                <td>
                  <button class="btn btn-sm btn-outline-secondary" onclick="viewTask(${task.id})">查看</button>
                  ${task.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="approveTask(${task.id})">通过</button>` : ''}
                </td>
              </tr>
            `).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无任务</td></tr>';
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function viewTask(id) {
      window.location.href = `/admin/task_review.html?id=${id}`;
    }

    function approveTask(id) {
      if (!confirm('确认通过此任务？')) return;

      apiRequest(`/admin/tasks/${id}/approve`, 'POST')
        .then(data => {
          if (data.code === 0) {
            showToast('已通过', 'success');
            loadTasks();
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function getStatusClass(status) {
      const classes = { 'pending': 'bg-warning', 'published': 'bg-success', 'completed': 'bg-info', 'cancelled': 'bg-secondary' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待审核', 'published': '已发布', 'completed': '已完成', 'cancelled': '已取消' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadTasks();
  </script>
</body>
</html>
{{ end }}
