{{ template "layout.html" . }}

{{ define "title" }}任务管理 - 创意喵{{ end }}

{{ define "content" }}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/admin/dashboard.html" class="list-group-item list-group-item-action">首页</a>
      <a href="/admin/user_list.html" class="list-group-item list-group-item-action">用户管理</a>
      <a href="/admin/task_list.html" class="list-group-item list-group-item-action active">任务管理</a>
      <a href="/admin/appeal_list.html" class="list-group-item list-group-item-action">申诉处理</a>
    </div>
  </div>
  <div class="col-md-9">
    <h2>任务管理</h2>
    <div class="card mt-4">
      <div class="card-body">
        <div class="d-flex justify-content-between mb-3">
          <div class="btn-group">
            <button type="button" class="btn btn-outline-primary btn-sm active" data-status="all">全部</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="0">草稿</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="1">招募中</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="2">投稿结束</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="3">评选中</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="4">已结束</button>
          </div>
        </div>
        <table class="table table-hover">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>商家</th>
              <th>状态</th>
              <th>投稿数</th>
              <th>预算</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="task-list">
            <tr>
              <td colspan="7" class="text-center py-4 text-muted">加载中...</td>
            </tr>
          </tbody>
        </table>
        <nav>
          <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>
</div>

<!-- 任务详情 Modal -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">任务详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="task-modal-content">
        加载中...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script>
const statusMap = {
  0: { label: '草稿', class: 'bg-secondary' },
  1: { label: '招募中', class: 'bg-success' },
  2: { label: '投稿结束', class: 'bg-info' },
  3: { label: '评选中', class: 'bg-warning' },
  4: { label: '已结束', class: 'bg-dark' }
};

const categoryMap = {
  1: '文案创作',
  2: '设计创意',
  3: '视频制作',
  4: '摄影拍照',
  5: '音乐音频',
  6: '程序开发',
  7: '其他'
};

let currentStatus = 'all';
let currentPage = 1;
const pageSize = 20;

if (!requireAuth() || getUserRole() !== 'admin') {
  // 已重定向
} else {
  loadTasks();

  // 状态筛选按钮
  document.querySelectorAll('[data-status]').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentStatus = this.dataset.status;
      currentPage = 1;
      loadTasks();
    });
  });
}

function loadTasks() {
  let url = '/admin/tasks?limit=' + pageSize + '&offset=' + ((currentPage - 1) * pageSize);
  if (currentStatus !== 'all') {
    url += '&status=' + currentStatus;
  }

  apiRequest(url)
    .then(data => {
      if (data.code === 0) {
        renderTasks(data.data.tasks || []);
        renderPagination(data.data.total || 0);
      } else {
        document.getElementById('task-list').innerHTML =
          '<tr><td colspan="7" class="text-center py-4 text-danger">加载失败</td></tr>';
      }
    })
    .catch(() => {
      document.getElementById('task-list').innerHTML =
        '<tr><td colspan="7" class="text-center py-4 text-danger">加载失败</td></tr>';
    });
}

function renderTasks(tasks) {
  const tbody = document.getElementById('task-list');
  if (tasks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">暂无任务</td></tr>';
    return;
  }

  tbody.innerHTML = tasks.map(task => {
    const status = statusMap[task.status] || statusMap[0];
    const category = categoryMap[task.category] || '其他';
    const deadline = task.end_at ? new Date(task.end_at).toLocaleDateString('zh-CN') : '-';

    return `
      <tr>
        <td>${task.id}</td>
        <td>
          <a href="#" onclick="viewTask(${task.id}); return false;">${escapeHtml(task.title)}</a>
          <br><small class="text-muted">${category}</small>
        </td>
        <td>${escapeHtml(task.business_name || '商家' + task.business_id)}</td>
        <td><span class="badge ${status.class}">${status.label}</span></td>
        <td>${task.submission_count || 0}</td>
        <td>¥${task.total_budget || 0}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary" onclick="viewTask(${task.id})">查看</button>
        </td>
      </tr>
    `;
  }).join('');
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / pageSize);
  const pagination = document.getElementById('pagination');
  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }

  let html = '';
  if (currentPage > 1) {
    html += '<li class="page-item"><a class="page-link" href="#" onclick="return goToPage(' + (currentPage - 1) + ')">上一页</a></li>';
  }
  for (let i = 1; i <= totalPages; i++) {
    html += '<li class="page-item' + (i === currentPage ? ' active' : '') + '"><a class="page-link" href="#" onclick="return goToPage(' + i + ')">' + i + '</a></li>';
  }
  if (currentPage < totalPages) {
    html += '<li class="page-item"><a class="page-link" href="#" onclick="return goToPage(' + (currentPage + 1) + ')">下一页</a></li>';
  }
  pagination.innerHTML = html;
}

function goToPage(page) {
  currentPage = page;
  loadTasks();
  return false;
}

function viewTask(taskId) {
  apiRequest('/tasks/' + taskId)
    .then(data => {
      if (data.code === 0) {
        const task = data.data;
        const status = statusMap[task.status] || statusMap[0];
        const category = categoryMap[task.category] || '其他';
        const deadline = task.end_at ? new Date(task.end_at).toLocaleString('zh-CN') : '-';
        const createdAt = new Date(task.created_at).toLocaleString('zh-CN');

        document.getElementById('task-modal-content').innerHTML = `
          <div class="row">
            <div class="col-md-8">
              <h4>${escapeHtml(task.title)}</h4>
              <p class="text-muted">${escapeHtml(task.description)}</p>
            </div>
            <div class="col-md-4">
              <p><strong>状态：</strong><span class="badge ${status.class}">${status.label}</span></p>
              <p><strong>类别：</strong>${category}</p>
              <p><strong>预算：</strong>¥${task.total_budget || 0}</p>
              <p><strong>截止日期：</strong>${deadline}</p>
              <p><strong>创建时间：</strong>${createdAt}</p>
            </div>
          </div>
        `;
        new bootstrap.Modal(document.getElementById('taskModal')).show();
      } else {
        showError('加载失败');
      }
    })
    .catch(handleApiError);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
{{ end }}
