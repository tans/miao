{{ template "layout.html" . }}

{{ define "title" }}任务管理 - 创意喵{{ end }}

{{ define "content" }}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/admin/dashboard.html" class="list-group-item list-group-item-action">首页</a>
      <a href="/admin/user_list.html" class="list-group-item list-group-item-action">用户管理</a>
      <a href="/admin/task_list.html" class="list-group-item list-group-item-action active">任务管理</a>
      <a href="/admin/appeal_list.html" class="list-group-item list-group-item-action">申诉处理</a>
    </div>
  </div>
  <div class="col-md-9">
    <h2>任务管理</h2>
    <div class="card mt-4">
      <div class="card-body">
        <div class="d-flex justify-content-between mb-3">
          <div class="btn-group">
            <button type="button" class="btn btn-outline-primary btn-sm active" data-status="all">全部</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="pending">待审核</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="approved">已通过</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="rejected">已拒绝</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="published">已发布</button>
            <button type="button" class="btn btn-outline-primary btn-sm" data-status="completed">已完成</button>
          </div>
        </div>
        <table class="table table-hover">
          <thead>
            <tr>
              <th>ID</th>
              <th>标题</th>
              <th>商家</th>
              <th>状态</th>
              <th>单价/数量</th>
              <th>审核时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="task-list">
            <tr>
              <td colspan="7" class="text-center py-4 text-muted">加载中...</td>
            </tr>
          </tbody>
        </table>
        <nav>
          <ul class="pagination justify-content-center" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>
</div>

<!-- 任务详情 Modal -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">任务详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="task-modal-content">
        加载中...
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script>
const statusMap = {
  'pending': { label: '待审核', class: 'bg-warning' },
  'approved': { label: '已通过', class: 'bg-success' },
  'rejected': { label: '已拒绝', class: 'bg-danger' },
  'published': { label: '已发布', class: 'bg-primary' },
  'in_progress': { label: '进行中', class: 'bg-info' },
  'completed': { label: '已完成', class: 'bg-secondary' },
  'cancelled': { label: '已取消', class: 'bg-dark' }
};

let currentStatus = 'all';
let currentPage = 1;
const pageSize = 20;

if (!requireAuth() || getUserRole() !== 'admin') {
  // 已重定向
} else {
  loadTasks();

  // 状态筛选按钮
  document.querySelectorAll('[data-status]').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentStatus = this.dataset.status;
      currentPage = 1;
      loadTasks();
    });
  });
}

function loadTasks() {
  let url = '/api/v1/admin/tasks?page=' + currentPage + '&page_size=' + pageSize;
  if (currentStatus !== 'all') {
    url += '&status=' + currentStatus;
  }

  const token = localStorage.getItem('token');
  fetch(url, {
    headers: { 'Authorization': `Bearer ${token}` }
  })
    .then(res => res.json())
    .then(data => {
      if (data.code === 0) {
        renderTasks(data.data.tasks || []);
        renderPagination(data.data.total || 0);
      } else {
        document.getElementById('task-list').innerHTML =
          '<tr><td colspan="7" class="text-center py-4 text-danger">加载失败: ' + data.message + '</td></tr>';
      }
    })
    .catch(err => {
      document.getElementById('task-list').innerHTML =
        '<tr><td colspan="7" class="text-center py-4 text-danger">加载失败</td></tr>';
    });
}

function renderTasks(tasks) {
  const tbody = document.getElementById('task-list');
  if (tasks.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">暂无任务</td></tr>';
    return;
  }

  tbody.innerHTML = tasks.map(task => {
    const status = statusMap[task.status] || { label: task.status, class: 'bg-secondary' };
    const reviewTime = task.reviewed_at ? new Date(task.reviewed_at).toLocaleString() : '-';

    return `
      <tr>
        <td>${task.id}</td>
        <td>
          <a href="#" onclick="viewTask(${task.id}); return false;">${escapeHtml(task.title)}</a>
          ${task.reject_reason ? '<br><small class="text-danger">拒绝理由: ' + escapeHtml(task.reject_reason) + '</small>' : ''}
        </td>
        <td>${escapeHtml(task.business_name || '商家' + task.business_id)}</td>
        <td><span class="badge ${status.class}">${status.label}</span></td>
        <td>¥${task.price} × ${task.quantity}</td>
        <td><small>${reviewTime}</small></td>
        <td>
          <a href="/admin/task_review.html?id=${task.id}" class="btn btn-sm btn-outline-primary">查看</a>
          ${task.status === 'pending' ? `
            <button class="btn btn-sm btn-success" onclick="quickApprove(${task.id}); return false;">通过</button>
            <button class="btn btn-sm btn-danger" onclick="quickReject(${task.id}); return false;">拒绝</button>
          ` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / pageSize);
  const pagination = document.getElementById('pagination');
  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }

  let html = '';
  if (currentPage > 1) {
    html += '<li class="page-item"><a class="page-link" href="#" onclick="return goToPage(' + (currentPage - 1) + ')">上一页</a></li>';
  }

  const startPage = Math.max(1, currentPage - 2);
  const endPage = Math.min(totalPages, currentPage + 2);

  for (let i = startPage; i <= endPage; i++) {
    html += '<li class="page-item' + (i === currentPage ? ' active' : '') + '"><a class="page-link" href="#" onclick="return goToPage(' + i + ')">' + i + '</a></li>';
  }

  if (currentPage < totalPages) {
    html += '<li class="page-item"><a class="page-link" href="#" onclick="return goToPage(' + (currentPage + 1) + ')">下一页</a></li>';
  }
  pagination.innerHTML = html;
}

function goToPage(page) {
  currentPage = page;
  loadTasks();
  return false;
}

function viewTask(taskId) {
  window.location.href = '/admin/task_review.html?id=' + taskId;
}

// 快速通过
function quickApprove(taskId) {
  confirmDialog('确定要通过这个任务的审核吗？', async () => {
    try {
      showLoading('处理中...');
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/v1/admin/tasks/${taskId}/approve`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!response.ok) throw new Error('审核失败');

      const result = await response.json();
      if (result.code !== 0) throw new Error(result.message);

      hideLoading();
      showSuccess('审核通过');
      loadTasks();
    } catch (error) {
      hideLoading();
      showError(error.message);
    }
  });
  return false;
}

// 快速拒绝
function quickReject(taskId) {
  const reason = prompt('请输入拒绝理由：');
  if (!reason || !reason.trim()) {
    showError('请输入拒绝理由');
    return false;
  }

  confirmDialog('确定要拒绝这个任务吗？', async () => {
    try {
      showLoading('处理中...');
      const token = localStorage.getItem('token');
      const response = await fetch(`/api/v1/admin/tasks/${taskId}/reject`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ reason: reason.trim() })
      });

      if (!response.ok) throw new Error('审核失败');

      const result = await response.json();
      if (result.code !== 0) throw new Error(result.message);

      hideLoading();
      showSuccess('已拒绝任务');
      loadTasks();
    } catch (error) {
      hideLoading();
      showError(error.message);
    }
  });
  return false;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
{{ end }}
