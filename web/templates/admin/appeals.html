<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申诉管理 - 创意喵管理后台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f5f6f8; }
    .admin-sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 240px; background: #343a40; color: white; z-index: 1000; }
    .admin-content { margin-left: 240px; padding: 20px; }
    .nav-link { color: rgba(255,255,255,0.8); }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.1); }
    .nav-link.active { color: white; background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="admin-sidebar p-3">
    <h5 class="mb-4"><i class="bi bi-hexagon"></i> 创意喵管理</h5>
    <nav class="nav flex-column">
      <a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-speedometer2 me-2"></i>仪表板</a>
      <a href="/admin/users.html" class="nav-link"><i class="bi bi-people me-2"></i>用户管理</a>
      <a href="/admin/tasks.html" class="nav-link"><i class="bi bi-list-task me-2"></i>任务审核</a>
      <a href="/admin/appeals.html" class="nav-link active"><i class="bi bi-chat-left-text me-2"></i>申诉管理</a>
      <a href="/admin/finance.html" class="nav-link"><i class="bi bi-wallet2 me-2"></i>资金管理</a>
    </nav>
  </div>

  <div class="admin-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="mb-0">申诉管理</h4>
    </div>

    <!-- 筛选器 -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-3">
            <label class="form-label">申诉状态</label>
            <select class="form-select" id="status-filter">
              <option value="">全部</option>
              <option value="pending">待处理</option>
              <option value="processing">处理中</option>
              <option value="approved">已通过</option>
              <option value="rejected">已驳回</option>
            </select>
          </div>
          <div class="col-md-4">
            <button class="btn btn-primary" onclick="loadAppeals(1)">筛选</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 申诉列表 -->
    <div class="card">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>申诉人</th>
                <th>原因</th>
                <th>状态</th>
                <th>时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="appeals-list">
              <tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 分页 -->
    <div id="pagination-container" class="d-flex justify-content-center mt-4"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 15;

    document.addEventListener('DOMContentLoaded', function() {
      loadAppeals(1);
    });

    function loadAppeals(page) {
      currentPage = page;
      const token = localStorage.getItem('admin_token') || localStorage.getItem('token');
      if (!token) {
        alert('请先登录');
        window.location.href = '/admin/login.html';
        return;
      }

      fetch(`/api/v1/admin/appeals?page=${page}&page_size=${pageSize}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(data => {
        const tbody = document.getElementById('appeals-list');
        if (data.code === 0 && data.data && data.data.length > 0) {
          tbody.innerHTML = data.data.map(appeal => `
            <tr>
              <td>${appeal.id}</td>
              <td>${escapeHtml(appeal.username || '-')}</td>
              <td>${escapeHtml(appeal.reason || '-')}</td>
              <td><span class="badge ${getStatusClass(appeal.status)}">${getStatusText(appeal.status)}</span></td>
              <td>${appeal.created_at || '-'}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary" onclick="viewAppeal(${appeal.id})">详情</button>
              </td>
            </tr>
          `).join('');
          renderPagination(data.data.total || 0);
        } else {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">暂无申诉</td></tr>';
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById('appeals-list').innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">加载失败</td></tr>';
      });
    }

    function getStatusClass(status) {
      const classes = { 1: 'bg-warning text-dark', 2: 'bg-info', 3: 'bg-success', 4: 'bg-danger' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 1: '待处理', 2: '处理中', 3: '已完成', 4: '已驳回' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function viewAppeal(id) {
      alert('详情功能开发中');
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / pageSize);
      const container = document.getElementById('pagination-container');
      if (totalPages <= 1) { container.innerHTML = ''; return; }
      let html = '<nav><ul class="pagination">';
      for (let i = 1; i <= totalPages; i++) {
        html += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="loadAppeals(${i}); return false;">${i}</a></li>`;
      }
      html += '</ul></nav>';
      container.innerHTML = html;
    }
  </script>
</body>
</html>
