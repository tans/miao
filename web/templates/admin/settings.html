{{define "admin/settings.html"}}
{{template "layout.html" .}}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">系统设置</h4>
</div>

<!-- 审核设置 -->
<div class="card mb-4">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-clock-history me-2"></i>审核设置</h6>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">商家审核天数</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="setting-review-days" value="{{.Settings.ReviewDays}}" min="1" max="30">
                        <span class="input-group-text">天</span>
                    </div>
                    <div class="form-text">商家发布任务后，需在此天数内完成审核。超时后自动发放参与奖。</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">任务默认提交期限</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="setting-submit-days" value="{{.Settings.SubmitDays}}" min="1" max="30">
                        <span class="input-group-text">天</span>
                    </div>
                    <div class="form-text">创作者认领任务后，需在此天数内提交作品。</div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">默认审核宽限期</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="setting-grace-days" value="{{.Settings.GraceDays}}" min="0" max="14">
                        <span class="input-group-text">天</span>
                    </div>
                    <div class="form-text">商家审核截止后，额外宽限期。超时后自动采纳作品。</div>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="saveReviewSettings()">
            <i class="bi bi-check-lg me-1"></i> 保存设置
        </button>
    </div>
</div>

<!-- 举报处理设置 -->
<div class="card mb-4">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>举报处理设置</h6>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <i class="bi bi-info-circle me-2"></i>
            举报处理流程：每个任务的举报会触发平台介入。根据处理结果，商家可获得退款。
        </div>
        <div class="mb-3">
            <label class="form-label">默认举报处理方式</label>
            <select class="form-select" id="setting-report-action">
                <option value="1" {{if eq .Settings.ReportAction 1}}selected{{end}}>强制采纳</option>
                <option value="2" {{if eq .Settings.ReportAction 2}}selected{{end}}>强制淘汰</option>
                <option value="3" {{if eq .Settings.ReportAction 3}}selected{{end}}>举报成立</option>
            </select>
            <div class="form-text">当商家举报创作者提交内容时，默认执行的处理方式。</div>
        </div>
        <button class="btn btn-primary" onclick="saveReportSettings()">
            <i class="bi bi-check-lg me-1"></i> 保存设置
        </button>
    </div>
</div>

<!-- 奖金设置 -->
<div class="card mb-4">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-cash-stack me-2"></i>奖金与奖励设置</h6>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">最低参与奖励</label>
                    <div class="input-group">
                        <span class="input-group-text">¥</span>
                        <input type="number" class="form-control" id="setting-min-unit-price" value="{{.Settings.MinUnitPrice}}" min="2" step="0.01">
                    </div>
                    <div class="form-text">创作者参与任务的最低奖励金额。</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">最低采纳奖励</label>
                    <div class="input-group">
                        <span class="input-group-text">¥</span>
                        <input type="number" class="form-control" id="setting-min-award-price" value="{{.Settings.MinAwardPrice}}" min="8" step="0.01">
                    </div>
                    <div class="form-text">作品被采纳时的最低额外奖励。</div>
                </div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="saveRewardSettings()">
            <i class="bi bi-check-lg me-1"></i> 保存设置
        </button>
    </div>
</div>

<script>
function showToast(msg, type) {
    const c = document.getElementById('toast-container');
    const id = 'toast-' + Date.now();
    c.innerHTML += `<div id="${id}" class="toast align-items-center text-white bg-${type} border-0" role="alert"><div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`;
    new bootstrap.Toast(document.getElementById(id)).show();
}

async function saveReviewSettings() {
    const settings = {
        review_days: parseInt(document.getElementById('setting-review-days').value) || 7,
        submit_days: parseInt(document.getElementById('setting-submit-days').value) || 7,
        grace_days: parseInt(document.getElementById('setting-grace-days').value) || 7,
    };

    try {
        const token = localStorage.getItem('token');
        const res = await fetch('/api/v1/admin/settings', {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(settings)
        });
        const data = await res.json();
        if (data.code === 0) {
            showToast('设置保存成功', 'success');
        } else {
            showToast(data.message || '保存失败', 'danger');
        }
    } catch (e) {
        showToast('保存失败', 'danger');
    }
}

async function saveReportSettings() {
    const settings = {
        report_action: parseInt(document.getElementById('setting-report-action').value) || 1,
    };

    try {
        const token = localStorage.getItem('token');
        const res = await fetch('/api/v1/admin/settings', {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(settings)
        });
        const data = await res.json();
        if (data.code === 0) {
            showToast('设置保存成功', 'success');
        } else {
            showToast(data.message || '保存失败', 'danger');
        }
    } catch (e) {
        showToast('保存失败', 'danger');
    }
}

async function saveRewardSettings() {
    const settings = {
        min_unit_price: parseFloat(document.getElementById('setting-min-unit-price').value) || 2.0,
        min_award_price: parseFloat(document.getElementById('setting-min-award-price').value) || 8.0,
    };

    try {
        const token = localStorage.getItem('token');
        const res = await fetch('/api/v1/admin/settings', {
            method: 'PUT',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(settings)
        });
        const data = await res.json();
        if (data.code === 0) {
            showToast('设置保存成功', 'success');
        } else {
            showToast(data.message || '保存失败', 'danger');
        }
    } catch (e) {
        showToast('保存失败', 'danger');
    }
}
</script>
{{end}}
