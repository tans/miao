{{ define "admin/dashboard.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据概览 - 创意喵</title>
  <link rel="preconnect" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preconnect" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
  <link rel="preload" as="style" href="/static/css/admin-industrial.css">
  <link rel="stylesheet" href="/static/css/admin-industrial.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/admin-industrial.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="/admin/dashboard.html" class="sidebar-brand"><i class="bi bi-hexagon-fill"></i> 创意喵</a></div>
    <nav class="sidebar-nav">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/admin/dashboard.html" class="nav-link active"><i class="bi bi-speedometer2"></i> 数据概览</a></li>
        <li class="nav-item"><a href="/admin/users.html" class="nav-link"><i class="bi bi-people"></i> 用户管理</a></li>
        <li class="nav-item"><a href="/admin/tasks.html" class="nav-link"><i class="bi bi-list-task"></i> 任务管理</a></li>
        <li class="nav-item"><a href="/admin/works.html" class="nav-link"><i class="bi bi-image"></i> 作品管理</a></li>
        <li class="nav-item"><a href="/admin/inspirations.html" class="nav-link"><i class="bi bi-stars"></i> 灵感管理</a></li>
        <li class="nav-item"><a href="/admin/appeals.html" class="nav-link"><i class="bi bi-exclamation-triangle"></i> 申诉管理</a></li>
        <li class="nav-item"><a href="/admin/finance.html" class="nav-link"><i class="bi bi-wallet2"></i> 资金管理</a></li>
        <li class="nav-item"><a href="/admin/database.html" class="nav-link"><i class="bi bi-database"></i> 数据表管理</a></li>
      </ul>
      <hr>
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-house"></i> 返回前台</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <h5>数据概览</h5>
        <div class="text-muted small">了解平台整体运营数据与关键待办</div>
      </div>
      <div><span id="admin-username" class="text-muted">管理员</span></div>
    </header>

    <div class="admin-content">
      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <a href="/admin/users.html" class="text-decoration-none">
            <div class="card stat-card"><div class="card-body text-center">
              <div class="stat-icon text-primary mb-2"><i class="bi bi-people-fill" style="font-size: 1.75rem;"></i></div>
              <div class="stat-value" id="total-users">-</div><div class="stat-label">总用户数</div>
            </div></div>
          </a>
        </div>
        <div class="col-md-3">
          <a href="/admin/tasks.html" class="text-decoration-none">
            <div class="card stat-card"><div class="card-body text-center">
              <div class="stat-icon text-success mb-2"><i class="bi bi-list-task" style="font-size: 1.75rem;"></i></div>
              <div class="stat-value" id="total-tasks">-</div><div class="stat-label">总任务数</div>
            </div></div>
          </a>
        </div>
        <div class="col-md-3">
          <a href="/admin/finance.html" class="text-decoration-none">
            <div class="card stat-card"><div class="card-body text-center">
              <div class="stat-icon text-warning mb-2"><i class="bi bi-currency-dollar" style="font-size: 1.75rem;"></i></div>
              <div class="stat-value" id="total-transactions">-</div><div class="stat-label">总交易额</div>
            </div></div>
          </a>
        </div>
        <div class="col-md-3">
          <a href="/admin/appeals.html" class="text-decoration-none">
            <div class="card stat-card"><div class="card-body text-center">
              <div class="stat-icon text-danger mb-2"><i class="bi bi-exclamation-triangle-fill" style="font-size: 1.75rem;"></i></div>
              <div class="stat-value" id="pending-appeals">-</div><div class="stat-label">待处理申诉</div>
            </div></div>
          </a>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-4"><div class="card h-100"><div class="card-header"><h6 class="mb-0">用户统计</h6></div><div class="card-body"><canvas id="userChart" height="160"></canvas></div></div></div>
        <div class="col-md-4"><div class="card h-100"><div class="card-header"><h6 class="mb-0">任务统计</h6></div><div class="card-body"><canvas id="taskChart" height="160"></canvas></div></div></div>
        <div class="col-md-4"><div class="card h-100"><div class="card-header"><h6 class="mb-0">交易趋势</h6></div><div class="card-body"><canvas id="transactionChart" height="160"></canvas></div></div></div>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center"><h6 class="mb-0">待审核任务</h6><a href="/admin/tasks.html" class="btn btn-sm btn-outline-primary">查看全部</a></div>
            <div class="card-body p-0"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>任务标题</th><th>商家</th><th>操作</th></tr></thead><tbody id="pending-tasks-list"><tr><td colspan="4" class="text-center text-muted py-3">加载中...</td></tr></tbody></table></div></div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center"><h6 class="mb-0">待处理申诉</h6><a href="/admin/appeals.html" class="btn btn-sm btn-outline-primary">查看全部</a></div>
            <div class="card-body p-0"><div class="table-responsive"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>任务</th><th>申诉人</th><th>状态</th><th>操作</th></tr></thead><tbody id="pending-appeals-list"><tr><td colspan="5" class="text-center text-muted py-3">加载中...</td></tr></tbody></table></div></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script defer src="/static/js/admin.js"></script>
  <script>
    let userChart, taskChart, transactionChart;

    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAdminAuth()) return;
      setAdminUsername();
      loadDashboard(); loadPendingTasks(); loadPendingAppeals(); initCharts();
    });

    function loadDashboard() {
      const token = localStorage.getItem('token');
      fetch('/api/v1/admin/dashboard', { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => {
          if (data.code === 0) {
            const s = data.data || {};
            document.getElementById('total-users').textContent = s.total_users || 0;
            document.getElementById('total-tasks').textContent = s.total_tasks || 0;
            document.getElementById('total-transactions').textContent = '¥' + ((s.total_transaction_amount || 0) / 100).toFixed(2);
            document.getElementById('pending-appeals').textContent = s.pending_appeals || 0;
            updateCharts(s);
          }
        }).catch(console.error);
    }

    function loadPendingTasks() {
      const token = localStorage.getItem('token');
      fetch('/api/v1/admin/tasks?status=pending&limit=5', { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => {
          const b = document.getElementById('pending-tasks-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            b.innerHTML = data.data.slice(0, 5).map(t => `<tr><td>${t.id}</td><td>${escapeHtml(t.title||'任务')}</td><td>${escapeHtml(t.business_name||'-')}</td><td><a href="/admin/tasks.html" class="btn btn-sm btn-success">审核</a></td></tr>`).join('');
          } else { b.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">暂无待审核任务</td></tr>'; }
        }).catch(e => { console.error(e); document.getElementById('pending-tasks-list').innerHTML = '<tr><td colspan="4" class="text-center text-danger py-3">加载失败</td></tr>'; });
    }

    function loadPendingAppeals() {
      const token = localStorage.getItem('token');
      fetch('/api/v1/admin/appeals?status=pending&limit=5', { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => {
          const b = document.getElementById('pending-appeals-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            b.innerHTML = data.data.slice(0, 5).map(a => `<tr><td>${a.id}</td><td>${escapeHtml(a.task_title||'任务')}</td><td>${escapeHtml(a.creator_name||'-')}</td><td><span class="badge bg-warning text-dark">待处理</span></td><td><a href="/admin/appeals.html" class="btn btn-sm btn-success">处理</a></td></tr>`).join('');
          } else { b.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">暂无待处理申诉</td></tr>'; }
        }).catch(e => { console.error(e); document.getElementById('pending-appeals-list').innerHTML = '<tr><td colspan="5" class="text-center text-danger py-3">加载失败</td></tr>'; });
    }

    function initCharts() {
      const o = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { padding: 15, usePointStyle: true } } } };
      userChart = new Chart(document.getElementById('userChart').getContext('2d'), { type: 'doughnut', data: { labels: ['商家','创作者','管理员'], datasets: [{ data: [0,0,0], backgroundColor: ['#5AB9EA','#88D8B0','#FAB1A0'] }] }, options: o });
      taskChart = new Chart(document.getElementById('taskChart').getContext('2d'), { type: 'doughnut', data: { labels: ['待审核','进行中','已完成','已取消'], datasets: [{ data: [0,0,0,0], backgroundColor: ['#FDCB6E','#5AB9EA','#88D8B0','#B2BEC3'] }] }, options: o });
      transactionChart = new Chart(document.getElementById('transactionChart').getContext('2d'), { type: 'line', data: { labels: ['1月','2月','3月','4月','5月','6月'], datasets: [{ label: '交易额', data: [0,0,0,0,0,0], borderColor: '#e94560', backgroundColor: 'rgba(233,69,96,0.1)', fill: true, tension: 0.4 }] }, options: { ...o, scales: { y: { beginAtZero: true } } } });
    }

    function updateCharts(s) {
      if (userChart) { userChart.data.datasets[0].data = [s.total_businesses||0, s.total_creators||0, s.total_admins||0]; userChart.update(); }
      if (taskChart) { taskChart.data.datasets[0].data = [s.pending_tasks||0, s.active_tasks||0, s.completed_tasks||0, s.cancelled_tasks||0]; taskChart.update(); }
      if (transactionChart && s.monthly_transactions) { transactionChart.data.labels = s.monthly_transactions.labels||['1月','2月','3月','4月','5月','6月']; transactionChart.data.datasets[0].data = s.monthly_transactions.values||[0,0,0,0,0,0]; transactionChart.update(); }
    }
  </script>
</body>
</html>
{{ end }}
