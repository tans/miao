{{ define "admin/dashboard.html" }}
{{ template "admin/layout.html" . }}
{{ define "title" }}数据概览 - 管理后台{{ end }}

{{ define "content" }}
<div class="row g-4 mb-4">
  <div class="col-md-3">
    <div class="card stat-card">
      <div class="card-body text-center">
        <div class="stat-icon text-primary mb-3">
          <i class="bi bi-people-fill" style="font-size: 2.5rem;"></i>
        </div>
        <div class="stat-value" id="total-users">-</div>
        <div class="stat-label">总用户数</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card stat-card">
      <div class="card-body text-center">
        <div class="stat-icon text-success mb-3">
          <i class="bi bi-list-task" style="font-size: 2.5rem;"></i>
        </div>
        <div class="stat-value" id="total-tasks">-</div>
        <div class="stat-label">总任务数</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card stat-card">
      <div class="card-body text-center">
        <div class="stat-icon text-warning mb-3">
          <i class="bi bi-currency-dollar" style="font-size: 2.5rem;"></i>
        </div>
        <div class="stat-value" id="total-transactions">-</div>
        <div class="stat-label">总交易额</div>
      </div>
    </div>
  </div>
  <div class="col-md-3">
    <div class="card stat-card">
      <div class="card-body text-center">
        <div class="stat-icon text-danger mb-3">
          <i class="bi bi-exclamation-triangle-fill" style="font-size: 2.5rem;"></i>
        </div>
        <div class="stat-value" id="pending-appeals">-</div>
        <div class="stat-label">待处理申诉</div>
      </div>
    </div>
  </div>
</div>

<div class="row g-4 mb-4">
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-header">
        <h6 class="mb-0">用户统计</h6>
      </div>
      <div class="card-body">
        <canvas id="userChart" height="200"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-header">
        <h6 class="mb-0">任务统计</h6>
      </div>
      <div class="card-body">
        <canvas id="taskChart" height="200"></canvas>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card h-100">
      <div class="card-header">
        <h6 class="mb-0">交易趋势</h6>
      </div>
      <div class="card-body">
        <canvas id="transactionChart" height="200"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0">待审核任务</h6>
        <a href="/admin/tasks.html" class="btn btn-sm btn-outline-primary">查看全部</a>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>任务标题</th>
                <th>商家</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="pending-tasks-list">
              <tr><td colspan="4" class="text-center text-muted py-3">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h6 class="mb-0">待处理申诉</h6>
        <a href="/admin/appeals.html" class="btn btn-sm btn-outline-primary">查看全部</a>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th>ID</th>
                <th>任务</th>
                <th>申诉人</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="pending-appeals-list">
              <tr><td colspan="5" class="text-center text-muted py-3">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
  let userChart, taskChart, transactionChart;

  document.addEventListener('DOMContentLoaded', function() {
    loadDashboard();
    loadPendingTasks();
    loadPendingAppeals();
    initCharts();
  });

  function loadDashboard() {
    const token = localStorage.getItem('token');
    if (!token) return;

    showLoading('加载数据...');

    fetch('/api/v1/admin/dashboard', {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(data => {
      hideLoading();
      if (data.code === 0) {
        const stats = data.data || {};
        document.getElementById('total-users').textContent = stats.total_users || 0;
        document.getElementById('total-tasks').textContent = stats.total_tasks || 0;
        document.getElementById('total-transactions').textContent = '¥' + ((stats.total_transaction_amount || 0) / 100).toFixed(2);
        document.getElementById('pending-appeals').textContent = stats.pending_appeals || 0;

        // Update charts
        updateCharts(stats);
      } else {
        showError('加载失败: ' + (data.message || '未知错误'));
      }
    })
    .catch(err => {
      hideLoading();
      console.error(err);
      showError('加载失败，请稍后重试');
    });
  }

  function loadPendingTasks() {
    const token = localStorage.getItem('token');
    if (!token) return;

    fetch('/api/v1/admin/tasks?status=pending&limit=5', {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById('pending-tasks-list');
      if (data.code === 0 && data.data && data.data.length > 0) {
        tbody.innerHTML = data.data.slice(0, 5).map(task => `
          <tr>
            <td>${task.id}</td>
            <td>${escapeHtml(task.title || '任务')}</td>
            <td>${escapeHtml(task.business_name || '-')}</td>
            <td>
              <a href="/admin/tasks.html" class="btn btn-sm btn-success">审核</a>
            </td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">暂无待审核任务</td></tr>';
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById('pending-tasks-list').innerHTML = '<tr><td colspan="4" class="text-center text-danger py-3">加载失败</td></tr>';
    });
  }

  function loadPendingAppeals() {
    const token = localStorage.getItem('token');
    if (!token) return;

    fetch('/api/v1/admin/appeals?status=pending&limit=5', {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById('pending-appeals-list');
      if (data.code === 0 && data.data && data.data.length > 0) {
        tbody.innerHTML = data.data.slice(0, 5).map(appeal => `
          <tr>
            <td>${appeal.id}</td>
            <td>${escapeHtml(appeal.task_title || '任务')}</td>
            <td>${escapeHtml(appeal.creator_name || '-')}</td>
            <td><span class="badge bg-warning text-dark">待处理</span></td>
            <td>
              <a href="/admin/appeals.html" class="btn btn-sm btn-success">处理</a>
            </td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-3">暂无待处理申诉</td></tr>';
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById('pending-appeals-list').innerHTML = '<tr><td colspan="5" class="text-center text-danger py-3">加载失败</td></tr>';
    });
  }

  function initCharts() {
    const chartOptions = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            padding: 20,
            usePointStyle: true
          }
        }
      }
    };

    // User Chart - Doughnut
    const userCtx = document.getElementById('userChart').getContext('2d');
    userChart = new Chart(userCtx, {
      type: 'doughnut',
      data: {
        labels: ['商家', '创作者', '管理员'],
        datasets: [{
          data: [0, 0, 0],
          backgroundColor: ['#5AB9EA', '#88D8B0', '#FAB1A0']
        }]
      },
      options: chartOptions
    });

    // Task Chart - Doughnut
    const taskCtx = document.getElementById('taskChart').getContext('2d');
    taskChart = new Chart(taskCtx, {
      type: 'doughnut',
      data: {
        labels: ['待审核', '进行中', '已完成', '已取消'],
        datasets: [{
          data: [0, 0, 0, 0],
          backgroundColor: ['#FDCB6E', '#5AB9EA', '#88D8B0', '#B2BEC3']
        }]
      },
      options: chartOptions
    });

    // Transaction Chart - Line
    const transactionCtx = document.getElementById('transactionChart').getContext('2d');
    transactionChart = new Chart(transactionCtx, {
      type: 'line',
      data: {
        labels: ['1月', '2月', '3月', '4月', '5月', '6月'],
        datasets: [{
          label: '交易额',
          data: [0, 0, 0, 0, 0, 0],
          borderColor: '#5AB9EA',
          backgroundColor: 'rgba(90, 185, 234, 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        ...chartOptions,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  }

  function updateCharts(stats) {
    if (userChart) {
      userChart.data.datasets[0].data = [
        stats.total_businesses || 0,
        stats.total_creators || 0,
        stats.total_admins || 0
      ];
      userChart.update();
    }

    if (taskChart) {
      taskChart.data.datasets[0].data = [
        stats.pending_tasks || 0,
        stats.active_tasks || 0,
        stats.completed_tasks || 0,
        stats.cancelled_tasks || 0
      ];
      taskChart.update();
    }

    if (transactionChart && stats.monthly_transactions) {
      transactionChart.data.labels = stats.monthly_transactions.labels || ['1月', '2月', '3月', '4月', '5月', '6月'];
      transactionChart.data.datasets[0].data = stats.monthly_transactions.values || [0, 0, 0, 0, 0, 0];
      transactionChart.update();
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
{{ end }}
