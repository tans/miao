{{ define "task_review.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务审核 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { background-color: white; border-radius: 8px; padding: 1rem; }
    .sidebar .list-group-item { border: none; border-radius: 6px; margin-bottom: 0.25rem; }
    .sidebar .list-group-item.active { background-color: #0d6efd; color: white; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="sidebar">
          <div class="list-group">
            <a href="/admin/dashboard.html" class="list-group-item list-group-item-action">数据概览</a>
            <a href="/admin/user_list.html" class="list-group-item list-group-item-action">用户管理</a>
            <a href="/admin/task_list.html" class="list-group-item list-group-item-action">任务管理</a>
            <a href="/admin/task_review.html" class="list-group-item list-group-item-action active">任务审核</a>
            <a href="/admin/appeal_list.html" class="list-group-item list-group-item-action">申诉处理</a>
          </div>
        </div>
      </div>

      <div class="col-md-10">
        <div class="content-area">
          <h4 class="mb-4">任务审核</h4>

          <div id="task-review-list">
            <div class="text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2 text-muted">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const role = localStorage.getItem('current_role') || localStorage.getItem('role');
      if (role !== 'admin') {
        showError('无权访问此页面');
        setTimeout(() => window.location.href = '/auth/login.html', 1500);
        return;
      }

      loadPendingTasks();
    });

    function loadPendingTasks() {
      apiRequest('/admin/tasks?status=1', 'GET')
        .then(data => {
          if (data.code === 0) {
            renderTasks(data.data || []);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderTasks(tasks) {
      const container = document.getElementById('task-review-list');

      if (tasks.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">暂无待审核任务</div>';
        return;
      }

      container.innerHTML = tasks.map(task => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <div>
                <h5>${escapeHtml(task.title)}</h5>
                <small class="text-muted">任务ID: ${task.id} | 发布者: ${task.business_name || task.business_id}</small>
              </div>
              <span class="badge bg-warning text-dark">待审核</span>
            </div>

            <p class="text-muted">${escapeHtml(task.description).substring(0, 200)}...</p>

            <div class="row mb-3">
              <div class="col-md-3">
                <strong>单价：</strong> ¥${(task.unit_price || 0).toFixed(2)}
              </div>
              <div class="col-md-3">
                <strong>数量：</strong> ${task.total_count || 0}
              </div>
              <div class="col-md-6">
                <strong>发布时间：</strong> ${new Date(task.created_at).toLocaleString('zh-CN')}
              </div>
            </div>

            <div class="d-flex gap-2">
              <button class="btn btn-success btn-sm" onclick="reviewTask(${task.id}, 2)">
                <i class="bi bi-check-circle"></i> 通过
              </button>
              <button class="btn btn-danger btn-sm" onclick="reviewTask(${task.id}, 4)">
                <i class="bi bi-x-circle"></i> 拒绝
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function reviewTask(taskId, status) {
      const action = status === 2 ? '通过' : '拒绝';
      if (!confirm(`确定要${action}这个任务吗？`)) return;

      apiRequest('/admin/task/' + taskId + '/review', 'PUT', { status: status })
        .then(data => {
          if (data.code === 0) {
            showSuccess(`${action}成功`);
            loadPendingTasks();
          } else {
            showError(data.message || `${action}失败`);
          }
        })
        .catch(err => {
          showError(`${action}失败`);
          console.error(err);
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
