<!DOCTYPE html>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" media="print" onload="this.media='all'">

  <style id="admin-shell-style">
    body { background:#f5f6f8; }
    .admin-sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 240px; background: #fff; border-right: 1px solid #e8eaed; z-index: 1000; overflow-y: auto; }
    .admin-sidebar .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #e8eaed; }
    .admin-sidebar .sidebar-brand { font-size: 1.25rem; font-weight: 700; color: #6366f1; text-decoration: none; }
    .admin-sidebar .sidebar-nav { padding: 1rem 0; }
    .admin-sidebar .nav-link { display: flex; align-items: center; padding: 0.75rem 1rem; border-radius: 8px; color: #636e72; text-decoration: none; transition: all 0.2s ease; margin: 0.25rem 0.75rem; }
    .admin-sidebar .nav-link:hover { background: #f5f6f8; color: #6366f1; }
    .admin-sidebar .nav-link.active { background: rgba(99,102,241,0.1); color: #6366f1; }
    .admin-sidebar .nav-link i { width: 24px; margin-right: 0.75rem; }
    .admin-main { margin-left: 240px; min-height: 100vh; }
    .admin-topbar { background: #fff; border-bottom: 1px solid #e8eaed; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .admin-content { padding: 1.5rem; }
    .admin-content .container-fluid { padding-left: 0; padding-right: 0; }
    @media (max-width: 991.98px) {
      .admin-sidebar { position: static; width: 100%; height: auto; border-right: 0; border-bottom: 1px solid #e8eaed; }
      .admin-main { margin-left: 0; }
      .admin-topbar { padding: 1rem; }
      .admin-content { padding: 1rem; }
    }
  </style>
</head>
<body>
    <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="/admin/dashboard.html" class="sidebar-brand"><i class="bi bi-hexagon-fill"></i> 创意喵</a></div>
    <nav class="sidebar-nav">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> 数据概览</a></li>
        <li class="nav-item"><a href="/admin/users.html" class="nav-link"><i class="bi bi-people"></i> 用户管理</a></li>
        <li class="nav-item"><a href="/admin/tasks.html" class="nav-link active"><i class="bi bi-list-task"></i> 任务管理</a></li>
        <li class="nav-item"><a href="/admin/works.html" class="nav-link"><i class="bi bi-image"></i> 作品管理</a></li>
        <li class="nav-item"><a href="/admin/inspirations.html" class="nav-link"><i class="bi bi-stars"></i> 灵感管理</a></li>
        <li class="nav-item"><a href="/admin/appeals.html" class="nav-link"><i class="bi bi-exclamation-triangle"></i> 申诉管理</a></li>
        <li class="nav-item"><a href="/admin/finance.html" class="nav-link"><i class="bi bi-wallet2"></i> 资金管理</a></li>
        <li class="nav-item"><a href="/admin/database.html" class="nav-link"><i class="bi bi-database"></i> 数据表管理</a></li>
      </ul>
      <hr class="my-3">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-house"></i> 返回前台</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <h5 class="mb-1">任务审核</h5>
        <div class="text-muted small">审核待发布任务并给出处理结果</div>
      </div>
      <div><span id="admin-username" class="text-muted">管理员</span></div>
    </header>

    <div class="admin-content">
      <div class="container" style="max-width: 900px;">

      <div class="page-hero text-center mb-5">
        <h1 class="page-title">任务管理</h1>
        <p class="page-subtitle">审核待发布的任务</p>
      </div>

      <div id="task-detail"></div>
      </div>
    </div>
  </main>
<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('id');

    if (!taskId) {
      showToast('缺少任务ID', 'danger');
      setTimeout(() => window.location.href = '/admin/tasks.html', 1500);
    } else {
      loadTask();
    }

    function loadTask() {
      apiRequest(`/tasks/${taskId}`, 'GET')
        .then(data => {
          if (data.code === 0 && data.data) {
            const task = data.data;
            document.getElementById('task-detail').innerHTML = `
              <div class="card mb-4">
                <div class="card-body">
                  <h3 class="mb-3">${escapeHtml(task.title || '任务')}</h3>
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <div class="text-muted small">商家</div>
                      <div>${escapeHtml(task.business_name || '-')}</div>
                    </div>
                    <div class="col-md-6">
                      <div class="text-muted small">状态</div>
                      <div><span class="badge ${getStatusClass(task.status)}">${getStatusText(task.status)}</span></div>
                    </div>
                  </div>
                  <div class="mb-3">
                    <div class="text-muted small">任务描述</div>
                    <div>${escapeHtml(task.description || '-')}</div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-md-4">
                      <div class="text-muted small">任务类型</div>
                      <div>${escapeHtml(task.task_type || '-')}</div>
                    </div>
                    <div class="col-md-4">
                      <div class="text-muted small">单价</div>
                      <div>¥${task.price || 0}</div>
                    </div>
                    <div class="col-md-4">
                      <div class="text-muted small">数量</div>
                      <div>${task.quantity || 0}</div>
                    </div>
                  </div>
                  ${task.status === 'pending' ? `
                    <div class="d-grid gap-2 mt-4">
                      <button class="btn btn-success" onclick="approveTask()">通过审核</button>
                      <button class="btn btn-danger" onclick="rejectTask()">拒绝</button>
                    </div>
                  ` : ''}
                </div>
              </div>
            `;
          } else {
            showToast('加载失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function approveTask() {
      if (!confirm('确认通过此任务？')) return;

      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/task/${taskId}/review`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ approved: true, comment: '' })
      })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            showToast('已通过', 'success');
            setTimeout(() => window.location.href = '/admin/tasks.html', 1500);
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function rejectTask() {
      const reason = prompt('请输入拒绝原因：');
      if (!reason) return;

      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/task/${taskId}/review`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ approved: false, comment: reason })
      })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            showToast('已拒绝', 'success');
            setTimeout(() => window.location.href = '/admin/tasks.html', 1500);
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function getStatusClass(status) {
      const classes = { 'pending': 'bg-warning', 'published': 'bg-success', 'completed': 'bg-info', 'cancelled': 'bg-secondary' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待审核', 'published': '已发布', 'completed': '已完成', 'cancelled': '已取消' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
