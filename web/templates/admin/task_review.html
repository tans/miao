{{ define "admin/task_review.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务管理 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container" style="max-width: 900px;">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">任务管理</h1>
        <p class="page-subtitle">审核待发布的任务</p>
      </div>

      <div id="task-detail"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('id');

    if (!taskId) {
      showToast('缺少任务ID', 'danger');
      setTimeout(() => window.location.href = '/admin/tasks.html', 1500);
    } else {
      loadTask();
    }

    function loadTask() {
      apiRequest(`/tasks/${taskId}`, 'GET')
        .then(data => {
          if (data.code === 0 && data.data) {
            const task = data.data;
            document.getElementById('task-detail').innerHTML = `
              <div class="card mb-4">
                <div class="card-body">
                  <h3 class="mb-3">${escapeHtml(task.title || '任务')}</h3>
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <div class="text-muted small">商家</div>
                      <div>${escapeHtml(task.business_name || '-')}</div>
                    </div>
                    <div class="col-md-6">
                      <div class="text-muted small">状态</div>
                      <div><span class="badge ${getStatusClass(task.status)}">${getStatusText(task.status)}</span></div>
                    </div>
                  </div>
                  <div class="mb-3">
                    <div class="text-muted small">任务描述</div>
                    <div>${escapeHtml(task.description || '-')}</div>
                  </div>
                  <div class="row mb-3">
                    <div class="col-md-4">
                      <div class="text-muted small">任务类型</div>
                      <div>${escapeHtml(task.task_type || '-')}</div>
                    </div>
                    <div class="col-md-4">
                      <div class="text-muted small">单价</div>
                      <div>¥${task.price || 0}</div>
                    </div>
                    <div class="col-md-4">
                      <div class="text-muted small">数量</div>
                      <div>${task.quantity || 0}</div>
                    </div>
                  </div>
                  ${task.status === 'pending' ? `
                    <div class="d-grid gap-2 mt-4">
                      <button class="btn btn-success" onclick="approveTask()">通过审核</button>
                      <button class="btn btn-danger" onclick="rejectTask()">拒绝</button>
                    </div>
                  ` : ''}
                </div>
              </div>
            `;
          } else {
            showToast('加载失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function approveTask() {
      if (!confirm('确认通过此任务？')) return;

      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/task/${taskId}/review`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ approved: true, comment: '' })
      })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            showToast('已通过', 'success');
            setTimeout(() => window.location.href = '/admin/tasks.html', 1500);
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function rejectTask() {
      const reason = prompt('请输入拒绝原因：');
      if (!reason) return;

      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/task/${taskId}/review`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ approved: false, comment: reason })
      })
        .then(res => res.json())
        .then(data => {
          if (data.code === 0) {
            showToast('已拒绝', 'success');
            setTimeout(() => window.location.href = '/admin/tasks.html', 1500);
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function getStatusClass(status) {
      const classes = { 'pending': 'bg-warning', 'published': 'bg-success', 'completed': 'bg-info', 'cancelled': 'bg-secondary' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待审核', 'published': '已发布', 'completed': '已完成', 'cancelled': '已取消' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
