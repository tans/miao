<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申诉列表 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"></noscript>

  <style id="admin-shell-style">
    body { background:#f5f6f8; }
    .admin-sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 240px; background: #fff; border-right: 1px solid #e8eaed; z-index: 1000; overflow-y: auto; }
    .admin-sidebar .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #e8eaed; }
    .admin-sidebar .sidebar-brand { font-size: 1.25rem; font-weight: 700; color: #6366f1; text-decoration: none; }
    .admin-sidebar .sidebar-nav { padding: 1rem 0; }
    .admin-sidebar .nav-link { display: flex; align-items: center; padding: 0.75rem 1rem; border-radius: 8px; color: #636e72; text-decoration: none; transition: all 0.2s ease; margin: 0.25rem 0.75rem; }
    .admin-sidebar .nav-link:hover { background: #f5f6f8; color: #6366f1; }
    .admin-sidebar .nav-link.active { background: rgba(99,102,241,0.1); color: #6366f1; }
    .admin-sidebar .nav-link i { width: 24px; margin-right: 0.75rem; }
    .admin-main { margin-left: 240px; min-height: 100vh; }
    .admin-topbar { background: #fff; border-bottom: 1px solid #e8eaed; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .admin-content { padding: 1.5rem; }
    .admin-content .container-fluid { padding-left: 0; padding-right: 0; }
    @media (max-width: 991.98px) {
      .admin-sidebar { position: static; width: 100%; height: auto; border-right: 0; border-bottom: 1px solid #e8eaed; }
      .admin-main { margin-left: 0; }
      .admin-topbar { padding: 1rem; }
      .admin-content { padding: 1rem; }
    }
  </style>
</head>
<body>
    <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="/admin/dashboard.html" class="sidebar-brand"><i class="bi bi-hexagon-fill"></i> 创意喵</a></div>
    <nav class="sidebar-nav">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> 数据概览</a></li>
        <li class="nav-item"><a href="/admin/users.html" class="nav-link"><i class="bi bi-people"></i> 用户管理</a></li>
        <li class="nav-item"><a href="/admin/tasks.html" class="nav-link"><i class="bi bi-list-task"></i> 任务管理</a></li>
        <li class="nav-item"><a href="/admin/works.html" class="nav-link"><i class="bi bi-image"></i> 作品管理</a></li>
        <li class="nav-item"><a href="/admin/inspirations.html" class="nav-link"><i class="bi bi-stars"></i> 灵感管理</a></li>
        <li class="nav-item"><a href="/admin/appeals.html" class="nav-link active"><i class="bi bi-exclamation-triangle"></i> 申诉管理</a></li>
        <li class="nav-item"><a href="/admin/finance.html" class="nav-link"><i class="bi bi-wallet2"></i> 资金管理</a></li>
        <li class="nav-item"><a href="/admin/database.html" class="nav-link"><i class="bi bi-database"></i> 数据表管理</a></li>
      </ul>
      <hr class="my-3">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-house"></i> 返回前台</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <h5 class="mb-1">申诉列表</h5>
        <div class="text-muted small">浏览申诉记录并快速定位待处理项</div>
      </div>
      <div><span id="admin-username" class="text-muted">管理员</span></div>
    </header>

    <div class="admin-content">
      <div class="container">

      <div class="page-hero text-center mb-5">
        <h1 class="page-title">申诉处理</h1>
        <p class="page-subtitle">处理创作者提交的申诉</p>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-primary active" onclick="filterAppeals('')">全部</button>
            <button type="button" class="btn btn-outline-primary" onclick="filterAppeals('pending')">待处理</button>
            <button type="button" class="btn btn-outline-primary" onclick="filterAppeals('approved')">已通过</button>
            <button type="button" class="btn btn-outline-primary" onclick="filterAppeals('rejected')">已驳回</button>
          </div>
        </div>
      </div>

      <!-- 申诉列表 -->
      <div id="appeal-list"></div>
      </div>
    </div>
  </main>
<div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    let currentFilter = '';

    function filterAppeals(status) {
      currentFilter = status;
      document.querySelectorAll('.btn-group .btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      loadAppeals();
    }

    function loadAppeals() {
      const params = currentFilter ? `?status=${currentFilter}` : '';

      apiRequest(`/admin/appeals${params}`, 'GET')
        .then(data => {
          const container = document.getElementById('appeal-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(appeal => `
              <div class="card mb-3">
                <div class="card-body">
                  <div class="row">
                    <div class="col-md-8">
                      <h5 class="mb-2">${escapeHtml(appeal.task_title || '任务')}</h5>
                      <div class="text-muted small mb-2">创作者：${escapeHtml(appeal.creator_name || '-')} | 类型：${getAppealTypeText(appeal.appeal_type)}</div>
                      <div class="mb-2">${escapeHtml(appeal.reason || '')}</div>
                      <div class="text-muted small">提交时间：${appeal.created_at || '-'}</div>
                    </div>
                    <div class="col-md-4 text-end">
                      <span class="badge ${getStatusClass(appeal.status)} mb-2">${getStatusText(appeal.status)}</span>
                      ${appeal.status === 'pending' ? `
                        <div class="d-grid gap-2 mt-3">
                          <button class="btn btn-sm btn-success" onclick="handleAppeal(${appeal.id}, 'approved')">通过</button>
                          <button class="btn btn-sm btn-danger" onclick="handleAppeal(${appeal.id}, 'rejected')">驳回</button>
                        </div>
                      ` : ''}
                    </div>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="card"><div class="card-body text-center text-muted py-5">暂无申诉记录</div></div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('appeal-list').innerHTML = '<div class="card"><div class="card-body text-center text-danger py-5">加载失败</div></div>';
        });
    }

    function handleAppeal(id, action) {
      const reply = prompt(action === 'approved' ? '请输入处理意见（可选）：' : '请输入驳回原因：');
      if (action === 'rejected' && !reply) return;

      apiRequest(`/admin/appeals/${id}/${action}`, 'POST', { reply })
        .then(data => {
          if (data.code === 0) {
            showToast('处理成功', 'success');
            loadAppeals();
          } else {
            showToast(data.message || '操作失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function getAppealTypeText(type) {
      const texts = { 1: '验收不公', 2: '恶意拒绝', 3: '任务描述不符', 4: '其他' };
      return texts[type] || '未知';
    }

    function getStatusClass(status) {
      const classes = { 'pending': 'bg-warning', 'approved': 'bg-success', 'rejected': 'bg-danger' };
      return classes[status] || 'bg-secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待处理', 'approved': '已通过', 'rejected': '已驳回' };
      return texts[status] || status;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadAppeals();
  </script>
</body>
</html>
{{ end }}
