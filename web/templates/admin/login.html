{{ define "admin/login.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
    }
    .admin-login-card {
      max-width: 420px;
      margin: 0 auto;
      margin-top: 10vh;
    }
    .admin-login-card .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .admin-login-card .card-body {
      padding: 2.5rem;
    }
    .admin-login-card .form-control {
      padding: 12px 16px;
    }
    .admin-login-card .btn-lg {
      padding: 14px;
    }
    .admin-logo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }
  </style>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div class="container">
    <div class="admin-login-card">
      <div class="text-center mb-4">
        <div class="admin-logo">创意喵</div>
        <h4 class="text-muted">管理后台</h4>
      </div>

      <div class="card animate-scale-in">
        <div class="card-body">
          <form id="login-form">
            <div class="mb-4">
              <label class="form-label fw-medium">用户名</label>
              <input type="text" class="form-control" id="username" placeholder="请输入管理员用户名" required autocomplete="username">
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">密码</label>
              <input type="password" class="form-control" id="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>

            <div class="mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">记住登录状态</label>
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg" id="login-btn">登录</button>
            </div>
          </form>

          <div class="text-center mt-4">
            <a href="/auth/login.html" class="text-muted small">返回用户登录</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!username || !password) {
        showToast('请输入用户名和密码', 'warning');
        return;
      }

      const loginBtn = document.getElementById('login-btn');
      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';

      fetch('/api/v1/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.code === 0 && data.data && data.data.token) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user_id', data.data.user.id);
          localStorage.setItem('username', data.data.user.username);
          localStorage.setItem('role', 'admin');
          localStorage.setItem('is_admin', 'true');
          localStorage.setItem('current_role', 'admin');

          if (remember) {
            localStorage.setItem('remember_admin', 'true');
          }

          showToast('登录成功', 'success');
          setTimeout(() => {
            window.location.href = '/admin/dashboard.html';
          }, 500);
        } else {
          showToast(data.message || '登录失败', 'danger');
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      })
      .catch(err => {
        console.error(err);
        showToast('登录失败，请稍后重试', 'danger');
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      });
    });

    // Check if already logged in as admin
    if (localStorage.getItem('token') && localStorage.getItem('current_role') === 'admin') {
      window.location.href = '/admin/dashboard.html';
    }
  </script>
</body>
</html>
{{ end }}
