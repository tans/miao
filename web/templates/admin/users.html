{{ define "admin/users.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
  <link rel="preload" as="style" href="/static/css/admin-industrial.css">
  <link rel="stylesheet" href="/static/css/admin-industrial.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/admin-industrial.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="/admin/dashboard.html" class="sidebar-brand"><i class="bi bi-hexagon-fill"></i> 创意喵</a></div>
    <nav class="sidebar-nav">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> 数据概览</a></li>
        <li class="nav-item"><a href="/admin/users.html" class="nav-link active"><i class="bi bi-people"></i> 用户管理</a></li>
        <li class="nav-item"><a href="/admin/tasks.html" class="nav-link"><i class="bi bi-list-task"></i> 任务管理</a></li>
        <li class="nav-item"><a href="/admin/works.html" class="nav-link"><i class="bi bi-image"></i> 作品管理</a></li>
        <li class="nav-item"><a href="/admin/inspirations.html" class="nav-link"><i class="bi bi-stars"></i> 灵感管理</a></li>
        <li class="nav-item"><a href="/admin/appeals.html" class="nav-link"><i class="bi bi-exclamation-triangle"></i> 申诉管理</a></li>
        <li class="nav-item"><a href="/admin/finance.html" class="nav-link"><i class="bi bi-wallet2"></i> 资金管理</a></li>
        <li class="nav-item"><a href="/admin/database.html" class="nav-link"><i class="bi bi-database"></i> 数据表管理</a></li>
      </ul>
      <hr>
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-house"></i> 返回前台</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <h5>用户管理</h5>
        <div class="text-muted small">管理平台用户状态、余额与角色信息</div>
      </div>
      <div><span id="admin-username" class="text-muted">管理员</span></div>
    </header>

    <div class="admin-content">
      <div class="card mb-3">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">状态</label>
              <select class="form-select" id="status-filter">
                <option value="">全部</option>
                <option value="active">正常</option>
                <option value="disabled">已禁用</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">搜索</label>
              <input type="text" class="form-control" id="search-input" placeholder="用户名、邮箱或手机号">
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100" onclick="loadUsers(1)">筛选</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th style="width:60px;">ID</th><th>用户名</th><th>余额</th><th>角色</th><th>创建任务</th><th>领取任务</th><th>提交作品</th><th>注册时间</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="users-list"><tr><td colspan="8" class="text-center text-muted py-3">加载中...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
      <div id="pagination-container" class="d-flex justify-content-center mt-4"></div>
    </div>
  </main>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <div class="modal fade" id="balanceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">修改钱包余额</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <input type="hidden" id="balance-user-id">
          <div class="mb-3">
            <label class="form-label">当前余额</label>
            <div class="form-control-plaintext" id="current-balance">-</div>
          </div>
          <div class="mb-3">
            <label class="form-label">变更金额</label>
            <input type="number" step="0.01" class="form-control" id="balance-change" placeholder="正数增加，负数减少">
            <small class="text-muted">例如：输入 100 表示增加100元，输入 -50 表示减少50元</small>
          </div>
          <div class="mb-3">
            <label class="form-label">原因</label>
            <input type="text" class="form-control" id="balance-reason" placeholder="请输入操作原因">
          </div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-primary" onclick="submitBalanceChange()">确认修改</button><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button></div>
      </div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/admin.js"></script>
  <script>
    let currentPage = 1, pageSize = 15;

    document.addEventListener('DOMContentLoaded', function() {
      if (!checkAdminAuth()) return;
      setAdminUsername();
      loadUsers(1);
    });

    function loadUsers(page) {
      currentPage = page;
      const status = document.getElementById('status-filter').value;
      const search = document.getElementById('search-input').value;
      let params = [`page=${page}`, `page_size=${pageSize}`];
      if (status) params.push(`status=${status}`);
      if (search) params.push(`search=${encodeURIComponent(search)}`);
      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/users?${params.join('&')}`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => {
          const tbody = document.getElementById('users-list');
          if (data.code === 0 && data.data && data.data.users && data.data.users.length > 0) {
            tbody.innerHTML = data.data.users.map(u => `<tr>
              <td class="text-muted" style="font-size:0.85em;">${u.id}</td>
              <td>${escapeHtml(u.username || '-')}</td>
              <td class="text-success fw-bold">¥${u.balance || 0}</td>
              <td><span class="badge ${getRoleBadge(u.role)}">${getRoleText(u.role)}</span></td>
              <td>${u.created_tasks_count || 0}</td>
              <td>${u.claimed_tasks_count || 0}</td>
              <td>${u.submitted_works_count || 0}</td>
              <td>${u.created_at || '-'}</td>
              <td>
                <a href="/admin/user_detail.html?id=${u.id}" class="btn btn-sm btn-outline-primary me-1">详情</a>
                ${u.role !== 'admin' ? `<button class="btn btn-sm ${u.is_disabled ? 'btn-outline-success' : 'btn-outline-danger'}" onclick="toggleUserStatus(${u.id}, ${!u.is_disabled})">${u.is_disabled ? '启用' : '禁用'}</button>` : ''}
              </td>
            </tr>`).join('');
            renderPagination(Math.ceil((data.data.total || 0) / pageSize), currentPage, 'loadUsers');
          } else { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-3">暂无用户</td></tr>'; document.getElementById('pagination-container').innerHTML = ''; }
        })
        .catch(e => { console.error(e); document.getElementById('users-list').innerHTML = '<tr><td colspan="8" class="text-center text-danger py-3">加载失败</td></tr>'; });
    }

    function openBalanceModal(userId, currentBalance) {
      document.getElementById('balance-user-id').value = userId;
      document.getElementById('current-balance').textContent = '¥' + currentBalance;
      document.getElementById('balance-change').value = '';
      document.getElementById('balance-reason').value = '';
      new bootstrap.Modal(document.getElementById('balanceModal')).show();
    }

    function submitBalanceChange() {
      const userId = document.getElementById('balance-user-id').value;
      const change = parseFloat(document.getElementById('balance-change').value);
      const reason = document.getElementById('balance-reason').value.trim();
      if (isNaN(change)) { alert('请输入有效的金额'); return; }
      if (!reason) { alert('请输入操作原因'); return; }
      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/users/${userId}/balance`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ change, reason })
      }).then(r => r.json()).then(data => {
        if (data.code === 0) {
          showToast('余额修改成功', 'success');
          bootstrap.Modal.getInstance(document.getElementById('balanceModal')).hide();
        } else {
          showToast(data.message || '修改失败', 'danger');
        }
      }).catch(() => showToast('修改失败', 'danger'));
    }

    function toggleUserStatus(id, disable) {
      if (!confirm(`确认${disable ? '禁用' : '启用'}此用户？`)) return;
      const token = localStorage.getItem('token');
      const endpoint = disable ? `/api/v1/admin/users/${id}/disable` : `/api/v1/admin/users/${id}/enable`;
      fetch(endpoint, { method: disable ? 'POST' : 'DELETE', headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => { if (data.code === 0) { showToast(`用户已${disable ? '禁用' : '启用'}`, 'success'); loadUsers(currentPage); } else showToast(data.message || '操作失败', 'danger'); })
        .catch(() => showToast('操作失败', 'danger'));
    }
  </script>
</body>
</html>
{{ end }}
