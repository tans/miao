{{ define "admin/users.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 创意喵管理后台</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <style>
    :root(--color-primary: #6366f1; --color-primary-light: rgba(99,102,241,0.1);)
    body { background-color: #f5f6f8; }
    .admin-sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 240px; background: white; border-right: 1px solid #e8eaed; z-index: 1000; }
    .admin-sidebar .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #e8eaed; }
    .admin-sidebar .sidebar-brand { font-size: 1.25rem; font-weight: 700; color: var(--color-primary); text-decoration: none; }
    .admin-sidebar .nav-link { display: flex; align-items: center; padding: 0.75rem 1rem; border-radius: 8px; color: #636e72; text-decoration: none; transition: all 0.2s ease; margin: 0.25rem 0.75rem; }
    .admin-sidebar .nav-link:hover { background: #f5f6f8; color: var(--color-primary); }
    .admin-sidebar .nav-link.active { background: var(--color-primary-light); color: var(--color-primary); }
    .admin-sidebar .nav-link i { width: 24px; margin-right: 0.75rem; }
    .admin-main { margin-left: 240px; min-height: 100vh; }
    .admin-topbar { background: white; border-bottom: 1px solid #e8eaed; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .admin-topbar .breadcrumb { margin: 0; font-size: 0.9rem; }
    .admin-content { padding: 1.5rem; }
    .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 1090; }
  </style>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <a href="/admin/dashboard.html" class="sidebar-brand"><i class="bi bi-hexagon-fill"></i> 创意喵</a>
    </div>
    <nav class="sidebar-nav">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/admin/dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> 数据概览</a></li>
        <li class="nav-item"><a href="/admin/users.html" class="nav-link active"><i class="bi bi-people"></i> 用户管理</a></li>
        <li class="nav-item"><a href="/admin/tasks.html" class="nav-link"><i class="bi bi-list-task"></i> 任务管理</a></li>
        <li class="nav-item"><a href="/admin/works.html" class="nav-link"><i class="bi bi-image"></i> 作品管理</a></li>
        <li class="nav-item"><a href="/admin/appeals.html" class="nav-link"><i class="bi bi-exclamation-triangle"></i> 申诉管理</a></li>
        <li class="nav-item"><a href="/admin/finance.html" class="nav-link"><i class="bi bi-wallet2"></i> 资金管理</a></li>
        <li class="nav-item"><a href="/admin/database.html" class="nav-link"><i class="bi bi-database"></i> 数据表管理</a></li>
      </ul>
      <hr class="my-3">
      <ul class="nav flex-column">
        <li class="nav-item"><a href="/" class="nav-link"><i class="bi bi-house"></i> 返回前台</a></li>
        <li class="nav-item"><a href="#" class="nav-link" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 退出登录</a></li>
      </ul>
    </nav>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/admin/dashboard.html">管理后台</a></li>
          <li class="breadcrumb-item active" aria-current="page">用户管理</li>
        </ol>
      </nav>
      <div class="user-dropdown dropdown">
        <a class="dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span id="admin-username">管理员</span></a>
        <ul class="dropdown-menu dropdown-menu-end">
          <li><a class="dropdown-item" href="/user/profile.html">个人资料</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="#" onclick="logout()">退出登录</a></li>
        </ul>
      </div>
    </header>

    <div class="admin-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">用户管理</h4>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">状态</label>
              <select class="form-select" id="status-filter">
                <option value="">全部</option>
                <option value="active">正常</option>
                <option value="disabled">已禁用</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">搜索</label>
              <input type="text" class="form-control" id="search-input" placeholder="用户名、邮箱或手机号">
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100" onclick="loadUsers(1)">筛选</button>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th style="width:60px;">ID</th><th>用户名</th><th>余额</th><th>角色</th><th>创建任务</th><th>领取任务</th><th>提交作品</th><th>注册时间</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="users-list"><tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
      <div id="pagination-container" class="d-flex justify-content-center mt-4"></div>
    </div>
  </main>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <div class="modal fade" id="balanceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">修改钱包余额</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <input type="hidden" id="balance-user-id">
          <div class="mb-3">
            <label class="form-label">当前余额</label>
            <div class="form-control-plaintext" id="current-balance">-</div>
          </div>
          <div class="mb-3">
            <label class="form-label">变更金额</label>
            <input type="number" step="0.01" class="form-control" id="balance-change" placeholder="正数增加，负数减少">
            <small class="text-muted">例如：输入 100 表示增加100元，输入 -50 表示减少50元</small>
          </div>
          <div class="mb-3">
            <label class="form-label">原因</label>
            <input type="text" class="form-control" id="balance-reason" placeholder="请输入操作原因">
          </div>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-primary" onclick="submitBalanceChange()">确认修改</button><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button></div>
      </div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let currentPage = 1, pageSize = 15;

    document.addEventListener('DOMContentLoaded', function() {
      const token = localStorage.getItem('token');
      const currentRole = localStorage.getItem('current_role');
      if (!token || currentRole !== 'admin') { window.location.href = '/admin/login.html'; return; }
      const username = localStorage.getItem('username');
      if (username) document.getElementById('admin-username').textContent = username;
      loadUsers(1);
    });

    function loadUsers(page) {
      currentPage = page;
      const status = document.getElementById('status-filter').value;
      const search = document.getElementById('search-input').value;
      let params = [`page=${page}`, `page_size=${pageSize}`];
      if (status) params.push(`status=${status}`);
      if (search) params.push(`search=${encodeURIComponent(search)}`);
      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/users?${params.join('&')}`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => {
          const tbody = document.getElementById('users-list');
          if (data.code === 0 && data.data && data.data.users && data.data.users.length > 0) {
            tbody.innerHTML = data.data.users.map(u => `<tr>
              <td class="text-muted" style="font-size:0.85em;">${u.id}</td>
              <td>${escapeHtml(u.username || '-')}</td>
              <td class="text-success fw-bold">¥${u.balance || 0}</td>
              <td><span class="badge ${getRoleBadge(u.role)}">${getRoleText(u.role)}</span></td>
              <td>${u.created_tasks_count || 0}</td>
              <td>${u.claimed_tasks_count || 0}</td>
              <td>${u.submitted_works_count || 0}</td>
              <td>${u.created_at || '-'}</td>
              <td>
                <a href="/admin/user_detail.html?id=${u.id}" class="btn btn-sm btn-outline-primary me-1">详情</a>
                ${u.role !== 'admin' ? `<button class="btn btn-sm ${u.is_disabled ? 'btn-outline-success' : 'btn-outline-danger'}" onclick="toggleUserStatus(${u.id}, ${!u.is_disabled})">${u.is_disabled ? '启用' : '禁用'}</button>` : ''}
              </td>
            </tr>`).join('');
            renderPagination(Math.ceil((data.data.total || 0) / pageSize));
          } else { tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">暂无用户</td></tr>'; document.getElementById('pagination-container').innerHTML = ''; }
        })
        .catch(e => { console.error(e); document.getElementById('users-list').innerHTML = '<tr><td colspan="9" class="text-center text-danger py-4">加载失败</td></tr>'; });
        .catch(e => { console.error(e); document.getElementById('users-list').innerHTML = '<tr><td colspan="8" class="text-center text-danger py-4">加载失败</td></tr>'; });
    }

    function renderPagination(totalPages) {
      const c = document.getElementById('pagination-container');
      if (totalPages <= 1) { c.innerHTML = ''; return; }
      let h = '<nav><ul class="pagination">';
      h += `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadUsers(${currentPage - 1}); return false;">上一页</a></li>`;
      for (let i = 1; i <= totalPages; i++) { if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) h += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="loadUsers(${i}); return false;">${i}</a></li>`; else if (i === currentPage - 3 || i === currentPage + 3) h += '<li class="page-item disabled"><span class="page-link">...</span></li>'; }
      h += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="loadUsers(${currentPage + 1}); return false;">下一页</a></li>`;
      c.innerHTML = h + '</ul></nav>';
    }

    function renderCreatedTasks(tasks) {
      if (!tasks || tasks.length === 0) return '<div class="text-center text-muted py-3">暂无创建的任务</div>';
      return `<table class="table table-sm table-hover">
        <thead><tr><th>ID</th><th>标题</th><th>分类</th><th>单价</th><th>状态</th><th>创建时间</th></tr></thead>
        <tbody>${tasks.map(t => `<tr>
          <td>${t.id}</td>
          <td>${escapeHtml(t.title || '-')}</td>
          <td>${t.category || '-'}</td>
          <td>¥${t.unit_price || 0}</td>
          <td><span class="badge ${getTaskStatusBadge(t.status)}">${getTaskStatusText(t.status)}</span></td>
          <td>${t.created_at || '-'}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    function renderParticipatedTasks(claims) {
      if (!claims || claims.length === 0) return '<div class="text-center text-muted py-3">暂无参与的任务</div>';
      return `<table class="table table-sm table-hover">
        <thead><tr><th>ID</th><th>任务</th><th>状态</th><th>收益</th><th>创建时间</th></tr></thead>
        <tbody>${claims.map(c => `<tr>
          <td>${c.id}</td>
          <td>${escapeHtml(c.task?.title || `任务#${c.task_id}`)}</td>
          <td><span class="badge ${getClaimStatusBadge(c.status)}">${c.status_str}</span></td>
          <td>¥${c.creator_reward || 0}</td>
          <td>${c.created_at || '-'}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    function renderSubmittedWorks(works) {
      if (!works || works.length === 0) return '<div class="text-center text-muted py-3">暂无提交的作品</div>';
      return `<table class="table table-sm table-hover">
        <thead><tr><th>ID</th><th>任务</th><th>内容</th><th>验收结果</th><th>收益</th><th>提交时间</th></tr></thead>
        <tbody>${works.map(w => `<tr>
          <td>${w.id}</td>
          <td>${escapeHtml(w.task?.title || `任务#${w.task_id}`)}</td>
          <td>${escapeHtml(w.content?.substring(0, 50) || '-')}${w.content?.length > 50 ? '...' : ''}</td>
          <td><span class="badge ${getReviewResultBadge(w.review_result)}">${w.review_result_str}</span></td>
          <td>¥${w.creator_reward || 0}</td>
          <td>${w.submit_at || '-'}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }

    function openBalanceModal(userId, currentBalance) {
      document.getElementById('balance-user-id').value = userId;
      document.getElementById('current-balance').textContent = '¥' + currentBalance;
      document.getElementById('balance-change').value = '';
      document.getElementById('balance-reason').value = '';
      new bootstrap.Modal(document.getElementById('balanceModal')).show();
    }

    function submitBalanceChange() {
      const userId = document.getElementById('balance-user-id').value;
      const change = parseFloat(document.getElementById('balance-change').value);
      const reason = document.getElementById('balance-reason').value.trim();
      if (isNaN(change)) { alert('请输入有效的金额'); return; }
      if (!reason) { alert('请输入操作原因'); return; }
      const token = localStorage.getItem('token');
      fetch(`/api/v1/admin/users/${userId}/balance`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ change, reason })
      }).then(r => r.json()).then(data => {
        if (data.code === 0) {
          showToast('余额修改成功', 'success');
          bootstrap.Modal.getInstance(document.getElementById('balanceModal')).hide();
        } else {
          showToast(data.message || '修改失败', 'danger');
        }
      }).catch(() => showToast('修改失败', 'danger'));
    }

    function getRoleBadge(role) {
      const badges = { 'business': 'bg-primary', 'creator': 'bg-success', 'admin': 'bg-danger' };
      return badges[role] || 'bg-secondary';
    }
    function getRoleText(role) {
      const texts = { 'business': '商家', 'creator': '创作者', 'admin': '管理员' };
      return texts[role] || role;
    }

    function getTaskStatusBadge(status) {
      const map = { 1: 'bg-warning', 2: 'bg-success', 3: 'bg-secondary', 4: 'bg-danger', 5: 'bg-info' };
      return map[status] || 'bg-secondary';
    }
    function getTaskStatusText(status) {
      const map = { 1: '待审核', 2: '已上线', 3: '已下线', 4: '已取消', 5: '已结束' };
      return map[status] || '未知';
    }
    function getClaimStatusBadge(status) {
      const map = { 1: 'bg-info', 2: 'bg-warning', 3: 'bg-success', 4: 'bg-secondary', 5: 'bg-danger' };
      return map[status] || 'bg-secondary';
    }
    function getReviewResultBadge(result) {
      if (result === 1) return 'bg-success';
      if (result === 2) return 'bg-danger';
      return 'bg-secondary';
    }

    function toggleUserStatus(id, disable) {
      if (!confirm(`确认${disable ? '禁用' : '启用'}此用户？`)) return;
      const token = localStorage.getItem('token');
      const endpoint = disable ? `/api/v1/admin/users/${id}/disable` : `/api/v1/admin/users/${id}/enable`;
      fetch(endpoint, { method: disable ? 'POST' : 'DELETE', headers: { 'Authorization': `Bearer ${token}` } })
        .then(r => r.json())
        .then(data => { if (data.code === 0) { showToast(`用户已${disable ? '禁用' : '启用'}`, 'success'); loadUsers(currentPage); } else showToast(data.message || '操作失败', 'danger'); })
        .catch(() => showToast('操作失败', 'danger'));
    }

    function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function showToast(msg, type) { const c = document.getElementById('toast-container'); const id = 'toast-' + Date.now(); c.innerHTML += `<div id="${id}" class="toast align-items-center text-white bg-${type} border-0" role="alert"><div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>`; new bootstrap.Toast(document.getElementById(id)).show(); }
    function logout() { ['token','user_id','username','role','is_admin','current_role'].forEach(k => localStorage.removeItem(k)); window.location.href = '/admin/login.html'; }
  </script>
</body>
</html>
{{ end }}
