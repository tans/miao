<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">创意喵</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/admin/dashboard.html">管理后台</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/messages.html">消息</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="username">管理员</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/user/profile.html">个人资料</a></li>
              <li><a class="dropdown-item" href="/user/password.html">修改密码</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" onclick="logout()">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/admin/dashboard.html" class="list-group-item list-group-item-action">
            <i class="bi bi-speedometer2"></i> 数据概览
          </a>
          <a href="/admin/user_list.html" class="list-group-item list-group-item-action active">
            <i class="bi bi-people"></i> 用户管理
          </a>
          <a href="/admin/task_list.html" class="list-group-item list-group-item-action">
            <i class="bi bi-list-task"></i> 任务管理
          </a>
          <a href="/admin/appeal_list.html" class="list-group-item list-group-item-action">
            <i class="bi bi-exclamation-triangle"></i> 申诉处理
          </a>
        </div>
      </div>

      <div class="col-md-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="mb-0">用户管理</h2>
          <div class="btn-group">
            <button type="button" class="btn btn-outline-primary active" data-role="all">全部</button>
            <button type="button" class="btn btn-outline-primary" data-role="business">商家</button>
            <button type="button" class="btn btn-outline-primary" data-role="creator">创作者</button>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <div class="table-responsive">
              <table class="table table-hover">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>用户名</th>
                    <th>手机号</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>信用分</th>
                    <th>注册时间</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="user-list">
                  <tr>
                    <td colspan="8" class="text-center py-5">
                      <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                      </div>
                      <p class="mt-2 text-muted">加载用户列表...</p>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <nav>
              <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 信用分调整 Modal -->
  <div class="modal fade" id="creditModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">调整信用分</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="credit-user-id">
          <div class="mb-3">
            <label for="credit-change" class="form-label">信用分调整</label>
            <input type="number" class="form-control" id="credit-change" placeholder="输入正数增加，负数减少">
            <small class="text-muted">例如：+10 或 -5</small>
          </div>
          <div class="mb-3">
            <label for="credit-reason" class="form-label">调整原因</label>
            <input type="text" class="form-control" id="credit-reason" placeholder="输入调整原因">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="saveCreditChange()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script>
    const roleMap = {
      business: '商家',
      creator: '创作者',
      admin: '管理员'
    };

    const statusMap = {
      0: { label: '禁用', class: 'bg-danger' },
      1: { label: '正常', class: 'bg-success' }
    };

    let currentRole = 'all';
    let currentPage = 1;
    const pageSize = 20;

    if (!requireAuth() || getUserRole() !== 'admin') {
      // 已重定向
    } else {
      const user = getUser();
      if (user && user.username) {
        document.getElementById('username').textContent = user.username;
      }

      loadUsers();

      // 角色筛选按钮
      document.querySelectorAll('[data-role]').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('[data-role]').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          currentRole = this.dataset.role;
          currentPage = 1;
          loadUsers();
        });
      });
    }

    function loadUsers() {
      let url = '/api/v1/admin/users?limit=' + pageSize + '&offset=' + ((currentPage - 1) * pageSize);
      if (currentRole !== 'all') {
        url += '&role=' + currentRole;
      }

      showLoading('加载用户列表...');
      apiRequest(url, 'GET', null, false)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            renderUsers(data.data.users || []);
            renderPagination(data.data.total || 0);
          } else {
            document.getElementById('user-list').innerHTML =
              '<tr><td colspan="8" class="text-center py-5 text-danger">加载失败: ' + (data.message || '未知错误') + '</td></tr>';
          }
        })
        .catch(err => {
          hideLoading();
          console.error('加载失败:', err);
          document.getElementById('user-list').innerHTML =
            '<tr><td colspan="8" class="text-center py-5 text-danger">加载失败，请稍后重试</td></tr>';
        });
    }

    function renderUsers(users) {
      const tbody = document.getElementById('user-list');
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5 text-muted">暂无用户</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(user => {
        const role = roleMap[user.role] || user.role;
        const status = statusMap[user.status] || statusMap[1];
        const creditScore = user.credit_score || 100;
        let creditClass = 'text-success';
        if (creditScore < 50) creditClass = 'text-danger';
        else if (creditScore < 70) creditClass = 'text-warning';
        else if (creditScore < 90) creditClass = 'text-primary';

        const createdAt = user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '-';

        return `
          <tr>
            <td>${user.id}</td>
            <td>${escapeHtml(user.username)}</td>
            <td>${user.phone || '-'}</td>
            <td><span class="badge bg-secondary">${role}</span></td>
            <td><span class="badge ${status.class}">${status.label}</span></td>
            <td class="${creditClass} fw-bold">${creditScore}</td>
            <td>${createdAt}</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1" onclick="toggleStatus(${user.id}, ${user.status})">
                ${user.status === 1 ? '禁用' : '启用'}
              </button>
              <button class="btn btn-sm btn-outline-warning" onclick="openCreditModal(${user.id})">
                调整信用
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderPagination(total) {
      const totalPages = Math.ceil(total / pageSize);
      const pagination = document.getElementById('pagination');
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }

      let html = '';
      if (currentPage > 1) {
        html += '<li class="page-item"><a class="page-link" href="#" onclick="goToPage(' + (currentPage - 1) + '); return false;">上一页</a></li>';
      }

      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      for (let i = startPage; i <= endPage; i++) {
        html += '<li class="page-item' + (i === currentPage ? ' active' : '') + '"><a class="page-link" href="#" onclick="goToPage(' + i + '); return false;">' + i + '</a></li>';
      }

      if (currentPage < totalPages) {
        html += '<li class="page-item"><a class="page-link" href="#" onclick="goToPage(' + (currentPage + 1) + '); return false;">下一页</a></li>';
      }
      pagination.innerHTML = html;
    }

    function goToPage(page) {
      currentPage = page;
      loadUsers();
    }

    function toggleStatus(userId, currentStatus) {
      const newStatus = currentStatus === 1 ? 0 : 1;
      const action = newStatus === 1 ? '启用' : '禁用';

      if (!confirm('确定要' + action + '该用户吗？')) return;

      showLoading(action + '中...');
      apiRequest('/api/v1/admin/users/' + userId + '/status', 'PUT', { status: newStatus }, false)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            alert(action + '成功');
            loadUsers();
          } else {
            alert(action + '失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error(action + '失败:', err);
          alert(action + '失败，请稍后重试');
        });
    }

    function openCreditModal(userId) {
      document.getElementById('credit-user-id').value = userId;
      document.getElementById('credit-change').value = '';
      document.getElementById('credit-reason').value = '';
      new bootstrap.Modal(document.getElementById('creditModal')).show();
    }

    function saveCreditChange() {
      const userId = document.getElementById('credit-user-id').value;
      const change = parseInt(document.getElementById('credit-change').value);
      const reason = document.getElementById('credit-reason').value.trim();

      if (!change || isNaN(change)) {
        alert('请输入有效的信用分调整值');
        return;
      }

      if (!reason) {
        alert('请输入调整原因');
        return;
      }

      showLoading('调整中...');
      apiRequest('/api/v1/admin/users/' + userId + '/credit', 'PUT', { change, reason }, false)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            bootstrap.Modal.getInstance(document.getElementById('creditModal')).hide();
            alert('信用分调整成功');
            loadUsers();
          } else {
            alert('调整失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error('调整失败:', err);
          alert('调整失败，请稍后重试');
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth/login.html';
    }
  </script>
</body>
</html>
