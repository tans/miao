{{ define "admin/user_list.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">用户管理</h1>
        <p class="page-subtitle">管理平台所有用户</p>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">角色</label>
              <select class="form-select" id="role-filter">
                <option value="">全部</option>
                <option value="business">商家</option>
                <option value="creator">创作者</option>
                <option value="admin">管理员</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">搜索</label>
              <input type="text" class="form-control" id="search-input" placeholder="用户名或邮箱">
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary" onclick="loadUsers()">筛选</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 用户列表 -->
      <div class="table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>用户名</th>
              <th>邮箱</th>
              <th>角色</th>
              <th>注册时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="users-list">
            <tr><td colspan="6" class="text-center text-muted">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadUsers() {
      const role = document.getElementById('role-filter').value;
      const search = document.getElementById('search-input').value;

      let params = [];
      if (role) params.push(`role=${role}`);
      if (search) params.push(`search=${encodeURIComponent(search)}`);
      const query = params.length > 0 ? '?' + params.join('&') : '';

      apiRequest(`/admin/users${query}`, 'GET')
        .then(data => {
          const tbody = document.getElementById('users-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            tbody.innerHTML = ensureArray(data.data).map(user => `
              <tr>
                <td>${user.id}</td>
                <td>${escapeHtml(user.username || '-')}</td>
                <td>${escapeHtml(user.email || '-')}</td>
                <td><span class="badge ${getRoleBadge(user.role)}">${getRoleText(user.role)}</span></td>
                <td>${user.created_at || '-'}</td>
                <td>
                  <button class="btn btn-sm btn-outline-secondary" onclick="viewUser(${user.id})">查看</button>
                </td>
              </tr>
            `).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无用户</td></tr>';
          }
        })
        .catch(err => {
          console.error(err);
          showToast('加载失败', 'danger');
        });
    }

    function viewUser(id) {
      showToast('用户详情功能开发中', 'info');
    }

    function getRoleBadge(role) {
      const badges = { 'business': 'bg-primary', 'creator': 'bg-success', 'admin': 'bg-danger' };
      return badges[role] || 'bg-secondary';
    }

    function getRoleText(role) {
      const texts = { 'business': '商家', 'creator': '创作者', 'admin': '管理员' };
      return texts[role] || role;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadUsers();
  </script>
</body>
</html>
{{ end }}
