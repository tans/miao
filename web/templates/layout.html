{{ define "layout.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ template "title" . }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    .navbar-brand { font-weight: 700; }
    .nav-username { color: rgba(255,255,255,0.85); margin-right: 8px; }
    .notification-icon { position: relative; cursor: pointer; }
    .notification-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      background: #dc3545;
      color: white;
      border-radius: 10px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: bold;
      min-width: 18px;
      text-align: center;
    }
    .notification-dropdown {
      min-width: 320px;
      max-height: 400px;
      overflow-y: auto;
    }
    .notification-item {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.2s;
    }
    .notification-item:hover {
      background: #f8f9fa;
    }
    .notification-item.unread {
      background: #e7f3ff;
    }
    .notification-item.unread:hover {
      background: #d0e8ff;
    }
    .notification-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }
    .notification-content {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    .notification-time {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">创意喵</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center" id="nav-links">
          <!-- 动态填充 -->
        </ul>
      </div>
    </div>
  </nav>
  <main class="container mt-4">
    {{ template "content" . }}
  </main>
  <footer class="bg-light py-4 mt-5">
    <div class="container text-center text-muted small">
      <p class="mb-1">© 2026 创意喵 All Rights Reserved</p>
      <p class="mb-0"><a href="/" class="text-muted text-decoration-none">首页</a> · <a href="/auth/login.html" class="text-muted text-decoration-none">登录</a></p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  {{ template "extra_js" . }}
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>
  <script>
    // 动态导航
    (function() {
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');
      const username = localStorage.getItem('username');
      const nav = document.getElementById('nav-links');

      if (!token || !role) {
        nav.innerHTML = `
          <li class="nav-item"><a class="nav-link" href="/auth/login.html">登录</a></li>
          <li class="nav-item"><a class="nav-link" href="/auth/register.html">注册</a></li>
        `;
        return;
      }

      let roleName = '用户';
      let dashboard = '/';
      if (role === 'business') { roleName = '商家'; dashboard = '/business/dashboard.html'; }
      else if (role === 'creator') { roleName = '创作者'; dashboard = '/creator/dashboard.html'; }
      else if (role === 'admin') { roleName = '管理员'; dashboard = '/admin/dashboard.html'; }

      nav.innerHTML = `
        <li class="nav-item"><span class="nav-username">${roleName}：${username || ''}</span></li>
        <li class="nav-item"><a class="nav-link" href="${dashboard}">工作台</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link notification-icon" href="#" id="notificationDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
              <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zM8 1.918l-.797.161A4.002 4.002 0 0 0 4 6c0 .628-.134 2.197-.459 3.742-.16.767-.376 1.566-.663 2.258h10.244c-.287-.692-.502-1.49-.663-2.258C12.134 8.197 12 6.628 12 6a4.002 4.002 0 0 0-3.203-3.92L8 1.917zM14.22 12c.223.447.481.801.78 1H1c.299-.199.557-.553.78-1C2.68 10.2 3 6.88 3 6c0-2.42 1.72-4.44 4.005-4.901a1 1 0 1 1 1.99 0A5.002 5.002 0 0 1 13 6c0 .88.32 4.2 1.22 6z"/>
            </svg>
            <span id="notification-badge" class="notification-badge d-none">0</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end notification-dropdown" aria-labelledby="notificationDropdown">
            <li class="px-3 py-2 border-bottom">
              <strong>消息通知</strong>
            </li>
            <div id="notification-list">
              <li class="text-center py-3 text-muted">暂无消息</li>
            </div>
            <li class="border-top">
              <a class="dropdown-item text-center small" href="/messages.html">查看全部消息</a>
            </li>
          </ul>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            我的
          </a>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" href="/user/profile.html">个人中心</a></li>
            <li><a class="dropdown-item" href="/help/index.html">帮助中心</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="logout(); return false;">退出登录</a></li>
          </ul>
        </li>
      `;
    })();

    // 加载消息通知
    function loadNotifications() {
      const token = localStorage.getItem('token');
      if (!token) return;

      fetch('/api/v1/messages/unread?limit=5', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(result => {
        if (result.code === 0) {
          const unreadCount = result.data.total || 0;
          const messages = result.data.messages || [];

          // 更新徽章
          const badge = document.getElementById('notification-badge');
          if (unreadCount > 0) {
            badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
            badge.classList.remove('d-none');
          } else {
            badge.classList.add('d-none');
          }

          // 更新消息列表
          const listEl = document.getElementById('notification-list');
          if (messages.length === 0) {
            listEl.innerHTML = '<li class="text-center py-3 text-muted">暂无消息</li>';
          } else {
            listEl.innerHTML = messages.map(msg => `
              <li class="notification-item ${msg.is_read ? '' : 'unread'}" onclick="viewMessage(${msg.id})">
                <div class="notification-title">${msg.title}</div>
                <div class="notification-content">${msg.content.substring(0, 50)}${msg.content.length > 50 ? '...' : ''}</div>
                <div class="notification-time">${formatTime(msg.created_at)}</div>
              </li>
            `).join('');
          }
        }
      })
      .catch(err => console.error('加载消息失败:', err));
    }

    function formatTime(dateStr) {
      const date = new Date(dateStr);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return '刚刚';
      if (minutes < 60) return `${minutes}分钟前`;
      if (hours < 24) return `${hours}小时前`;
      if (days < 7) return `${days}天前`;
      return date.toLocaleDateString();
    }

    function viewMessage(id) {
      window.location.href = `/messages.html?id=${id}`;
    }

    // 定期刷新消息（每30秒）
    if (localStorage.getItem('token')) {
      loadNotifications();
      setInterval(loadNotifications, 30000);
    }
  </script>
</body>
</html>
{{ end }}
