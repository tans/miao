{{ define "messages.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息中心 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">消息中心</h1>
        <p class="page-subtitle">查看所有通知和消息</p>
      </div>

      <div class="mb-4 text-end">
        <button class="btn btn-outline-primary" onclick="markAllRead()">全部标记已读</button>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-3">
              <label class="form-label">状态</label>
              <select class="form-select" id="filter-status">
                <option value="">全部消息</option>
                <option value="unread">未读消息</option>
                <option value="read">已读消息</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label">类型</label>
              <select class="form-select" id="filter-type">
                <option value="">全部类型</option>
                <option value="system">系统通知</option>
                <option value="task">任务相关</option>
                <option value="submission">投稿相关</option>
                <option value="payment">资金相关</option>
              </select>
            </div>
            <div class="col-md-3">
              <button class="btn btn-primary" onclick="loadMessages()">筛选</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 消息列表 -->
      <div id="message-list"></div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadMessages() {
      const status = document.getElementById('filter-status').value;
      const type = document.getElementById('filter-type').value;

      let params = [];
      if (status) params.push(`status=${status}`);
      if (type) params.push(`type=${type}`);
      const query = params.length > 0 ? '?' + params.join('&') : '';

      apiRequest(`/messages${query}`, 'GET')
        .then(data => {
          const container = document.getElementById('message-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(msg => `
              <div class="card mb-3 ${msg.is_read ? '' : 'border-primary'}">
                <div class="card-body">
                  <div class="row align-items-center">
                    <div class="col-md-9">
                      <div class="d-flex align-items-center mb-2">
                        <span class="badge ${getTypeBadge(msg.type)} me-2">${getTypeText(msg.type)}</span>
                        ${!msg.is_read ? '<span class="badge bg-danger">未读</span>' : ''}
                      </div>
                      <h6 class="mb-2">${escapeHtml(msg.title || '消息')}</h6>
                      <p class="mb-2 text-muted">${escapeHtml(msg.content || '')}</p>
                      <div class="text-muted small">${msg.created_at || '-'}</div>
                    </div>
                    <div class="col-md-3 text-end">
                      ${!msg.is_read ? `<button class="btn btn-sm btn-outline-primary" onclick="markRead(${msg.id})">标记已读</button>` : ''}
                    </div>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="card"><div class="card-body text-center text-muted py-5">暂无消息</div></div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('message-list').innerHTML = '<div class="card"><div class="card-body text-center text-danger py-5">加载失败</div></div>';
        });
    }

    function markRead(id) {
      apiRequest(`/messages/${id}/read`, 'POST')
        .then(data => {
          if (data.code === 0) {
            loadMessages();
          }
        })
        .catch(err => console.error(err));
    }

    function markAllRead() {
      apiRequest('/messages/read-all', 'POST')
        .then(data => {
          if (data.code === 0) {
            showToast('已全部标记为已读', 'success');
            loadMessages();
          }
        })
        .catch(err => {
          console.error(err);
          showToast('操作失败', 'danger');
        });
    }

    function getTypeBadge(type) {
      const badges = { 'system': 'bg-info', 'task': 'bg-primary', 'submission': 'bg-success', 'payment': 'bg-warning' };
      return badges[type] || 'bg-secondary';
    }

    function getTypeText(type) {
      const texts = { 'system': '系统通知', 'task': '任务相关', 'submission': '投稿相关', 'payment': '资金相关' };
      return texts[type] || type;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadMessages();
  </script>
</body>
</html>
{{ end }}
