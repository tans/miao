{{define "mobile/settings.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>设置 - 创意喵</title>
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
    <link rel="preload" as="style" href="/static/mobile/css/mobile.css">
    <link rel="stylesheet" href="/static/mobile/css/mobile.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/static/mobile/css/mobile.css"></noscript>
    <link rel="preload" as="style" href="/static/css/ui-enhancements.css">
    <link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/static/css/ui-enhancements.css"></noscript>
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="task-detail-header">
        <button class="back-btn" onclick="history.back()">
            <span>←</span>
        </button>
        <div class="header-title">设置</div>
        <div class="header-spacer"></div>
    </div>

    <div class="mobile-container" style="padding-top: 68px;">
        <!-- 用户信息 -->
        <div class="mobile-card profile-card" style="margin-bottom: 16px;">
            <div class="profile-header">
                <img loading="lazy" src="/static/images/avatar-default.jpg" alt="头像" class="profile-avatar" id="userAvatar">
                <div class="profile-info">
                    <h2 class="profile-name" id="userName">加载中...</h2>
                    <p class="profile-bio" id="userPhone"></p>
                    <div class="profile-meta" id="userMeta" style="margin-top: 4px; font-size: 12px; color: var(--mobile-text-secondary);"></div>
                </div>
            </div>
        </div>

        <div style="height: 16px;"></div>

        <div class="feature-list">
            <a href="/help/index.html" class="feature-item">
                <span class="feature-icon">❓</span>
                <span class="feature-label">帮助中心</span>
                <span class="feature-arrow">→</span>
            </a>
            <a href="/help/faq.html" class="feature-item">
                <span class="feature-icon">📖</span>
                <span class="feature-label">常见问题</span>
                <span class="feature-arrow">→</span>
            </a>
        </div>

        <div style="height: 24px;"></div>

        <!-- 退出登录 -->
        <button id="logoutBtn" class="mobile-btn mobile-btn-outline mobile-btn-block">
            退出登录
        </button>

        <!-- 版本信息 -->
        <div id="versionInfo" style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--mobile-text-secondary);">
            创意喵 v1.0.0
        </div>
    </div>

    <nav class="mobile-tab-bar">
        <a href="/mobile/" class="mobile-tab-item">
            <span class="mobile-tab-icon">📋</span>
            <span>任务大厅</span>
        </a>
        <a href="/mobile/works" class="mobile-tab-item">
            <span class="mobile-tab-icon">🎨</span>
            <span>过审作品</span>
        </a>
        <a href="/mobile/mine" class="mobile-tab-item active">
            <span class="mobile-tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script defer src="/static/mobile/js/mobile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加载用户信息
            loadUserInfo();
            // 显示上传时间
            showLastUploadTime();

            // 退出登录
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    if (confirm('确定要退出登录吗？')) {
                        logout();
                    }
                });
            }
        });

        async function loadUserInfo() {
            if (!isLoggedIn()) {
                location.href = '/mobile/login';
                return;
            }

            try {
                const res = await apiRequest('/api/v1/users/me');
                if (res && res.data) {
                    const u = res.data;
                    document.getElementById('userName').textContent = u.username || '用户';
                    document.getElementById('userPhone').textContent = u.phone || '';
                    if (u.avatar) {
                        document.getElementById('userAvatar').src = u.avatar;
                    }
                    // 显示用户等级和信用分
                    const levelName = u.level_name || '';
                    const totalScore = u.total_score || 0;
                    if (levelName || totalScore) {
                        document.getElementById('userMeta').textContent = levelName + (totalScore ? ' · 信用 ' + totalScore : '');
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        function showLastUploadTime() {
            const versionInfo = document.getElementById('versionInfo');
            if (!versionInfo) return;
            const lastUpload = localStorage.getItem('lastUploadTime');
            if (lastUpload) {
                const date = new Date(lastUpload);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                versionInfo.textContent = `最后上传: ${month}-${day} ${hours}:${minutes}`;
            }
        }
    </script>
</body>
</html>
{{end}}
