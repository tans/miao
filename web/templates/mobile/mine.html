{{define "mobile/mine.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{.Title}} - 创意喵</title>
    <link rel="stylesheet" href="/static/mobile/css/mobile.css">
</head>
<body>
    <div class="mobile-container">
        <!-- User Info Card -->
        <div class="mobile-card profile-card">
            <div class="profile-header">
                <img src="{{if .User.Avatar}}{{.User.Avatar}}{{else}}/static/images/avatar-default.png{{end}}" alt="{{.User.Nickname}}" class="profile-avatar">
                <div class="profile-info">
                    <h2 class="profile-name">{{.User.Nickname}}</h2>
                    <p class="profile-bio">{{if .User.Phone}}{{.User.Phone}}{{else}}这个人很懒，什么都没写{{end}}</p>
                </div>
            </div>
        </div>

        <!-- Wallet Card -->
        <div class="mobile-card wallet-card">
            <div class="wallet-header">
                <span class="wallet-label">钱包余额</span>
                <a href="/creator/wallet.html" class="wallet-link">查看详情 →</a>
            </div>
            <div class="wallet-balance">¥{{printf "%.2f" .Balance}}</div>
        </div>

        <!-- Feature List -->
        <div class="feature-list">
            <a href="/business/task_list.html" class="feature-item">
                <span class="feature-icon">📝</span>
                <span class="feature-label">我发布的任务</span>
                <span class="feature-arrow">→</span>
            </a>
            <a href="/creator/claim_list.html" class="feature-item">
                <span class="feature-icon">✅</span>
                <span class="feature-label">我领取的任务</span>
                <span class="feature-arrow">→</span>
            </a>
            <a href="/creator/my_submissions.html" class="feature-item">
                <span class="feature-icon">🎨</span>
                <span class="feature-label">我的作品</span>
                <span class="feature-arrow">→</span>
            </a>
            <a href="/creator/transactions.html" class="feature-item">
                <span class="feature-icon">💰</span>
                <span class="feature-label">我的收益</span>
                <span class="feature-arrow">→</span>
            </a>
            <a href="/creator/profile.html" class="feature-item">
                <span class="feature-icon">⚙️</span>
                <span class="feature-label">设置</span>
                <span class="feature-arrow">→</span>
            </a>
        </div>

        <!-- Logout Button -->
        <button id="logoutBtn" class="mobile-btn mobile-btn-outline mobile-btn-block" style="margin-top: 24px;">
            退出登录
        </button>
    </div>

    <nav class="mobile-tab-bar">
        <a href="/mobile/" class="mobile-tab-item">
            <span class="mobile-tab-icon">📋</span>
            <span>任务大厅</span>
        </a>
        <a href="/mobile/works" class="mobile-tab-item">
            <span class="mobile-tab-icon">🎨</span>
            <span>过审作品</span>
        </a>
        <a href="/mobile/mine" class="mobile-tab-item active">
            <span class="mobile-tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script src="/static/mobile/js/mobile.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Logout handler
            document.getElementById('logoutBtn').addEventListener('click', function() {
                if (confirm('确定要退出登录吗？')) {
                    logout();
                }
            });
        });

        // Logout function
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('is_admin');
            showToast('已退出登录', 'success');
            setTimeout(() => {
                window.location.href = '/auth/login.html';
            }, 1000);
        }
    </script>
</body>
</html>
{{end}}
