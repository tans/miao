<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{.Title}} - 创意喵</title>
    <link rel="stylesheet" href="/static/mobile/css/mobile.css">
</head>
<body>
    <!-- 切换到PC端入口 -->
    <div class="mobile-desktop-entry">
        <a href="/">💻 PC端</a>
    </div>

    {{template "content" .}}

    <nav class="mobile-tab-bar">
        <a href="/mobile/" class="mobile-tab-item {{if eq .ActiveTab "tasks"}}active{{end}}">
            <span class="mobile-tab-icon">📋</span>
            <span>任务大厅</span>
        </a>
        <a href="/mobile/works" class="mobile-tab-item {{if eq .ActiveTab "works"}}active{{end}}">
            <span class="mobile-tab-icon">🎨</span>
            <span>过审作品</span>
        </a>
        <a href="/mobile/mine" class="mobile-tab-item {{if eq .ActiveTab "mine"}}active{{end}}">
            <span class="mobile-tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script src="/static/mobile/js/mobile.js"></script>
</body>
</html>
