{{define "mobile/index.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>{{.Title}} - 创意喵</title>
    <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
    <link rel="preload" as="style" href="/static/mobile/css/mobile.css">
    <link rel="stylesheet" href="/static/mobile/css/mobile.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/static/mobile/css/mobile.css"></noscript>
    <link rel="preload" as="style" href="/static/css/ui-enhancements.css">
    <link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/static/css/ui-enhancements.css"></noscript>
</head>
<body>
    <div class="mobile-container">
        <!-- Search Bar -->
        <div class="mobile-search-bar">
            <input type="text" class="mobile-search" placeholder="搜索任务..." id="searchInput">
        </div>

        <!-- Category Tabs -->
        <div class="mobile-category-tabs">
            <button class="mobile-tag active" data-category="">全部</button>
            <button class="mobile-tag" data-category="video">视频</button>
            <button class="mobile-tag" data-category="image">图文</button>
            <button class="mobile-tag" data-category="live">直播</button>
        </div>

        <!-- Task List -->
        <div id="taskList" class="task-list">
            {{range .Tasks}}
            <div class="mobile-card task-card fade-in" data-task-id="{{.ID}}" onclick="window.location.href='/mobile/task/{{.ID}}'">
                <div class="task-card-image">
                    <img loading="lazy" src="/static/images/task-placeholder.svg" alt="{{.Title}}">
                    <div class="task-card-price">¥{{.UnitPrice}}</div>
                </div>
                <div class="task-card-content">
                    <h3 class="task-card-title">{{.Title}}</h3>
                    <div class="task-card-tags">
                        <span class="mobile-tag">视频</span>
                        <span class="mobile-tag">{{if eq .RemainingCount 0}}已满{{else}}剩余{{.RemainingCount}}{{end}}</span>
                    </div>
                    <div class="task-card-publisher">
                        <img loading="lazy" src="/static/images/avatar-default.jpg" alt="商家" class="publisher-avatar">
                        <span class="publisher-name">商家</span>
                    </div>
                </div>
            </div>
            {{end}}
        </div>

        <!-- Loading More Indicator -->
        <div id="loadingMore" class="loading-pulse" style="display: none; text-align: center; padding: 20px; color: var(--mobile-text-secondary);">
            <span>加载中...</span>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="mobile-empty" style="display: none;">
            <div class="mobile-empty-icon">📋</div>
            <p class="mobile-empty-text">暂无任务</p>
            <p class="mobile-empty-hint">看看其他分类吧</p>
        </div>

        <!-- Error State -->
        <div id="errorState" class="mobile-empty" style="display: none;">
            <div class="mobile-empty-icon">😵</div>
            <p class="mobile-empty-text">加载失败</p>
            <button class="mobile-btn mt-12" onclick="location.reload()">点击重试</button>
        </div>
    </div>

    <nav class="mobile-tab-bar">
        <a href="/mobile/" class="mobile-tab-item active">
            <span class="mobile-tab-icon">📋</span>
            <span>任务大厅</span>
        </a>
        <a href="/mobile/works" class="mobile-tab-item">
            <span class="mobile-tab-icon">🎨</span>
            <span>过审作品</span>
        </a>
        <a href="/mobile/mine" class="mobile-tab-item">
            <span class="mobile-tab-icon">👤</span>
            <span>我的</span>
        </a>
    </nav>

    <script defer src="/static/mobile/js/mobile.js"></script>
    <script>
        // Initialize task hall
        document.addEventListener('DOMContentLoaded', function() {
            initTaskHall();
        });
    </script>
</body>
</html>
{{end}}
