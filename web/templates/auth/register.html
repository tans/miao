{{ template "layout.html" . }}

{{ define "title" }}注册 - 创意喵{{ end }}

{{ define "content" }}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">注册</h3>
        <form id="register-form">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="username" class="form-label">用户名</label>
              <input type="text" class="form-control" id="username" required minlength="3">
            </div>
            <div class="col-md-6 mb-3">
              <label for="password" class="form-label">密码</label>
              <input type="password" class="form-control" id="password" required minlength="6">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="phone" class="form-label">手机号</label>
              <input type="tel" class="form-control" id="phone" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="real_name" class="form-label">真实姓名</label>
              <input type="text" class="form-control" id="real_name">
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="company_name" class="form-label">公司名称（选填）</label>
              <input type="text" class="form-control" id="company_name">
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">注册</button>
        </form>
        <div class="text-center mt-3">
          <a href="/auth/login.html">已有账号？立即登录</a>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script src="/static/js/components.js"></script>
<script src="/static/js/validation.js"></script>
<script>
// 已登录则直接跳转
(function() {
  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (token && role) {
    if (role === 'business') window.location.href = '/business/dashboard.html';
    else if (role === 'creator') window.location.href = '/creator/dashboard.html';
    else if (role === 'admin') window.location.href = '/admin/dashboard.html';
  }
})();

// 绑定实时验证
bindRealtimeValidation('register-form', {
  username: [
    (value) => validateRequired(value, '用户名'),
    (value) => validateLength(value, '用户名', 3, 20)
  ],
  password: [
    (value) => validateRequired(value, '密码'),
    (value) => validatePassword(value)
  ],
  phone: [
    (value) => validateRequired(value, '手机号'),
    (value) => validatePhone(value)
  ]
});

document.getElementById('register-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const phone = document.getElementById('phone').value.trim();
  const real_name = document.getElementById('real_name').value.trim();
  const company_name = document.getElementById('company_name').value.trim();

  // 表单验证
  const isValid = validateForm('register-form', {
    username: [
      (value) => validateRequired(value, '用户名'),
      (value) => validateLength(value, '用户名', 3, 20)
    ],
    password: [
      (value) => validateRequired(value, '密码'),
      (value) => validatePassword(value)
    ],
    phone: [
      (value) => validateRequired(value, '手机号'),
      (value) => validatePhone(value)
    ]
  });

  if (!isValid) return;

  apiRequest('/auth/register', 'POST', {
    username, password, phone, real_name, company_name
  })
    .then(data => {
      if (data.code === 0) {
        showSuccess('注册成功，请登录');
        setTimeout(() => {
          window.location.href = '/auth/login.html';
        }, 1000);
      } else {
        showError(data.message || '注册失败');
      }
    })
    .catch(handleApiError);
});
</script>
{{ end }}
