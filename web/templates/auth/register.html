{{ define "register.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div class="auth-shell">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="auth-card card">
            <div class="card-body p-5">
              <!-- Logo -->
              <div class="text-center mb-4">
                <a href="/" class="navbar-brand fw-bold fs-3">创意喵</a>
              </div>

              <!-- 标题 -->
              <div class="text-center mb-4">
                <h2 class="fw-light mb-2">现在加入创意喵</h2>
                <p class="text-muted small">填写基础资料，完成后即可登录并选择你的工作身份</p>
              </div>

              <!-- 注册表单 -->
              <form id="register-form">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" required minlength="3" placeholder="至少 3 个字符" autocomplete="username">
                  </div>
                  <div class="col-md-6">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" required minlength="6" placeholder="至少 6 位密码" autocomplete="new-password">
                  </div>
                  <div class="col-md-6">
                    <label for="phone" class="form-label">手机号</label>
                    <input type="tel" class="form-control" id="phone" required placeholder="用于账号联系" autocomplete="tel" pattern="[0-9]{11}">
                  </div>
                  <div class="col-md-6">
                    <label for="real_name" class="form-label">真实姓名</label>
                    <input type="text" class="form-control" id="real_name" placeholder="选填">
                  </div>
                  <div class="col-12">
                    <label for="company_name" class="form-label">公司名称</label>
                    <input type="text" class="form-control" id="company_name" placeholder="如你以商家身份协作，可填写公司或品牌名称">
                  </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-4 mb-3">注册并继续</button>
                <div class="text-center">
                  <span class="text-muted small">已有账号？</span>
                  <a href="/auth/login.html" class="text-primary small">立即登录</a>
                </div>
              </form>
            </div>
          </div>

          <!-- 底部提示 -->
          <div class="text-center mt-4">
            <p class="text-muted small mb-2">注册后可选择商家或创作者身份进入平台</p>
            <a href="/" class="text-muted small">返回首页</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/validation.js"></script>
  <script>
    // Check if already logged in and redirect
    const token = localStorage.getItem('token');
    if (token && typeof getCurrentRole === 'function') {
      const currentRole = getCurrentRole();
      if (currentRole === 'business') window.location.href = '/business/dashboard.html';
      else if (currentRole === 'creator') window.location.href = '/creator/dashboard.html';
      else if (currentRole === 'admin') window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value.trim();
      const real_name = document.getElementById('real_name').value.trim();
      const company_name = document.getElementById('company_name').value.trim();

      if (!username || !password || !phone) {
        showError('请填写必填项');
        return;
      }

      if (username.length < 3) {
        showError('用户名至少3个字符');
        return;
      }

      if (password.length < 6) {
        showError('密码至少6个字符');
        return;
      }

      apiRequest('/api/v1/auth/register', 'POST', { username, password, phone, real_name, company_name })
      .then(data => {
        if (data.code === 0) {
          showSuccess('注册成功，请登录');
          setTimeout(() => {
            window.location.href = '/auth/login.html';
          }, 1000);
        } else {
          showError(data.message || '注册失败');
        }
      })
      .catch(err => {
        showError('注册失败，请重试');
        console.error(err);
      });
    });
  </script>
</body>
</html>
{{ end }}
