{{ define "register.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #0d6efd;
      --primary-hover: #0b5ed7;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border-color: #dee2e6;
      --bg-light: #f8f9fa;
    }
    body {
      background-color: var(--bg-light);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .register-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .register-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 600px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    .brand p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 8px;
    }
    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .form-control {
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .form-control:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
    }
    .btn-primary {
      background-color: var(--primary-color);
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 15px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .btn-primary:hover {
      background-color: var(--primary-hover);
    }
    .footer-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .footer-link a {
      color: var(--primary-color);
      text-decoration: none;
    }
    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-card">
      <div class="brand">
        <h1>创意喵</h1>
        <p>创建您的账号</p>
      </div>

      <form id="register-form">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="username" class="form-label">用户名</label>
            <input type="text" class="form-control" id="username" required minlength="3">
          </div>
          <div class="col-md-6 mb-3">
            <label for="password" class="form-label">密码</label>
            <input type="password" class="form-control" id="password" required minlength="6">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="phone" class="form-label">手机号</label>
            <input type="tel" class="form-control" id="phone" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="real_name" class="form-label">真实姓名</label>
            <input type="text" class="form-control" id="real_name">
          </div>
        </div>
        <div class="mb-3">
          <label for="company_name" class="form-label">公司名称（选填）</label>
          <input type="text" class="form-control" id="company_name">
        </div>
        <button type="submit" class="btn btn-primary w-100">注册</button>
      </form>

      <div class="footer-link">
        已有账号？<a href="/auth/login.html">立即登录</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/validation.js"></script>
  <script>
    // 已登录则直接跳转
    (function() {
      const token = localStorage.getItem('token');
      const role = localStorage.getItem('role');
      if (token && role) {
        if (role === 'business') window.location.href = '/business/dashboard.html';
        else if (role === 'creator') window.location.href = '/creator/dashboard.html';
        else if (role === 'admin') window.location.href = '/admin/dashboard.html';
      }
    })();

    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const phone = document.getElementById('phone').value.trim();
      const real_name = document.getElementById('real_name').value.trim();
      const company_name = document.getElementById('company_name').value.trim();

      if (!username || !password || !phone) {
        showError('请填写必填项');
        return;
      }

      if (username.length < 3) {
        showError('用户名至少3个字符');
        return;
      }

      if (password.length < 6) {
        showError('密码至少6个字符');
        return;
      }

      apiRequest('/auth/register', {
        method: 'POST',
        body: JSON.stringify({ username, password, phone, real_name, company_name })
      })
      .then(data => {
        if (data.code === 0) {
          showSuccess('注册成功，请登录');
          setTimeout(() => {
            window.location.href = '/auth/login.html';
          }, 1000);
        } else {
          showError(data.message || '注册失败');
        }
      })
      .catch(err => {
        showError('注册失败，请重试');
        console.error(err);
      });
    });
  </script>
</body>
</html>
{{ end }}
