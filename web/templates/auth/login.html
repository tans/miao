{{ define "auth/login.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 创意喵</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'" crossorigin="anonymous">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
  <link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
  <link rel="preload" as="style" href="/static/css/ui-enhancements.css">
  <link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="auth-shell">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="auth-card card animate-scale-in">
            <div class="card-body p-5">
              <!-- Logo -->
              <div class="text-center mb-4">
                <a href="/" class="navbar-brand fw-bold fs-3">创意喵</a>
              </div>

              <!-- 标题 -->
              <div class="text-center mb-4">
                <h2 class="fw-light mb-2">欢迎回来</h2>
                <p class="text-muted small">输入账号信息，选择进入的工作台</p>
              </div>

              <!-- 登录表单 -->
              <form id="login-form">
                <div class="mb-3">
                  <label for="username" class="form-label fw-medium">用户名</label>
                  <input type="text" class="form-control" id="username" required placeholder="输入用户名" autocomplete="username">
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label fw-medium">密码</label>
                  <input type="password" class="form-control" id="password" required placeholder="输入密码" autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3 btn-action">登录</button>
                <div class="text-center">
                  <span class="text-muted small">还没有账号？</span>
                  <a href="/auth/register.html" class="text-primary small">立即注册</a>
                </div>
              </form>
            </div>
          </div>

          <!-- 底部提示 -->
          <div class="text-center mt-4">
            <p class="text-muted small mb-2">同一账号可在商家与创作者视角间自由切换</p>
            <a href="/" class="text-muted small">返回首页</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <!-- 关键JS优先加载 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script defer src="/static/js/validation.js"></script>
  <script>
    (function() {
      const token = localStorage.getItem('token');
      const currentRole = getCurrentRole();
      if (token && currentRole) {
        if (currentRole === 'business') window.location.href = '/business/dashboard.html';
        else if (currentRole === 'creator') window.location.href = '/creator/dashboard.html';
        // 管理员用户不从此页面跳转
      }
    })();

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('请填写用户名和密码');
        return;
      }

      apiRequest('/auth/login', 'POST', { username, password })
      .then(data => {
        if (data.code === 0) {
          const lastRole = localStorage.getItem('current_role') || 'business';
          storeAuthSession(data.data, lastRole);
          showSuccess('登录成功');

          setTimeout(() => {
            redirectToDashboard(lastRole);
          }, 500);
        } else {
          showError(data.message || '登录失败');
        }
      })
      .catch(err => {
        showError('登录失败，请重试');
        console.error(err);
      });
    });
  </script>
</body>
</html>
{{ end }}
