{{ define "login.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div class="auth-shell">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="auth-card card">
            <div class="card-body p-5">
              <!-- Logo -->
              <div class="text-center mb-4">
                <a href="/" class="navbar-brand fw-bold fs-3">创意喵</a>
              </div>

              <!-- 标题 -->
              <div class="text-center mb-4">
                <h2 class="fw-light mb-2">欢迎回来</h2>
                <p class="text-muted small">输入账号信息，选择本次进入的平台身份</p>
              </div>

              <!-- 登录表单 -->
              <form id="login-form">
                <div class="mb-3">
                  <label for="username" class="form-label">用户名</label>
                  <input type="text" class="form-control" id="username" required placeholder="输入用户名" autocomplete="username">
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">密码</label>
                  <input type="password" class="form-control" id="password" required placeholder="输入密码" autocomplete="current-password">
                </div>
                <div class="mb-4">
                  <label for="login-role" class="form-label">登录身份</label>
                  <select class="form-select" id="login-role">
                    <option value="business">商家</option>
                    <option value="creator">创作者</option>
                  </select>
                  <div class="form-text">登录后可在右上角切换身份</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">登录</button>
                <div class="text-center">
                  <span class="text-muted small">还没有账号？</span>
                  <a href="/auth/register.html" class="text-primary small">立即注册</a>
                </div>
              </form>
            </div>
          </div>

          <!-- 底部提示 -->
          <div class="text-center mt-4">
            <p class="text-muted small mb-2">同一账号可在商家与创作者视角间切换</p>
            <a href="/" class="text-muted small">返回首页</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/validation.js"></script>
  <script>
    (function() {
      const token = localStorage.getItem('token');
      const currentRole = getCurrentRole();
      if (token && currentRole) {
        if (currentRole === 'business') window.location.href = '/business/dashboard.html';
        else if (currentRole === 'creator') window.location.href = '/creator/dashboard.html';
        else if (currentRole === 'admin') window.location.href = '/admin/dashboard.html';
      }
    })();

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const selectedRole = document.getElementById('login-role').value;

      if (!username || !password) {
        showError('请填写用户名和密码');
        return;
      }

      apiRequest('/auth/login', 'POST', { username, password })
      .then(data => {
        if (data.code === 0) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user_id', data.data.user.id);
          localStorage.setItem('username', data.data.user.username);
          localStorage.setItem('role', data.data.user.role);
          localStorage.setItem('roles', data.data.user.roles || data.data.user.role);

          initializeRole(data.data.user);
          localStorage.setItem('current_role', selectedRole);

          showSuccess('登录成功');

          setTimeout(() => {
            if (selectedRole === 'business') {
              window.location.href = '/business/dashboard.html';
            } else if (selectedRole === 'creator') {
              window.location.href = '/creator/dashboard.html';
            } else if (selectedRole === 'admin') {
              window.location.href = '/admin/dashboard.html';
            }
          }, 500);
        } else {
          showError(data.message || '登录失败');
        }
      })
      .catch(err => {
        showError('登录失败，请重试');
        console.error(err);
      });
    });
  </script>
</body>
</html>
{{ end }}
