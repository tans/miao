{{ define "help/index.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帮助中心 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">帮助中心</h1>
        <p class="page-subtitle">欢迎来到创意喵帮助中心，这里有您需要的所有答案</p>
      </div>

      <!-- 搜索框 -->
      <div class="card mb-5">
        <div class="card-body">
          <div class="input-group input-group-lg">
            <input type="text" class="form-control" placeholder="搜索问题..." id="search-input">
            <button class="btn btn-primary" type="button" onclick="searchHelp()">搜索</button>
          </div>
        </div>
      </div>

      <!-- 快速导航 -->
      <div class="row g-4">
        <div class="col-md-4 animate-fade-in-up stagger-1">
          <div class="card h-100 text-center card-hover">
            <div class="card-body">
              <div class="mb-3 text-primary" style="font-size: 3rem;" aria-hidden="true">❓</div>
              <h5 class="card-title">常见问题</h5>
              <p class="card-text text-muted">查看最常见的问题和解答</p>
              <a href="/help/faq.html" class="btn btn-outline-primary">查看 FAQ</a>
            </div>
          </div>
        </div>

        <div class="col-md-4 animate-fade-in-up stagger-2">
          <div class="card h-100 text-center card-hover">
            <div class="card-body">
              <div class="mb-3 text-primary" style="font-size: 3rem;" aria-hidden="true">📖</div>
              <h5 class="card-title">使用教程</h5>
              <p class="card-text text-muted">详细的功能使用指南</p>
              <a href="/help/tutorial.html" class="btn btn-outline-primary">查看教程</a>
            </div>
          </div>
        </div>

        <div class="col-md-4 animate-fade-in-up stagger-3">
          <div class="card h-100 text-center card-hover">
            <div class="card-body">
              <div class="mb-3 text-primary" style="font-size: 3rem;" aria-hidden="true">💬</div>
              <h5 class="card-title">联系我们</h5>
              <p class="card-text text-muted">需要更多帮助？联系客服</p>
              <a href="mailto:support@chuangyimiao.com" class="btn btn-outline-primary">发送邮件</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script>
    function searchHelp() {
      const query = document.getElementById('search-input').value;
      if (query) {
        window.location.href = `/help/faq.html?q=${encodeURIComponent(query)}`;
      }
    }

    document.getElementById('search-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchHelp();
      }
    });
  </script>
</body>
</html>
{{ end }}
