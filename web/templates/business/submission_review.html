<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交付验收 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">交付验收</h1>
        <p class="page-subtitle">审核创作者提交的作品</p>
      </div>

      <!-- 状态筛选 -->
      <div class="card mb-4">
        <div class="card-body">
          <ul class="nav nav-pills">
            <li class="nav-item">
              <a class="nav-link active" href="#" data-status="pending" onclick="filterByStatus('pending'); return false;">待验收</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" data-status="approved" onclick="filterByStatus('approved'); return false;">已通过</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#" data-status="rejected" onclick="filterByStatus('rejected'); return false;">已退回</a>
            </li>
          </ul>
        </div>
      </div>

      <!-- 投稿列表 -->
      <div id="submission-list">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">加载中...</p>
        </div>
      </div>

      <div id="empty-state" class="text-center py-5" style="display: none;">
        <p class="text-muted">暂无投稿</p>
      </div>
    </div>
  </div>

  <!-- 审核 Modal -->
  <div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">审核投稿</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="review-submission-id">
          <div id="submission-detail"></div>
          <div class="mb-3">
            <label for="review-feedback" class="form-label">审核意见</label>
            <textarea class="form-control" id="review-feedback" rows="3" placeholder="填写审核意见（选填）"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-danger" onclick="reviewSubmission('rejected')">退回</button>
          <button type="button" class="btn btn-success" onclick="reviewSubmission('approved')">通过</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    let currentStatus = 'pending';
    const reviewModal = new bootstrap.Modal(document.getElementById('reviewModal'));

    function loadSubmissions(status = 'pending') {
      currentStatus = status;
      apiRequest('/business/submissions?status=' + status, 'GET')
        .then(data => {
          if (data.code === 0) {
            renderSubmissions(data.data || []);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderSubmissions(submissions) {
      const container = document.getElementById('submission-list');
      const emptyState = document.getElementById('empty-state');

      if (!submissions || submissions.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = submissions.map(sub => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="row">
              <div class="col-md-8">
                <h5 class="mb-2">${escapeHtml(sub.task_title || '任务')}</h5>
                <p class="text-muted small mb-2">${escapeHtml(sub.content || '')}</p>
                <div class="d-flex gap-3 small text-muted">
                  <span>创作者: ${escapeHtml(sub.creator_name || '-')}</span>
                  <span>提交时间: ${formatDate(sub.created_at)}</span>
                </div>
                ${sub.file_urls ? `
                  <div class="mt-2">
                    <a href="${sub.file_urls.split(',')[0]}" target="_blank" class="btn btn-sm btn-outline-secondary">查看文件</a>
                  </div>
                ` : ''}
              </div>
              <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <span class="badge bg-${getStatusColor(sub.status)} mb-2">${getStatusText(sub.status)}</span>
                ${sub.status === 'pending' ? `
                  <div>
                    <button class="btn btn-primary btn-sm" onclick="openReviewModal(${sub.id})">审核</button>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterByStatus(status) {
      document.querySelectorAll('.nav-pills .nav-link').forEach(link => {
        link.classList.remove('active');
        if (link.dataset.status === status) {
          link.classList.add('active');
        }
      });
      loadSubmissions(status);
    }

    function openReviewModal(submissionId) {
      document.getElementById('review-submission-id').value = submissionId;
      document.getElementById('review-feedback').value = '';

      apiRequest('/submissions/' + submissionId, 'GET')
        .then(data => {
          if (data.code === 0) {
            const sub = data.data;
            document.getElementById('submission-detail').innerHTML = `
              <div class="mb-3">
                <h6>任务: ${escapeHtml(sub.task_title || '')}</h6>
                <p class="text-muted">${escapeHtml(sub.content || '')}</p>
                ${sub.file_urls ? `<a href="${sub.file_urls.split(',')[0]}" target="_blank" class="btn btn-sm btn-outline-secondary">查看文件</a>` : ''}
              </div>
            `;
            reviewModal.show();
          }
        })
        .catch(err => console.error(err));
    }

    function reviewSubmission(action) {
      const submissionId = document.getElementById('review-submission-id').value;
      const feedback = document.getElementById('review-feedback').value.trim();

      apiRequest('/submissions/' + submissionId + '/review', 'POST', {
        status: action,
        feedback: feedback
      })
        .then(data => {
          if (data.code === 0) {
            showSuccess(action === 'approved' ? '已通过' : '已退回');
            reviewModal.hide();
            loadSubmissions(currentStatus);
          } else {
            showError(data.message || '操作失败');
          }
        })
        .catch(err => {
          showError('操作失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = { 'pending': 'warning', 'approved': 'success', 'rejected': 'danger' };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待审核', 'approved': '已通过', 'rejected': '已退回' };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadSubmissions('pending');
  </script>
</body>
</html>
