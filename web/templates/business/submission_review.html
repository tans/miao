<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交付验收 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">创意喵</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/business/dashboard.html">工作台</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/messages.html">消息</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="username">用户</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/user/profile.html">个人资料</a></li>
              <li><a class="dropdown-item" href="/user/password.html">修改密码</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" onclick="logout()">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/business/dashboard.html" class="list-group-item list-group-item-action">
            <i class="bi bi-speedometer2"></i> 工作台
          </a>
          <a href="/business/task_create.html" class="list-group-item list-group-item-action">
            <i class="bi bi-plus-circle"></i> 发布任务
          </a>
          <a href="/business/task_list.html" class="list-group-item list-group-item-action">
            <i class="bi bi-list-task"></i> 我的任务
          </a>
          <a href="/business/claim_review.html" class="list-group-item list-group-item-action">
            <i class="bi bi-check-circle"></i> 认领审核
          </a>
          <a href="/business/submission_review.html" class="list-group-item list-group-item-action active">
            <i class="bi bi-file-check"></i> 交付验收
          </a>
          <a href="/business/transactions.html" class="list-group-item list-group-item-action">
            <i class="bi bi-wallet2"></i> 资金流水
          </a>
          <a href="/business/recharge.html" class="list-group-item list-group-item-action">
            <i class="bi bi-cash-coin"></i> 账户充值
          </a>
        </div>
      </div>

      <div class="col-md-10">
        <h2 class="mb-4">交付验收</h2>

        <ul class="nav nav-tabs mb-3" id="statusTabs">
          <li class="nav-item">
            <a class="nav-link active" href="#" data-status="pending">待验收</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-status="approved">已通过</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" data-status="rejected">已退回</a>
          </li>
        </ul>

        <div class="card shadow-sm">
          <div class="card-body">
            <div id="submission-list">
              <div class="text-center py-5 text-muted">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2">加载交付列表...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 验收 Modal -->
  <div class="modal fade" id="reviewModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">验收交付</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="review-claim-id">
          <input type="hidden" id="review-result">
          <div id="review-info"></div>
          <div class="mb-3">
            <label for="review-comment" class="form-label">验收意见</label>
            <textarea class="form-control" id="review-comment" rows="3" placeholder="填写验收意见（退回时必填）"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary" onclick="submitReview()">确认</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    const statusMap = {
      1: { label: '待提交', class: 'bg-secondary' },
      2: { label: '已提交', class: 'bg-warning' },
      3: { label: '已通过', class: 'bg-success' },
      4: { label: '已退回', class: 'bg-danger' }
    };

    let currentFilter = 'pending';
    let allClaims = [];

    if (!requireAuth() || getUserRole() !== 'business') {
      // 已重定向
    } else {
      const user = getUser();
      if (user && user.username) {
        document.getElementById('username').textContent = user.username;
      }

      loadData();

      // Tab 切换
      document.querySelectorAll('#statusTabs .nav-link').forEach(tab => {
        tab.addEventListener('click', function(e) {
          e.preventDefault();
          document.querySelectorAll('#statusTabs .nav-link').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.status;
          renderSubmissions();
        });
      });
    }

    function loadData() {
      apiRequest('/api/v1/business/claims', 'GET', null, false)
        .then(data => {
          if (data.code === 0) {
            allClaims = data.data || [];
            renderSubmissions();
          } else {
            document.getElementById('submission-list').innerHTML =
              '<div class="text-center py-5 text-danger">加载失败: ' + (data.message || '未知错误') + '</div>';
          }
        })
        .catch(err => {
          console.error('加载失败:', err);
          document.getElementById('submission-list').innerHTML =
            '<div class="text-center py-5 text-danger">加载失败，请稍后重试</div>';
        });
    }

    function renderSubmissions() {
      const container = document.getElementById('submission-list');

      let filtered = [];
      if (currentFilter === 'pending') {
        filtered = allClaims.filter(c => c.status === 2); // 已提交待验收
      } else if (currentFilter === 'approved') {
        filtered = allClaims.filter(c => c.status === 3); // 已通过
      } else if (currentFilter === 'rejected') {
        filtered = allClaims.filter(c => c.status === 4); // 已退回
      }

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center py-5 text-muted">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p class="mt-3">暂无${currentFilter === 'pending' ? '待验收' : currentFilter === 'approved' ? '已通过' : '已退回'}的交付</p>
          </div>
        `;
        return;
      }

      container.innerHTML = '<div class="list-group list-group-flush">' + filtered.map(claim => {
        const status = statusMap[claim.status] || statusMap[1];
        const submitTime = claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-';
        const reviewTime = claim.review_at ? new Date(claim.review_at).toLocaleString('zh-CN') : '-';

        return `
          <div class="list-group-item">
            <div class="row">
              <div class="col-md-8">
                <div class="d-flex align-items-center mb-2">
                  <h5 class="mb-0 me-3">任务 #${claim.task_id}</h5>
                  <span class="badge ${status.class}">${status.label}</span>
                </div>
                <p class="text-muted mb-2">创作者ID: ${claim.creator_id}</p>
                <div class="mb-2">
                  <strong>交付内容:</strong>
                  <p class="mb-0 mt-1">${escapeHtml(claim.content || '无内容')}</p>
                </div>
                ${claim.review_comment ? `
                <div class="mb-2">
                  <strong>验收意见:</strong>
                  <p class="mb-0 mt-1 text-muted">${escapeHtml(claim.review_comment)}</p>
                </div>
                ` : ''}
                <div class="small text-muted">
                  <span>提交时间: ${submitTime}</span>
                  ${claim.status >= 3 ? `<span class="mx-2">|</span><span>验收时间: ${reviewTime}</span>` : ''}
                </div>
              </div>
              <div class="col-md-4 text-end">
                ${claim.status === 2 ? `
                  <div class="d-grid gap-2">
                    <button class="btn btn-success" onclick="openReviewModal(${claim.id}, 3)">
                      <i class="bi bi-check-lg"></i> 通过验收
                    </button>
                    <button class="btn btn-danger" onclick="openReviewModal(${claim.id}, 4)">
                      <i class="bi bi-x-lg"></i> 退回修改
                    </button>
                  </div>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('') + '</div>';
    }

    function openReviewModal(claimId, result) {
      document.getElementById('review-claim-id').value = claimId;
      document.getElementById('review-result').value = result;
      document.getElementById('review-comment').value = '';

      const claim = allClaims.find(c => c.id === claimId);
      document.getElementById('review-info').innerHTML = `
        <div class="alert ${result === 3 ? 'alert-success' : 'alert-danger'}">
          <strong>任务 #${claim.task_id}</strong><br>
          确认${result === 3 ? '<strong>通过验收</strong>' : '<strong>退回修改</strong>'}？
          ${result === 3 ? '通过后将结算给创作者。' : ''}
        </div>
        <div class="card bg-light mb-3">
          <div class="card-body">
            <strong>交付内容:</strong>
            <p class="mb-0 mt-2">${escapeHtml(claim.content || '无内容')}</p>
          </div>
        </div>
      `;

      new bootstrap.Modal(document.getElementById('reviewModal')).show();
    }

    function submitReview() {
      const claimId = document.getElementById('review-claim-id').value;
      const result = parseInt(document.getElementById('review-result').value);
      const comment = document.getElementById('review-comment').value.trim();

      if (result === 4 && !comment) {
        alert('退回时必须填写验收意见');
        return;
      }

      showLoading('提交中...');
      apiRequest('/api/v1/business/claims/' + claimId + '/review', 'PUT', {
        result: result,
        comment: comment
      }, false)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
            alert(result === 3 ? '验收通过' : '已退回修改');
            loadData();
          } else {
            alert('操作失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error('验收失败:', err);
          alert('操作失败，请稍后重试');
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth/login.html';
    }
  </script>
</body>
</html>
