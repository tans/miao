{{ define "business/dashboard.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家中心 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link href="/static/css/custom.css" rel="stylesheet">
  <link href="/static/css/ui-enhancements.css" rel="stylesheet">
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">商家中心</h1>
        <p class="page-subtitle">管理任务和查看数据概览</p>
      </div>

      <!-- 统计卡片 -->
      <div class="row g-4 mb-5">
        <div class="col-md-3 animate-fade-in-up stagger-1">
          <div class="stat-card">
            <div class="stat-icon stat-icon-tasks">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
              </svg>
            </div>
            <div class="stat-value" id="task-count">0</div>
            <div class="stat-label">我的任务</div>
          </div>
        </div>
        <div class="col-md-3 animate-fade-in-up stagger-2">
          <div class="stat-card">
            <div class="stat-icon stat-icon-pending">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
            </div>
            <div class="stat-value text-warning" id="pending-review">0</div>
            <div class="stat-label">待验收</div>
          </div>
        </div>
        <div class="col-md-3 animate-fade-in-up stagger-3">
          <div class="stat-card">
            <div class="stat-icon stat-icon-balance">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
              </svg>
            </div>
            <div class="stat-value text-success" id="balance">¥0</div>
            <div class="stat-label">账户余额</div>
          </div>
        </div>
        <div class="col-md-3 animate-fade-in-up stagger-4">
          <div class="stat-card">
            <div class="stat-icon stat-icon-credit">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
            <div class="stat-value" id="credit-score">100</div>
            <div class="stat-label">信用分</div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- 快捷操作 -->
        <div class="col-md-6 animate-fade-in-up stagger-5">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0 d-flex align-items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                快捷操作
              </h5>
            </div>
            <div class="card-body">
              <div class="d-grid gap-3">
                <a href="/business/task_create.html" class="btn btn-primary btn-action">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                  发布新任务
                </a>
                <a href="/business/task_list.html" class="btn btn-outline-secondary btn-action">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  查看我的任务
                </a>
                <a href="/business/submission_review.html" class="btn btn-outline-secondary btn-action">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                  审核投稿
                </a>
                <a href="/business/recharge.html" class="btn btn-outline-secondary btn-action">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                  账户充值
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- 最近任务 -->
        <div class="col-md-6 animate-fade-in-up stagger-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0 d-flex align-items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                最近任务
              </h5>
            </div>
            <div class="card-body p-0">
              <div id="recent-tasks">
                <div class="text-center py-4">
                  <div class="spinner-paw mb-2">
                    <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
                      <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
                      </circle>
                    </svg>
                  </div>
                  <p class="text-muted small mb-0">加载中...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <style>
    .stat-card { position: relative; overflow: hidden; }
    .stat-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
    }
    .stat-icon-tasks { background: rgba(13, 110, 253, 0.1); color: #0d6efd; }
    .stat-icon-pending { background: rgba(255, 193, 7, 0.1); color: #ffc107; }
    .stat-icon-balance { background: rgba(40, 167, 69, 0.1); color: #28a745; }
    .stat-icon-credit { background: rgba(102, 16, 242, 0.1); color: #6610f2; }
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding-left: 16px;
    }
    .btn-action svg { flex-shrink: 0; }
    .spinner-paw { display: flex; justify-content: center; }
  </style>
  <script>
    requireAuth();

    function loadDashboard() {
      // 加载统计数据
      apiRequest('/business/stats', 'GET')
        .then(data => {
          if (data.code === 0) {
            const stats = data.data || {};
            document.getElementById('task-count').textContent = stats.task_count || 0;
            document.getElementById('pending-review').textContent = stats.pending_review || 0;
            document.getElementById('balance').textContent = '¥' + (stats.balance || 0);
            document.getElementById('credit-score').textContent = stats.credit_score || 100;
          }
        })
        .catch(err => console.error(err));

      // 加载最近任务
      apiRequest('/business/tasks?limit=5', 'GET')
        .then(data => {
          const container = document.getElementById('recent-tasks');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(task => {
              const title = escapeHtml(task.title);
              const price = parseFloat(task.price).toFixed(2);
              const quantity = parseInt(task.quantity);
              const id = parseInt(task.id);
              return `
              <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                  <div class="fw-bold small">${title}</div>
                  <div class="text-muted" style="font-size: 0.75rem;">¥${price} × ${quantity}</div>
                </div>
                <a href="/business/task_detail.html?id=${id}" class="btn btn-sm btn-outline-secondary">查看</a>
              </div>
              `;
            }).join('');
          } else {
            container.innerHTML = '<div class="text-center py-3 text-muted">暂无任务</div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('recent-tasks').innerHTML = '<div class="text-center py-3 text-danger">加载失败</div>';
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadDashboard();
  </script>
</body>
</html>
{{ end }}
