{{ define "business_dashboard.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家中心 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">商家中心</h1>
        <p class="page-subtitle">管理任务和查看数据概览</p>
      </div>

      <!-- 统计卡片 -->
      <div class="row g-4 mb-5">
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="task-count">0</div>
            <div class="stat-label">我的任务</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value text-warning" id="pending-review">0</div>
            <div class="stat-label">待验收</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value text-success" id="balance">¥0</div>
            <div class="stat-label">账户余额</div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="stat-card">
            <div class="stat-value" id="credit-score">100</div>
            <div class="stat-label">信用分</div>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- 快捷操作 -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">快捷操作</h5>
            </div>
            <div class="card-body">
              <div class="d-grid gap-3">
                <a href="/business/task_create.html" class="btn btn-primary">发布新任务</a>
                <a href="/business/task_list.html" class="btn btn-outline-secondary">查看我的任务</a>
                <a href="/business/submission_review.html" class="btn btn-outline-secondary">审核投稿</a>
                <a href="/business/recharge.html" class="btn btn-outline-secondary">账户充值</a>
              </div>
            </div>
          </div>
        </div>

        <!-- 最近任务 -->
        <div class="col-md-6">
          <div class="card">
            <div class="card-header">
              <h5 class="mb-0">最近任务</h5>
            </div>
            <div class="card-body">
              <div id="recent-tasks">
                <div class="text-center py-3 text-muted">加载中...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadDashboard() {
      // 加载统计数据
      apiRequest('/business/stats', 'GET')
        .then(data => {
          if (data.code === 0) {
            const stats = data.data || {};
            document.getElementById('task-count').textContent = stats.task_count || 0;
            document.getElementById('pending-review').textContent = stats.pending_review || 0;
            document.getElementById('balance').textContent = '¥' + (stats.balance || 0);
            document.getElementById('credit-score').textContent = stats.credit_score || 100;
          }
        })
        .catch(err => console.error(err));

      // 加载最近任务
      apiRequest('/business/tasks?limit=5', 'GET')
        .then(data => {
          const container = document.getElementById('recent-tasks');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(task => {
              const title = escapeHtml(task.title);
              const price = parseFloat(task.price).toFixed(2);
              const quantity = parseInt(task.quantity);
              const id = parseInt(task.id);
              return `
              <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                  <div class="fw-bold small">${title}</div>
                  <div class="text-muted" style="font-size: 0.75rem;">¥${price} × ${quantity}</div>
                </div>
                <a href="/business/task_detail.html?id=${id}" class="btn btn-sm btn-outline-secondary">查看</a>
              </div>
              `;
            }).join('');
          } else {
            container.innerHTML = '<div class="text-center py-3 text-muted">暂无任务</div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('recent-tasks').innerHTML = '<div class="text-center py-3 text-danger">加载失败</div>';
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadDashboard();
  </script>
</body>
</html>
{{ end }}
