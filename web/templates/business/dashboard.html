{{ define "business_dashboard.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家中心 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid py-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/business/dashboard.html" class="list-group-item list-group-item-action active">工作台</a>
          <a href="/business/task_create.html" class="list-group-item list-group-item-action">发布任务</a>
          <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
          <a href="/business/claim_review.html" class="list-group-item list-group-item-action">审核认领</a>
          <a href="/business/recharge.html" class="list-group-item list-group-item-action">充值</a>
        </div>
      </div>

      <div class="col-md-10">
        <h4 class="mb-4">商家中心</h4>

        <div class="row mb-4">
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">我的任务</p>
                <h4 id="task-count">-</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">待验收</p>
                <h4 class="text-warning" id="pending-review">-</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">账户余额</p>
                <h4 class="text-success" id="balance">-</h4>
              </div>
            </div>
          </div>
          <div class="col-md-3">
            <div class="card">
              <div class="card-body text-center">
                <p class="text-muted mb-2">信用分</p>
                <h4 id="credit-score">-</h4>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">快捷操作</div>
              <div class="card-body">
                <div class="d-grid gap-2">
                  <a href="/business/task_create.html" class="btn btn-primary">发布新任务</a>
                  <a href="/business/task_list.html" class="btn btn-outline-primary">查看我的任务</a>
                  <a href="/business/claim_review.html" class="btn btn-outline-warning">审核认领</a>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="card">
              <div class="card-header">账户信息</div>
              <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">可用余额:</span>
                  <span class="fw-bold text-success" id="available-balance">-</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                  <span class="text-muted">冻结金额:</span>
                  <span class="fw-bold text-warning" id="frozen-amount">-</span>
                </div>
                <div class="d-flex justify-content-between">
                  <span class="text-muted">累计支出:</span>
                  <span class="fw-bold" id="total-expense">-</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
if (!requireAuth() || getUserRole() !== 'business') {
  // 已重定向
} else {
  loadData();

  function loadData() {
    Promise.all([
      apiRequest('/business/balance', 'GET'),
      apiRequest('/business/tasks', 'GET'),
      apiRequest('/business/claims', 'GET')
    ])
      .then(([balanceData, tasksData, claimsData]) => {
        if (balanceData.code === 0) {
          const balance = balanceData.data.balance || 0;
          const frozen = balanceData.data.task_frozen || 0;
          document.getElementById('balance').textContent = '¥' + balance.toFixed(2);
          document.getElementById('available-balance').textContent = '¥' + (balance - frozen).toFixed(2);
          document.getElementById('frozen-amount').textContent = '¥' + frozen.toFixed(2);
          document.getElementById('credit-score').textContent = balanceData.data.total_score || 0;
        }
        if (tasksData.code === 0) {
          const tasks = tasksData.data || [];
          document.getElementById('task-count').textContent = tasks.length;
        }
        if (claimsData.code === 0) {
          const claims = claimsData.data || [];
          const pending = claims.filter(c => c.status === 1).length;
          document.getElementById('pending-review').textContent = pending;
        }
      })
      .catch(() => showError('加载数据失败'));
  }
}
  </script>
</body>
</html>
{{ end }}
