{% raw %}{% extends "layout.html" %}

{% block title %}商家中心 - 创意喵{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/business/dashboard.html" class="list-group-item list-group-item-action active">首页</a>
      <a href="/business/task_create.html" class="list-group-item list-group-item-action">发布任务</a>
      <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
      <a href="/business/claim_review.html" class="list-group-item list-group-item-action">认领审核</a>
      <a href="/business/submission_review.html" class="list-group-item list-group-item-action">交付验收</a>
      <a href="/business/transactions.html" class="list-group-item list-group-item-action">资金流水</a>
      <a href="/business/recharge.html" class="list-group-item list-group-item-action">充值</a>
    </div>
  </div>
  <div class="col-md-9">
    <h2>商家中心</h2>
    <div class="row mt-4">
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">我的任务</h5>
            <p class="card-text display-4" id="task-count">-</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">待验收</h5>
            <p class="card-text display-4 text-warning" id="pending-review">-</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">账户余额</h5>
            <p class="card-text display-4 text-success" id="balance">-</p>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">信用分</h5>
            <p class="card-text display-4" id="credit-score">-</p>
            <p class="mb-0 small"><span id="credit-level" class="badge">-</span></p>
          </div>
        </div>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h6 class="card-title">账户信息</h6>
            <div class="d-flex justify-content-between mb-2">
              <span>可用余额：</span>
              <span class="text-success fw-bold" id="available-balance">-</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>冻结金额：</span>
              <span class="text-warning fw-bold" id="frozen-amount">-</span>
            </div>
            <div class="d-flex justify-content-between">
              <span>账户总额：</span>
              <span class="fw-bold" id="total-balance">-</span>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-body">
            <h6 class="card-title">快捷操作</h6>
            <a href="/business/recharge.html" class="btn btn-success mb-2 w-100">充值</a>
            <a href="/business/task_create.html" class="btn btn-primary mb-2 w-100">发布新任务</a>
            <a href="/business/transactions.html" class="btn btn-outline-secondary w-100">查看流水</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function getCreditLevel(score) {
  if (score >= 90) return {level: '优秀', class: 'bg-success'};
  if (score >= 70) return {level: '良好', class: 'bg-primary'};
  if (score >= 50) return {level: '一般', class: 'bg-warning'};
  return {level: '较差', class: 'bg-danger'};
}

if (!requireAuth() || getUserRole() !== 'business') {
  // 已重定向
} else {
  Promise.all([
    apiRequest('/business/tasks'),
    apiRequest('/business/claims?status=1'),
    apiRequest('/business/balance')
  ])
    .then(([taskData, claimData, balanceData]) => {
      if (taskData.code === 0) {
        document.getElementById('task-count').textContent = taskData.data.tasks?.length || 0;
      }
      if (claimData.code === 0) {
        document.getElementById('pending-review').textContent = claimData.data.claims?.length || 0;
      }
      if (balanceData.code === 0) {
        const balance = balanceData.data.balance || 0;
        const frozen = balanceData.data.frozen_amount || 0;
        document.getElementById('balance').textContent = '¥' + balance.toFixed(2);
        document.getElementById('available-balance').textContent = '¥' + (balance - frozen).toFixed(2);
        document.getElementById('frozen-amount').textContent = '¥' + frozen.toFixed(2);
        document.getElementById('total-balance').textContent = '¥' + balance.toFixed(2);
      }
    })
    .catch(handleApiError);
}
</script>
{% endblock %}
{% endraw %}
