{{ define "business/appeal_list.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>申诉记录 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { background-color: white; border-radius: 8px; padding: 1rem; }
    .sidebar .list-group-item { border: none; border-radius: 6px; margin-bottom: 0.25rem; }
    .sidebar .list-group-item.active { background-color: #0d6efd; color: white; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; }
    .spinner-paw { display: flex; justify-content: center; }
  </style>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="sidebar">
          <div class="list-group">
            <a href="/business/dashboard.html" class="list-group-item list-group-item-action">工作台</a>
            <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
            <a href="/business/appeal.html" class="list-group-item list-group-item-action">发起申诉</a>
            <a href="/business/appeal_list.html" class="list-group-item list-group-item-action active">申诉记录</a>
          </div>
        </div>
      </div>

      <div class="col-md-10">
        <div class="content-area">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">申诉记录</h4>
            <a href="/business/appeal.html" class="btn btn-primary">
              <i class="bi bi-plus-circle"></i> 发起申诉
            </a>
          </div>

          <div id="appeal-list">
            <div class="text-center py-5">
              <div class="spinner-paw mb-3">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                  <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </div>
              <p class="text-muted small mb-0">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script>
    const statusMap = {
      1: { label: '待处理', class: 'bg-warning text-dark' },
      2: { label: '处理中', class: 'bg-info text-white' },
      3: { label: '已通过', class: 'bg-success text-white' },
      4: { label: '已驳回', class: 'bg-danger text-white' }
    };

    document.addEventListener('DOMContentLoaded', function() {
      loadAppeals();
    });

    function loadAppeals() {
      apiRequest('/appeals', 'GET')
        .then(data => {
          if (data.code === 0) {
            renderAppeals(data.data || []);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderAppeals(appeals) {
      const container = document.getElementById('appeal-list');

      if (appeals.length === 0) {
        container.innerHTML = '<div class="text-center py-5 text-muted">暂无申诉记录</div>';
        return;
      }

      container.innerHTML = ensureArray(appeals).map(appeal => {
        const status = statusMap[appeal.status] || statusMap[1];

        return `
          <div class="card mb-3">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <h6 class="mb-1">申诉 #${appeal.id}</h6>
                  <span class="badge ${status.class}">${status.label}</span>
                </div>
                <small class="text-muted">${new Date(appeal.created_at).toLocaleString('zh-CN')}</small>
              </div>

              <div class="mb-2">
                <strong>关联任务：</strong> #${appeal.task_id || appeal.claim_id}
              </div>

              <div class="mb-2">
                <strong>申诉理由：</strong>
                <p class="text-muted mb-0">${escapeHtml(appeal.reason)}</p>
              </div>

              ${appeal.admin_reply ? `
                <div class="alert alert-info mb-0 mt-3">
                  <strong>平台回复：</strong> ${escapeHtml(appeal.admin_reply)}
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
