<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的任务 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <!-- 页面标题 -->
      <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
          <h1 class="page-title mb-2">我的任务</h1>
          <p class="text-muted mb-0">管理已发布的任务</p>
        </div>
        <a href="/business/task_create.html" class="btn btn-primary">发布新任务</a>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4">
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <input type="text" class="form-control" id="search-keyword" placeholder="搜索任务标题">
            </div>
            <div class="col-md-3">
              <select class="form-select" id="filter-status">
                <option value="">全部状态</option>
                <option value="pending">待认领</option>
                <option value="in_progress">进行中</option>
                <option value="completed">已完成</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-select" id="sort-by">
                <option value="created_at">最新发布</option>
                <option value="deadline">截止时间</option>
                <option value="price">价格</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100" onclick="loadTasks()">搜索</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 任务列表 -->
      <div id="task-list">
        <div class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">加载中...</p>
        </div>
      </div>

      <!-- 空状态 -->
      <div id="empty-state" class="text-center py-5" style="display: none;">
        <p class="text-muted mb-3">暂无任务</p>
        <a href="/business/task_create.html" class="btn btn-primary">发布第一个任务</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadTasks() {
      const keyword = document.getElementById('search-keyword').value.trim();
      const status = document.getElementById('filter-status').value;
      const sortBy = document.getElementById('sort-by').value;

      let url = '/business/tasks';
      const params = [];
      if (keyword) params.push('keyword=' + encodeURIComponent(keyword));
      if (status) params.push('status=' + status);
      if (sortBy) params.push('sort=' + sortBy);
      if (params.length > 0) url += '?' + params.join('&');

      apiRequest(url, 'GET')
        .then(data => {
          if (data.code === 0) {
            renderTasks(data.data || []);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderTasks(tasks) {
      const container = document.getElementById('task-list');
      const emptyState = document.getElementById('empty-state');

      if (!tasks || tasks.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = ensureArray(tasks).map(task => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col-md-8">
                <div class="d-flex align-items-start gap-3">
                  <div class="flex-grow-1">
                    <div class="d-flex align-items-center gap-2 mb-2">
                      <h5 class="mb-0">${escapeHtml(task.title)}</h5>
                      <span class="badge bg-${getStatusColor(task.status)}">${getStatusText(task.status)}</span>
                    </div>
                    <p class="text-muted small mb-2">${escapeHtml(task.description || '').substring(0, 100)}${task.description && task.description.length > 100 ? '...' : ''}</p>
                    <div class="d-flex gap-3 small text-muted">
                      <span>单价: ¥${task.price}</span>
                      <span>数量: ${task.quantity}</span>
                      <span>已认领: ${task.claimed_count || 0}</span>
                      <span>截止: ${formatDate(task.deadline)}</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <div class="d-flex flex-column gap-2">
                  <a href="/business/task_detail.html?id=${task.id}" class="btn btn-outline-secondary btn-sm">查看详情</a>
                  ${task.status === 'pending' ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelTask(${task.id})">取消任务</button>` : ''}
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function cancelTask(taskId) {
      if (!confirm('确认取消此任务？')) return;

      apiRequest('/api/v1/business/tasks/' + taskId, 'DELETE')
        .then(data => {
          if (data.code === 0) {
            showSuccess('任务已取消');
            loadTasks();
          } else {
            showError(data.message || '取消失败');
          }
        })
        .catch(err => {
          showError('取消失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = {
        'pending': 'success',
        'in_progress': 'primary',
        'completed': 'secondary',
        'cancelled': 'danger'
      };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = {
        'pending': '待认领',
        'in_progress': '进行中',
        'completed': '已完成',
        'cancelled': '已取消'
      };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadTasks();
  </script>
</body>
</html>
