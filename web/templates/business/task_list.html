<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的任务 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">创意喵</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/business/dashboard.html">工作台</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/messages.html">消息</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="username">用户</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/user/profile.html">个人资料</a></li>
              <li><a class="dropdown-item" href="/user/password.html">修改密码</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" onclick="logout()">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/business/dashboard.html" class="list-group-item list-group-item-action">
            <i class="bi bi-speedometer2"></i> 工作台
          </a>
          <a href="/business/task_create.html" class="list-group-item list-group-item-action">
            <i class="bi bi-plus-circle"></i> 发布任务
          </a>
          <a href="/business/task_list.html" class="list-group-item list-group-item-action active">
            <i class="bi bi-list-task"></i> 我的任务
          </a>
          <a href="/business/claim_review.html" class="list-group-item list-group-item-action">
            <i class="bi bi-check-circle"></i> 认领审核
          </a>
          <a href="/business/submission_review.html" class="list-group-item list-group-item-action">
            <i class="bi bi-file-check"></i> 交付验收
          </a>
          <a href="/business/transactions.html" class="list-group-item list-group-item-action">
            <i class="bi bi-wallet2"></i> 资金流水
          </a>
          <a href="/business/recharge.html" class="list-group-item list-group-item-action">
            <i class="bi bi-cash-coin"></i> 账户充值
          </a>
        </div>
      </div>

      <div class="col-md-10">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="mb-0">我的任务</h2>
          <a href="/business/task_create.html" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> 发布新任务
          </a>
        </div>

        <div class="card shadow-sm">
          <div class="card-body">
            <div id="task-list">
              <div class="text-center py-5 text-muted">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">加载中...</span>
                </div>
                <p class="mt-2">加载任务列表...</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    const statusMap = {
      1: { label: '待审核', class: 'bg-secondary' },
      2: { label: '已上线', class: 'bg-success' },
      3: { label: '进行中', class: 'bg-info' },
      4: { label: '已结束', class: 'bg-dark' },
      5: { label: '已取消', class: 'bg-danger' }
    };

    const categoryMap = {
      1: '文案创作',
      2: '设计创意',
      3: '视频制作',
      4: '摄影拍照',
      5: '音乐音频',
      6: '程序开发',
      7: '其他'
    };

    // 检查认证和角色
    if (!requireAuth() || getUserRole() !== 'business') {
      // 已重定向
    } else {
      // 显示用户名
      const user = getUser();
      if (user && user.username) {
        document.getElementById('username').textContent = user.username;
      }

      loadTasks();
    }

    function loadTasks() {
      apiRequest('/api/v1/business/tasks', 'GET', null, false)
        .then(data => {
          if (data.code === 0) {
            renderTasks(data.data || []);
          } else {
            document.getElementById('task-list').innerHTML =
              '<div class="text-center py-5 text-danger">加载失败: ' + (data.message || '未知错误') + '</div>';
          }
        })
        .catch(err => {
          console.error('加载任务失败:', err);
          document.getElementById('task-list').innerHTML =
            '<div class="text-center py-5 text-danger">加载失败，请稍后重试</div>';
        });
    }

    function renderTasks(tasks) {
      const container = document.getElementById('task-list');
      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="text-center py-5 text-muted">
            <i class="bi bi-inbox" style="font-size: 3rem;"></i>
            <p class="mt-3">暂无任务</p>
            <a href="/business/task_create.html" class="btn btn-primary">发布第一个任务</a>
          </div>
        `;
        return;
      }

      container.innerHTML = '<div class="list-group list-group-flush">' + tasks.map(task => {
        const status = statusMap[task.status] || statusMap[1];
        const category = categoryMap[task.category] || '其他';
        const endAt = task.end_at ? new Date(task.end_at).toLocaleString('zh-CN') : '长期有效';
        const totalBudget = task.total_budget || 0;
        const remaining = task.remaining_count || 0;
        const total = task.total_count || 0;
        const completed = total - remaining;
        const progress = total > 0 ? Math.round((completed / total) * 100) : 0;

        return `
          <a href="/business/task_detail.html?id=${task.id}" class="list-group-item list-group-item-action">
            <div class="d-flex justify-content-between align-items-start">
              <div class="flex-grow-1">
                <div class="d-flex align-items-center mb-2">
                  <h5 class="mb-0 me-3">${escapeHtml(task.title)}</h5>
                  <span class="badge ${status.class}">${status.label}</span>
                  <span class="badge bg-light text-dark ms-2">${category}</span>
                </div>
                <p class="mb-2 text-muted">${escapeHtml((task.description || '').substring(0, 80))}${(task.description || '').length > 80 ? '...' : ''}</p>
                <div class="d-flex align-items-center">
                  <div class="progress flex-grow-1 me-3" style="height: 20px; max-width: 300px;">
                    <div class="progress-bar" role="progressbar" style="width: ${progress}%" aria-valuenow="${progress}" aria-valuemin="0" aria-valuemax="100">
                      ${progress}%
                    </div>
                  </div>
                  <small class="text-muted">${completed}/${total} 份已完成</small>
                </div>
              </div>
              <div class="text-end ms-4">
                <h4 class="text-primary mb-1">¥${totalBudget.toFixed(2)}</h4>
                <small class="text-muted">总预算</small>
                <div class="small text-muted mt-2">
                  <i class="bi bi-clock"></i> ${endAt}
                </div>
              </div>
            </div>
          </a>
        `;
      }).join('') + '</div>';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth/login.html';
    }
  </script>
</body>
</html>
