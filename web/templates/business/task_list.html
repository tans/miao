{{ define "business/task_list.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的任务 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <!-- 页面标题 -->
      <div class="d-flex justify-content-between align-items-center mb-5 animate-fade-in-up">
        <div>
          <h1 class="page-title mb-2">我的任务</h1>
          <p class="text-muted mb-0">管理已发布的任务</p>
        </div>
        <a href="/business/task_create.html" class="btn btn-primary btn-action">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          发布新任务
        </a>
      </div>

      <!-- 筛选器 -->
      <div class="card mb-4 animate-fade-in-up stagger-2">
        <div class="card-body">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label fw-medium">关键词</label>
              <div class="input-group">
                <span class="input-group-text bg-white">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-soft)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </span>
                <input type="text" class="form-control" id="search-keyword" placeholder="搜索任务标题">
              </div>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">任务状态</label>
              <select class="form-select" id="filter-status">
                <option value="">全部状态</option>
                <option value="pending">待认领</option>
                <option value="in_progress">进行中</option>
                <option value="completed">已完成</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-medium">排序方式</label>
              <select class="form-select" id="sort-by">
                <option value="created_at">最新发布</option>
                <option value="deadline">截止时间</option>
                <option value="price">价格</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-primary w-100 btn-action" onclick="loadTasks()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                搜索
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 任务列表 -->
      <div id="task-list">
        <div class="text-center py-5">
          <div class="spinner-paw mb-3">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </div>
          <p class="text-muted small mb-0">加载中...</p>
        </div>
      </div>

      <!-- 空状态 -->
      <div id="empty-state" class="text-center py-5" style="display: none;">
        <p class="text-muted mb-3">暂无任务</p>
        <a href="/business/task_create.html" class="btn btn-primary">发布第一个任务</a>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action svg { flex-shrink: 0; }
    .spinner-paw { display: flex; justify-content: center; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadTasks() {
      const keyword = document.getElementById('search-keyword').value.trim();
      const status = document.getElementById('filter-status').value;
      const sortBy = document.getElementById('sort-by').value;

      let url = '/business/tasks';
      const params = [];
      if (keyword) params.push('keyword=' + encodeURIComponent(keyword));
      if (status) params.push('status=' + status);
      if (sortBy) params.push('sort=' + sortBy);
      if (params.length > 0) url += '?' + params.join('&');

      apiRequest(url, 'GET')
        .then(data => {
          if (data.code === 0) {
            renderTasks(data.data || []);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderTasks(tasks) {
      const container = document.getElementById('task-list');
      const emptyState = document.getElementById('empty-state');

      if (!tasks || tasks.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = ensureArray(tasks).map(task => `
        <div class="card mb-3">
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col-md-8">
                <div class="d-flex align-items-start gap-3">
                  <div class="flex-grow-1">
                    <div class="d-flex align-items-center gap-2 mb-2">
                      <h5 class="mb-0">${escapeHtml(task.title)}</h5>
                      <span class="badge bg-${getStatusColor(task.status)}">${getStatusText(task.status)}</span>
                    </div>
                    <p class="text-muted small mb-2">${escapeHtml(task.description || '').substring(0, 100)}${task.description && task.description.length > 100 ? '...' : ''}</p>
                    <div class="d-flex gap-3 small text-muted">
                      <span>预计: ¥${task.total_budget || 0}</span>
                      <span>参与: ¥${task.unit_price}</span>
                      ${task.award_price > 0 ? `<span style="color: #FF5722;">采纳: ¥${task.award_price}</span>` : ''}
                      <span>数量: ${task.total_count}</span>
                      <span>已认领: ${task.claimed_count || 0}</span>
                      <span>截止: ${formatDate(task.deadline)}</span>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <div class="d-flex flex-column gap-2">
                  <a href="/business/task_detail.html?id=${task.id}" class="btn btn-outline-secondary btn-sm">查看详情</a>
                  ${task.status === 1 ? `<button class="btn btn-outline-danger btn-sm" onclick="cancelTask(${task.id})">取消任务</button>` : ''}
                </div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function cancelTask(taskId) {
      if (!confirm('确认取消此任务？')) return;

      apiRequest('/business/tasks/' + taskId, 'DELETE')
        .then(data => {
          if (data.code === 0) {
            showSuccess('任务已取消');
            loadTasks();
          } else {
            showError(data.message || '取消失败');
          }
        })
        .catch(err => {
          showError('取消失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = {
        1: 'warning',   // 待审核
        2: 'success',   // 已上架
        3: 'primary',   // 进行中
        4: 'secondary', // 已结束
        5: 'danger'     // 已取消
      };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = {
        1: '待审核',
        2: '已上架',
        3: '进行中',
        4: '已结束',
        5: '已取消'
      };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadTasks();
  </script>
</body>
</html>
{{ end }}
