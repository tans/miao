{{ define "title" }}认领审核 - 创意喵{{ end }}

{{ define "content" }}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/business/dashboard.html" class="list-group-item list-group-item-action">首页</a>
      <a href="/business/task_create.html" class="list-group-item list-group-item-action">发布任务</a>
      <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
      <a href="/business/claim_review.html" class="list-group-item list-group-item-action active">认领审核</a>
      <a href="/business/transactions.html" class="list-group-item list-group-item-action">资金流水</a>
    </div>
  </div>
  <div class="col-md-9">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>认领审核</h2>
    </div>

    <div class="card mb-4">
      <div class="card-header bg-warning text-dark">
        <h5 class="mb-0">待审核认领</h5>
      </div>
      <div class="card-body">
        <div id="pending-list">
          <div class="text-center py-5 loading-placeholder">
            <div class="text-muted mb-3">
              <svg width="48" height="48" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566z"/>
                <path d="M8 4.5a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5H5a.5.5 0 0 1-.5-.5V5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3z"/>
              </svg>
            </div>
            <h5 class="text-muted">暂无待审核认领</h5>
            <p class="text-muted small">快去任务大厅看看吧</p>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">审核历史</h5>
      </div>
      <div class="card-body">
        <div id="history-list">
          <div class="text-center py-5 loading-placeholder">
            <div class="text-muted mb-3">
              <svg width="48" height="48" fill="currentColor" viewBox="0 0 16 16">
                <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
              </svg>
            </div>
            <h5 class="text-muted">暂无审核历史</h5>
            <p class="text-muted small">审核记录将显示在这里</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 审核 Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">审核认领</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="review-claim-id">
        <div id="review-claim-info"></div>
        <hr>
        <div class="mb-3">
          <label for="review-comment" class="form-label">审核意见</label>
          <textarea class="form-control" id="review-comment" rows="3" placeholder="可选，填写审核意见"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" onclick="submitReview(2)">退回</button>
        <button type="button" class="btn btn-success" onclick="submitReview(1)">通过</button>
      </div>
    </div>
  </div>
</div>

<!-- 详情 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">认领详情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="detail-modal-body">
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script>
const statusMap = {
  1: { label: '待提交', class: 'bg-secondary' },
  2: { label: '已提交', class: 'bg-warning' },
  3: { label: '已通过', class: 'bg-success' },
  4: { label: '已取消', class: 'bg-danger' },
  5: { label: '已超时', class: 'bg-dark' }
};

if (!requireAuth() || getUserRole() !== 'business') {
  // 已重定向
} else {
  loadData();

  function loadData() {
    Promise.all([
      apiRequest('/business/claims?status=2'),  // 已提交(待审核)
      apiRequest('/business/claims')
    ])
      .then(([pendingData, allData]) => {
        if (pendingData.code === 0) {
          renderPending(pendingData.data || []);
        }
        if (allData.code === 0) {
          // Filter to only show reviewed claims (status 3, 4, 5)
          const history = (allData.data || []).filter(c => c.status >= 3);
          renderHistory(history);
        }
      })
      .catch(handleApiError);
  }

  function renderPending(claims) {
    const container = document.getElementById('pending-list');
    if (claims.length === 0) {
      container.innerHTML = `
        <div class="text-center py-5">
          <h5 class="text-muted">暂无待审核认领</h5>
          <p class="text-muted small">等待创作者提交交付</p>
        </div>
      `;
      return;
    }

    container.innerHTML = claims.map(claim => {
      const submitTime = claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-';
      const expiresTime = claim.expires_at ? new Date(claim.expires_at).toLocaleString('zh-CN') : '-';

      return `
        <div class="card mb-3">
          <div class="card-body">
            <div class="row">
              <div class="col-md-8">
                <h5>任务 #${claim.task_id}</h5>
                <p class="text-muted mb-2">
                  创作者ID: ${claim.creator_id}
                </p>
                <div class="mb-2">
                  <strong>交付内容:</strong>
                  <p class="mb-0">${escapeHtml(claim.content || '无内容')}</p>
                </div>
                <div class="d-flex gap-3">
                  <span>提交时间: ${submitTime}</span>
                  <span class="text-muted">|</span>
                  <span>超时时间: ${expiresTime}</span>
                </div>
              </div>
              <div class="col-md-4 text-end">
                <div class="mb-2">
                  <span class="badge bg-warning text-dark">待审核</span>
                </div>
                <div class="mt-2">
                  <button class="btn btn-success btn-sm" onclick="openReviewModal(${claim.id}, 1)">通过</button>
                  <button class="btn btn-outline-danger btn-sm" onclick="openReviewModal(${claim.id}, 2)">退回</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderHistory(claims) {
    const container = document.getElementById('history-list');
    if (claims.length === 0) {
      container.innerHTML = `
        <div class="text-center py-5">
          <h5 class="text-muted">暂无审核历史</h5>
        </div>
      `;
      return;
    }

    container.innerHTML = `
      <table class="table table-hover">
        <thead>
          <tr>
            <th>任务ID</th>
            <th>创作者ID</th>
            <th>认领时间</th>
            <th>审核时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          ${claims.map(claim => {
            const status = statusMap[claim.status] || statusMap[1];
            const reviewTime = claim.review_at ? new Date(claim.review_at).toLocaleString('zh-CN') : '-';
            return `
              <tr>
                <td>${claim.task_id}</td>
                <td>${claim.creator_id}</td>
                <td>${new Date(claim.created_at).toLocaleString('zh-CN')}</td>
                <td>${reviewTime}</td>
                <td><span class="badge ${status.class}">${status.label}</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary" onclick="viewDetail(${claim.id})">详情</button>
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  function openReviewModal(claimId, result) {
    document.getElementById('review-claim-id').value = claimId;
    document.getElementById('review-claim-info').innerHTML = `
      <div class="alert alert-info">
        确认${result === 1 ? '<strong>通过</strong>' : '<strong>退回</strong>'}此认领申请？
        通过后收益将结算给创作者。
      </div>
    `;
    new bootstrap.Modal(document.getElementById('reviewModal')).show();
  }

  function submitReview(result) {
    const claimId = document.getElementById('review-claim-id').value;
    const comment = document.getElementById('review-comment').value;

    apiRequest('/business/claim/' + claimId + '/review', 'PUT', {
      result: result,
      comment: comment
    })
      .then(data => {
        if (data.code === 0) {
          showSuccess(result === 1 ? '已通过审核' : '已退回');
          bootstrap.Modal.getInstance(document.getElementById('reviewModal')).hide();
          document.getElementById('review-comment').value = '';
          loadData();
        } else {
          showError(data.message || '操作失败');
        }
      })
      .catch(handleApiError);
  }

  function viewDetail(claimId) {
    apiRequest('/business/claim/' + claimId)
      .then(data => {
        if (data.code === 0) {
          const claim = data.data;
          const status = statusMap[claim.status] || statusMap[1];
          document.getElementById('detail-modal-body').innerHTML = `
            <div class="row">
              <div class="col-md-6">
                <p><strong>认领ID:</strong> ${claim.id}</p>
                <p><strong>任务ID:</strong> ${claim.task_id}</p>
                <p><strong>创作者ID:</strong> ${claim.creator_id}</p>
                <p><strong>状态:</strong> <span class="badge ${status.class}">${status.label}</span></p>
              </div>
              <div class="col-md-6">
                <p><strong>认领时间:</strong> ${new Date(claim.created_at).toLocaleString('zh-CN')}</p>
                <p><strong>提交时间:</strong> ${claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-'}</p>
                <p><strong>审核时间:</strong> ${claim.review_at ? new Date(claim.review_at).toLocaleString('zh-CN') : '-'}</p>
              </div>
            </div>
            <div class="mt-3">
              <strong>交付内容:</strong>
              <p class="border rounded p-2 mb-0">${escapeHtml(claim.content || '无内容')}</p>
            </div>
            ${claim.review_comment ? `
            <div class="mt-3">
              <strong>审核意见:</strong>
              <p class="text-muted mb-0">${escapeHtml(claim.review_comment)}</p>
            </div>
            ` : ''}
          `;
          new bootstrap.Modal(document.getElementById('detailModal')).show();
        }
      })
      .catch(handleApiError);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
}
</script>
{{ end }}
