<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>认领审核 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
  <link rel="preload" as="style" href="/static/css/ui-enhancements.css">
  <link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
  <noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">认领审核</h1>
        <p class="page-subtitle">审核创作者的任务认领申请</p>
      </div>

      <div class="card">
        <div class="card-body">
          <div id="claim-list">
            <div class="text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2 text-muted">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Claim Detail Modal -->
  <div class="modal fade" id="claimDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">认领详情</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="claimDetailContent">
          <div class="text-center py-3">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
        <div class="modal-footer" id="claimDetailActions"></div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();
    let claimModal = null;

    document.addEventListener('DOMContentLoaded', function() {
      claimModal = new bootstrap.Modal(document.getElementById('claimDetailModal'));
      loadClaims();
    });

    function loadClaims() {
      apiRequest('/business/claims', 'GET')
        .then(data => {
          const container = document.getElementById('claim-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(claim => `
              <div class="card mb-3" onclick="showClaimDetail(${claim.id})" style="cursor:pointer;">
                <div class="card-body">
                  <div class="row align-items-center">
                    <div class="col-md-8">
                      <h5 class="mb-2">${escapeHtml(claim.task_title || '任务')}</h5>
                      <div class="d-flex gap-3 small text-muted">
                        <span>创作者: ${escapeHtml(claim.creator_name || '-')}</span>
                        <span>认领时间: ${formatDate(claim.created_at)}</span>
                      </div>
                    </div>
                    <div class="col-md-4 text-md-end mt-3 mt-md-0">
                      <span class="badge bg-${getStatusColor(claim.status)}">${getStatusText(claim.status)}</span>
                    </div>
                  </div>
                </div>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="text-center py-5 text-muted">暂无认领记录</div>';
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function showClaimDetail(claimId) {
      apiRequest('/business/claim/' + claimId, 'GET')
        .then(data => {
          if (data.code === 0 && data.data) {
            const claim = data.data;
            let materialsHtml = '';
            if (claim.materials && claim.materials.length > 0) {
              materialsHtml = '<div class="mt-3"><h6>提交素材：</h6><div class="d-flex gap-2 flex-wrap">';
              claim.materials.forEach(mat => {
                if (mat.file_type === 'video') {
                  materialsHtml += '<video src="' + mat.file_path + '" controls style="width:120px;height:120px;object-fit:cover;border-radius:8px;"></video>';
                } else {
                  materialsHtml += '<img src="' + mat.file_path + '" alt="素材" style="width:120px;height:120px;object-fit:cover;border-radius:8px;">';
                }
              });
              materialsHtml += '</div></div>';
            }

            let actionsHtml = '';
            if (claim.status === 2) { // 待验收
              actionsHtml = `
                <button class="btn btn-success" onclick="reviewClaim(${claim.id}, 1)">通过</button>
                <button class="btn btn-outline-danger" onclick="reviewClaim(${claim.id}, 2)">退回</button>
              `;
            }

            document.getElementById('claimDetailContent').innerHTML = `
              <div class="text-center mb-3">
                <img src="${claim.creator_avatar || '/static/images/avatar-default.jpg'}" alt="${claim.creator_name}" class="rounded-circle" style="width:64px;height:64px;">
                <h5 class="mt-2">${escapeHtml(claim.creator_name || '创作者')}</h5>
              </div>
              <div class="small text-muted mb-2">提交时间: ${formatDate(claim.submit_at)}</div>
              <div class="mb-3">
                <strong>交付内容：</strong>
                <p class="mb-0">${escapeHtml(claim.content || '无')}</p>
              </div>
              ${materialsHtml}
            `;
            document.getElementById('claimDetailActions').innerHTML = actionsHtml;
            claimModal.show();
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function reviewClaim(claimId, result) {
      const comment = prompt('请输入验收意见（可选）：');
      apiRequest('/business/claim/' + claimId + '/review', 'PUT', { result: result, comment: comment || '' })
        .then(data => {
          if (data.code === 0) {
            showSuccess(result === 1 ? '已通过' : '已退回');
            claimModal.hide();
            loadClaims();
          } else {
            showError(data.message || '操作失败');
          }
        })
        .catch(err => {
          showError('操作失败');
          console.error(err);
        });
    }

    function getStatusColor(status) {
      const colors = {
        1: 'secondary', // 待提交
        2: 'info',      // 待验收
        3: 'success',   // 已完成
        4: 'danger',    // 已取消
        5: 'warning'    // 已超时
      };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = {
        1: '待提交',
        2: '待验收',
        3: '已完成',
        4: '已取消',
        5: '已超时'
      };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadClaims();
  </script>
</body>
</html>
