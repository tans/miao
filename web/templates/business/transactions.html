{{ define "business/transactions.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资金流水 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link href="/static/css/custom.css" rel="stylesheet">
  <link href="/static/css/ui-enhancements.css" rel="stylesheet">
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">资金流水</h1>
        <p class="page-subtitle">查看账户收支记录</p>
      </div>

      <div class="card animate-fade-in-up">
        <div class="card-body">
          <div id="transaction-list">
            <div class="text-center py-5">
              <div class="spinner-paw mb-3">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                  <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </div>
              <p class="text-muted small mb-0">加载中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .spinner-paw { display: flex; justify-content: center; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadTransactions() {
      apiRequest('/business/transactions', 'GET')
        .then(data => {
          const container = document.getElementById('transaction-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = `
              <div class="table-responsive">
                <table class="table">
                  <thead>
                    <tr>
                      <th>时间</th>
                      <th>类型</th>
                      <th>金额</th>
                      <th>余额</th>
                      <th>说明</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${ensureArray(data.data).map(tx => `
                      <tr>
                        <td>${formatDate(tx.created_at)}</td>
                        <td><span class="badge bg-${getTypeColor(tx.type)}">${getTypeText(tx.type)}</span></td>
                        <td class="${tx.amount > 0 ? 'text-success' : 'text-danger'}">${tx.amount > 0 ? '+' : ''}¥${Math.abs(tx.amount)}</td>
                        <td>¥${tx.balance}</td>
                        <td class="text-muted small">${escapeHtml(tx.description || '-')}</td>
                      </tr>
                    `).join('')}
                  </tbody>
                </table>
              </div>
            `;
          } else {
            container.innerHTML = '<div class="text-center py-5 text-muted">暂无流水记录</div>';
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function getTypeColor(type) {
      const colors = { 'recharge': 'success', 'payment': 'danger', 'refund': 'warning' };
      return colors[type] || 'secondary';
    }

    function getTypeText(type) {
      const texts = { 'recharge': '充值', 'payment': '支付', 'refund': '退款' };
      return texts[type] || type;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadTransactions();
  </script>
</body>
</html>
{{ end }}
