{% raw %}{% extends "layout.html" %}

{% block title %}发起申诉 - 创意喵{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/business/dashboard.html" class="list-group-item list-group-item-action">首页</a>
      <a href="/business/task_create.html" class="list-group-item list-group-item-action">发布任务</a>
      <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
      <a href="/business/claim_review.html" class="list-group-item list-group-item-action">认领审核</a>
      <a href="/business/transactions.html" class="list-group-item list-group-item-action">账户流水</a>
      <a href="/business/appeal.html" class="list-group-item list-group-item-action active">发起申诉</a>
      <a href="/business/appeal_list.html" class="list-group-item list-group-item-action">申诉记录</a>
    </div>
  </div>
  <div class="col-md-9">
    <h2>发起申诉</h2>
    <div class="card mt-4">
      <div class="card-body">
        <form id="appeal-form">
          <div class="mb-3">
            <label for="appeal-type" class="form-label">申诉类型</label>
            <select class="form-select" id="appeal-type" required>
              <option value="">请选择申诉类型</option>
              <option value="1">任务纠纷</option>
              <option value="2">资金问题</option>
              <option value="3">创作者违规</option>
              <option value="4">其他</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="target-id" class="form-label">关联ID</label>
            <input type="number" class="form-control" id="target-id" placeholder="请输入关联的任务ID或投稿ID" required>
            <div class="form-text">输入与该申诉相关的任务ID或投稿ID</div>
          </div>
          <div class="mb-3">
            <label for="reason" class="form-label">申诉原因</label>
            <textarea class="form-control" id="reason" rows="5" placeholder="请详细描述申诉原因..." required></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">提交申诉</button>
            <a href="/business/dashboard.html" class="btn btn-outline-secondary">取消</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
if (!requireAuth() || getUserRole() !== 'business') {
  // 已重定向
} else {
  document.getElementById('appeal-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const appealData = {
      type: parseInt(document.getElementById('appeal-type').value),
      target_id: parseInt(document.getElementById('target-id').value),
      reason: document.getElementById('reason').value.trim()
    };

    apiRequest('/appeals', 'POST', appealData)
      .then(data => {
        if (data.code === 0) {
          showSuccess('申诉提交成功！');
          window.location.href = '/business/appeal_list.html';
        } else {
          showError('提交失败：' + (data.message || '未知错误'));
        }
      })
      .catch(handleApiError);
  });
}
</script>
{% endblock %}
{% endraw %}
