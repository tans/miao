{{ define "business/appeal.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发起申诉 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <style>
    body { background-color: #f8f9fa; }
    .sidebar { background-color: white; border-radius: 8px; padding: 1rem; }
    .sidebar .list-group-item { border: none; border-radius: 6px; margin-bottom: 0.25rem; }
    .sidebar .list-group-item.active { background-color: #0d6efd; color: white; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; }
  </style>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="sidebar">
          <div class="list-group">
            <a href="/business/dashboard.html" class="list-group-item list-group-item-action">工作台</a>
            <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
            <a href="/business/appeal.html" class="list-group-item list-group-item-action active">发起申诉</a>
            <a href="/business/appeal_list.html" class="list-group-item list-group-item-action">申诉记录</a>
          </div>
        </div>
      </div>

      <div class="col-md-10">
        <div class="content-area">
          <h4 class="mb-4">发起申诉</h4>

          <div class="alert alert-info d-flex align-items-start gap-2">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flex-shrink-0 mt-1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            <div><strong>申诉说明：</strong> 如果您对平台处理结果有异议，可以在此发起申诉。</div>
          </div>

          <form id="appeal-form">
            <div class="mb-3">
              <label for="task-id" class="form-label fw-medium">选择任务 <span class="text-danger">*</span></label>
              <select class="form-select" id="task-id" required>
                <option value="">加载中...</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="appeal-type" class="form-label fw-medium">申诉类型 <span class="text-danger">*</span></label>
              <select class="form-select" id="appeal-type" required>
                <option value="">请选择...</option>
                <option value="1">创作者违规</option>
                <option value="2">交付质量问题</option>
                <option value="3">平台处理不当</option>
                <option value="4">其他</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="appeal-reason" class="form-label">申诉理由 <span class="text-danger">*</span></label>
              <textarea class="form-control" id="appeal-reason" rows="6" placeholder="请详细说明您的申诉理由..." required></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-send"></i> 提交申诉
              </button>
              <a href="/business/appeal_list.html" class="btn btn-outline-secondary">查看申诉记录</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const role = localStorage.getItem('current_role') || localStorage.getItem('role');
      if (role !== 'business') {
        showError('无权访问此页面');
        setTimeout(() => window.location.href = '/auth/login.html', 1500);
        return;
      }

      loadTasks();

      document.getElementById('appeal-form').addEventListener('submit', function(e) {
        e.preventDefault();
        submitAppeal();
      });
    });

    function loadTasks() {
      apiRequest('/business/tasks', 'GET')
        .then(data => {
          if (data.code === 0) {
            const select = document.getElementById('task-id');
            const tasks = data.data || [];

            if (tasks.length === 0) {
              select.innerHTML = '<option value="">暂无任务</option>';
              return;
            }

            select.innerHTML = '<option value="">请选择...</option>' +
              ensureArray(tasks).map(task =>
                `<option value="${task.id}">${escapeHtml(task.title)} - ${new Date(task.created_at).toLocaleDateString()}</option>`
              ).join('');
          }
        })
        .catch(err => {
          showError('加载任务失败');
          console.error(err);
        });
    }

    function submitAppeal() {
      const taskId = document.getElementById('task-id').value;
      const type = document.getElementById('appeal-type').value;
      const reason = document.getElementById('appeal-reason').value.trim();

      if (!taskId || !type || !reason) {
        showError('请填写完整信息');
        return;
      }

      const appealData = {
        task_id: parseInt(taskId),
        type: parseInt(type),
        reason: reason
      };

      showLoading('提交中...');

      apiRequest('/appeals', 'POST', appealData)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            showSuccess('申诉提交成功');
            setTimeout(() => window.location.href = '/business/appeal_list.html', 1500);
          } else {
            showError(data.message || '提交失败');
          }
        })
        .catch(err => {
          hideLoading();
          showError('提交失败');
          console.error(err);
        });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
