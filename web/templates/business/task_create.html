<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布任务 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">创意喵</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/business/dashboard.html">工作台</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/messages.html">消息</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="username">用户</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/user/profile.html">个人资料</a></li>
              <li><a class="dropdown-item" href="/user/password.html">修改密码</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" onclick="logout()">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid mt-4">
    <div class="row">
      <div class="col-md-2">
        <div class="list-group">
          <a href="/business/dashboard.html" class="list-group-item list-group-item-action">
            <i class="bi bi-speedometer2"></i> 工作台
          </a>
          <a href="/business/task_create.html" class="list-group-item list-group-item-action active">
            <i class="bi bi-plus-circle"></i> 发布任务
          </a>
          <a href="/business/task_list.html" class="list-group-item list-group-item-action">
            <i class="bi bi-list-task"></i> 我的任务
          </a>
          <a href="/business/claim_review.html" class="list-group-item list-group-item-action">
            <i class="bi bi-check-circle"></i> 认领审核
          </a>
          <a href="/business/submission_review.html" class="list-group-item list-group-item-action">
            <i class="bi bi-file-check"></i> 交付验收
          </a>
          <a href="/business/transactions.html" class="list-group-item list-group-item-action">
            <i class="bi bi-wallet2"></i> 资金流水
          </a>
          <a href="/business/recharge.html" class="list-group-item list-group-item-action">
            <i class="bi bi-cash-coin"></i> 账户充值
          </a>
        </div>
      </div>

      <div class="col-md-10">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="card-title mb-4">发布新任务</h2>

            <div id="balance-alert" class="alert alert-warning d-none">
              <strong>余额不足!</strong> 当前余额: ¥<span id="current-balance">-</span>，发布此任务需要预付 ¥<span id="required-balance">-</span>
              <a href="/business/recharge.html" class="alert-link ms-2">立即充值</a>
            </div>

            <div id="success-alert" class="alert alert-success d-none">
              <strong>发布成功!</strong> 正在跳转到任务列表...
            </div>

            <form id="task-form">
              <div class="mb-3">
                <label for="title" class="form-label">任务标题 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="title" required maxlength="100" placeholder="简洁明确的任务标题">
                <div class="invalid-feedback"></div>
              </div>

              <div class="mb-3">
                <label for="description" class="form-label">任务描述 <span class="text-danger">*</span></label>
                <textarea class="form-control" id="description" rows="5" required placeholder="详细描述任务要求、交付标准、注意事项等"></textarea>
                <div class="invalid-feedback"></div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="category" class="form-label">任务分类 <span class="text-danger">*</span></label>
                  <select class="form-select" id="category" required>
                    <option value="">请选择分类</option>
                    <option value="1">文案创作</option>
                    <option value="2">设计创意</option>
                    <option value="3">视频制作</option>
                    <option value="4">摄影拍照</option>
                    <option value="5">音乐音频</option>
                    <option value="6">程序开发</option>
                    <option value="7">其他</option>
                  </select>
                  <div class="invalid-feedback"></div>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="quantity" class="form-label">认领数量 <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="quantity" min="1" max="1000" required value="1">
                  <div class="invalid-feedback"></div>
                  <small class="text-muted">可认领的份数</small>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="unit_price" class="form-label">单价 (元/份) <span class="text-danger">*</span></label>
                  <input type="number" class="form-control" id="unit_price" min="1" step="0.01" required value="10">
                  <div class="invalid-feedback"></div>
                </div>

                <div class="col-md-6 mb-3">
                  <label for="deadline" class="form-label">认领截止时间 <span class="text-danger">*</span></label>
                  <input type="datetime-local" class="form-control" id="deadline" required>
                  <div class="invalid-feedback"></div>
                </div>
              </div>

              <div class="card bg-light mb-4">
                <div class="card-body">
                  <h5 class="card-title">费用预览</h5>
                  <table class="table table-sm mb-0">
                    <tbody>
                      <tr>
                        <td>单价</td>
                        <td class="text-end">¥<span id="preview-unit-price">10.00</span></td>
                      </tr>
                      <tr>
                        <td>数量</td>
                        <td class="text-end">× <span id="preview-quantity">1</span></td>
                      </tr>
                      <tr>
                        <td>平台服务费 (5%)</td>
                        <td class="text-end">¥<span id="preview-platform-fee">0.50</span></td>
                      </tr>
                      <tr class="fw-bold border-top">
                        <td>总费用</td>
                        <td class="text-end text-primary fs-5">¥<span id="preview-total">10.50</span></td>
                      </tr>
                    </tbody>
                  </table>
                  <small class="text-muted d-block mt-2">* 发布后费用将立即从余额中冻结</small>
                </div>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" id="submit-btn" class="btn btn-primary" disabled>发布任务</button>
                <a href="/business/task_list.html" class="btn btn-outline-secondary">取消</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    let currentBalance = 0;
    let totalCost = 0;

    if (!requireAuth() || getUserRole() !== 'business') {
      // 已重定向
    } else {
      const user = getUser();
      if (user && user.username) {
        document.getElementById('username').textContent = user.username;
      }

      loadBalance();
      updateCostPreview();

      // 设置默认截止时间 (7天后)
      const defaultDeadline = new Date();
      defaultDeadline.setDate(defaultDeadline.getDate() + 7);
      document.getElementById('deadline').value = defaultDeadline.toISOString().slice(0, 16);

      // 监听输入变化
      ['unit_price', 'quantity'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateCostPreview);
      });

      document.getElementById('task-form').addEventListener('submit', handleSubmit);
    }

    function loadBalance() {
      apiRequest('/api/v1/business/balance', 'GET', null, false)
        .then(data => {
          if (data.code === 0) {
            currentBalance = data.data.balance || 0;
            updateBalanceAlert();
          }
        })
        .catch(err => {
          console.error('加载余额失败:', err);
        });
    }

    function updateCostPreview() {
      const unitPrice = parseFloat(document.getElementById('unit_price').value) || 0;
      const quantity = parseInt(document.getElementById('quantity').value) || 0;
      const platformFee = unitPrice * quantity * 0.05;
      totalCost = unitPrice * quantity + platformFee;

      document.getElementById('preview-unit-price').textContent = unitPrice.toFixed(2);
      document.getElementById('preview-quantity').textContent = quantity;
      document.getElementById('preview-platform-fee').textContent = platformFee.toFixed(2);
      document.getElementById('preview-total').textContent = totalCost.toFixed(2);

      updateBalanceAlert();
    }

    function updateBalanceAlert() {
      const alertEl = document.getElementById('balance-alert');
      const submitBtn = document.getElementById('submit-btn');

      if (currentBalance < totalCost) {
        alertEl.classList.remove('d-none');
        document.getElementById('current-balance').textContent = currentBalance.toFixed(2);
        document.getElementById('required-balance').textContent = totalCost.toFixed(2);
        submitBtn.disabled = true;
      } else {
        alertEl.classList.add('d-none');
        submitBtn.disabled = false;
      }
    }

    function handleSubmit(e) {
      e.preventDefault();

      if (currentBalance < totalCost) {
        alert('余额不足，请先充值');
        return;
      }

      const formData = {
        title: document.getElementById('title').value.trim(),
        description: document.getElementById('description').value.trim(),
        category: parseInt(document.getElementById('category').value),
        unit_price: parseFloat(document.getElementById('unit_price').value),
        total_count: parseInt(document.getElementById('quantity').value),
        end_at: document.getElementById('deadline').value
      };

      if (!formData.title || formData.title.length < 5) {
        alert('任务标题至少5个字符');
        return;
      }

      if (!formData.description || formData.description.length < 10) {
        alert('任务描述至少10个字符');
        return;
      }

      if (!formData.category) {
        alert('请选择任务分类');
        return;
      }

      if (confirm(`确认发布此任务？\n总费用: ¥${totalCost.toFixed(2)}\n(将从余额中冻结)`)) {
        showLoading('发布中...');
        apiRequest('/api/v1/business/tasks', 'POST', formData, false)
          .then(data => {
            hideLoading();
            if (data.code === 0) {
              document.getElementById('success-alert').classList.remove('d-none');
              setTimeout(() => {
                window.location.href = '/business/task_list.html';
              }, 1500);
            } else {
              alert('发布失败: ' + (data.message || '未知错误'));
            }
          })
          .catch(err => {
            hideLoading();
            console.error('发布失败:', err);
            alert('发布失败，请稍后重试');
          });
      }
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth/login.html';
    }
  </script>
</body>
</html>
