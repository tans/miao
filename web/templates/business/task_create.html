<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发布任务 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <!-- 页面标题 -->
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">发布任务</h1>
        <p class="page-subtitle">创建视频任务，吸引创作者认领并交付</p>
      </div>

      <div class="row">
        <!-- 表单区域 -->
        <div class="col-lg-8">
          <div class="card mb-4">
            <div class="card-body p-4">
              <form id="task-form">
                <div class="mb-4">
                  <label for="title" class="form-label">任务标题</label>
                  <input type="text" class="form-control" id="title" required placeholder="简明扼要地描述任务内容">
                </div>

                <div class="mb-4">
                  <label for="description" class="form-label">任务描述</label>
                  <textarea class="form-control" id="description" rows="5" required placeholder="详细说明任务要求、脚本、镜头、出镜与剪辑要求"></textarea>
                </div>

                <div class="row g-3 mb-4">
                  <div class="col-md-6">
                    <label for="price" class="form-label">单价（元）</label>
                    <input type="number" class="form-control" id="price" required min="1" max="1000000" step="0.01" placeholder="每个作品的价格">
                  </div>
                  <div class="col-md-6">
                    <label for="quantity" class="form-label">需求数量</label>
                    <input type="number" class="form-control" id="quantity" required min="1" max="10000" placeholder="需要多少个作品">
                  </div>
                </div>

                <div class="mb-4">
                  <label for="deadline" class="form-label">截止时间</label>
                  <input type="datetime-local" class="form-control" id="deadline" required>
                </div>

                <div class="mb-4">
                  <label for="requirements" class="form-label">交付要求</label>
                  <textarea class="form-control" id="requirements" rows="3" placeholder="视频格式、分辨率、时长等具体要求"></textarea>
                </div>

                <div class="d-flex gap-3">
                  <button type="submit" class="btn btn-primary btn-lg">发布任务</button>
                  <a href="/business/dashboard.html" class="btn btn-outline-secondary btn-lg">取消</a>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- 预算预览 -->
        <div class="col-lg-4">
          <div class="card sticky-top" style="top: 100px;">
            <div class="card-header">
              <h5 class="mb-0">预算预览</h5>
            </div>
            <div class="card-body">
              <table class="table table-borderless mb-0">
                <tbody>
                  <tr>
                    <td class="text-muted">单价</td>
                    <td class="text-end fw-bold" id="preview-price">¥0.00</td>
                  </tr>
                  <tr>
                    <td class="text-muted">数量</td>
                    <td class="text-end fw-bold" id="preview-quantity">0</td>
                  </tr>
                  <tr>
                    <td class="text-muted">小计</td>
                    <td class="text-end fw-bold" id="preview-subtotal">¥0.00</td>
                  </tr>
                  <tr>
                    <td class="text-muted">平台服务费 (10%)</td>
                    <td class="text-end fw-bold" id="preview-fee">¥0.00</td>
                  </tr>
                  <tr class="border-top">
                    <td class="text-muted fw-bold">总计</td>
                    <td class="text-end text-primary fs-4 fw-bold" id="preview-total">¥0.00</td>
                  </tr>
                </tbody>
              </table>
              <div class="alert alert-primary mt-3 mb-0">
                <small>发布任务后，总金额将从您的账户余额中扣除</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    const priceInput = document.getElementById('price');
    const quantityInput = document.getElementById('quantity');

    function updatePreview() {
      const price = parseFloat(priceInput.value) || 0;
      const quantity = parseInt(quantityInput.value) || 0;
      const subtotal = price * quantity;
      const fee = subtotal * 0.1;
      const total = subtotal + fee;

      document.getElementById('preview-price').textContent = '¥' + price.toFixed(2);
      document.getElementById('preview-quantity').textContent = quantity;
      document.getElementById('preview-subtotal').textContent = '¥' + subtotal.toFixed(2);
      document.getElementById('preview-fee').textContent = '¥' + fee.toFixed(2);
      document.getElementById('preview-total').textContent = '¥' + total.toFixed(2);
    }

    priceInput.addEventListener('input', updatePreview);
    quantityInput.addEventListener('input', updatePreview);

    document.getElementById('task-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const title = document.getElementById('title').value.trim();
      const description = document.getElementById('description').value.trim();
      const price = parseFloat(document.getElementById('price').value);
      const quantity = parseInt(document.getElementById('quantity').value);
      const deadline = document.getElementById('deadline').value;
      const requirements = document.getElementById('requirements').value.trim();

      if (!title || !description || !price || !quantity || !deadline) {
        showError('请填写所有必填项');
        return;
      }

      const taskData = {
        title,
        description,
        price,
        quantity,
        deadline,
        requirements
      };

      apiRequest('/api/v1/business/tasks', 'POST', taskData)
        .then(data => {
          if (data.code === 0) {
            showSuccess('任务发布成功');
            setTimeout(() => {
              window.location.href = '/business/task_list.html';
            }, 1000);
          } else {
            showError(data.message || '发布失败');
          }
        })
        .catch(err => {
          showError('发布失败，请重试');
          console.error(err);
        });
    });

    updatePreview();
  </script>
</body>
</html>
