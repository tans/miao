{{ define "business/task_detail.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任务详情 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="mb-4">
        <a href="/business/task_list.html" class="btn btn-outline-secondary">← 返回任务列表</a>
      </div>

      <div id="task-detail">
        <div class="text-center py-5">
          <div class="spinner-paw mb-3">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="20" stroke="var(--color-primary)" stroke-width="3" stroke-dasharray="80 40" stroke-linecap="round">
                <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </div>
          <p class="text-muted small mb-0">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .spinner-paw { display: flex; justify-content: center; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    const urlParams = new URLSearchParams(window.location.search);
    const taskId = urlParams.get('id');

    if (!taskId) {
      showError('缺少任务ID');
      setTimeout(() => window.location.href = '/business/task_list.html', 1500);
    } else {
      loadTaskDetail(taskId);
    }

    function loadTaskDetail(taskId) {
      apiRequest('/business/tasks/' + taskId, 'GET')
        .then(data => {
          if (data.code === 0) {
            renderTaskDetail(data.data);
          } else {
            showError(data.message || '加载失败');
          }
        })
        .catch(err => {
          showError('加载失败');
          console.error(err);
        });
    }

    function renderTaskDetail(task) {
      const container = document.getElementById('task-detail');
      container.innerHTML = `
        <div class="row">
          <div class="col-lg-8">
            <div class="card mb-4">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                  <h2 class="mb-0">${escapeHtml(task.title)}</h2>
                  <span class="badge bg-${getStatusColor(task.status)}">${getStatusText(task.status)}</span>
                </div>

                <div class="mb-4">
                  <h5 class="mb-3">任务描述</h5>
                  <p class="text-muted">${escapeHtml(task.description)}</p>
                </div>

                ${task.requirements ? `
                  <div class="mb-4">
                    <h5 class="mb-3">交付要求</h5>
                    <p class="text-muted">${escapeHtml(task.requirements)}</p>
                  </div>
                ` : ''}

                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">单价</div>
                        <div class="h4 mb-0 text-primary">¥${task.price}</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">需求数量</div>
                        <div class="h4 mb-0">${task.quantity}</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">已认领</div>
                        <div class="h4 mb-0">${task.claimed_count || 0}</div>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="card bg-secondary">
                      <div class="card-body">
                        <div class="text-muted small mb-1">截止时间</div>
                        <div class="h6 mb-0">${formatDate(task.deadline)}</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">认领列表</h5>
              </div>
              <div class="card-body">
                <div id="claims-list">
                  <div class="text-center py-3 text-muted">加载中...</div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="card sticky-top" style="top: 100px;">
              <div class="card-body">
                <h5 class="mb-4">操作</h5>
                <a href="/business/submission_review.html?task_id=${task.id}" class="btn btn-primary w-100 mb-3">查看投稿</a>
                ${task.status === 'pending' ? `
                  <button class="btn btn-outline-danger w-100 mb-3" onclick="cancelTask(${task.id})">取消任务</button>
                ` : ''}
                <a href="/business/task_list.html" class="btn btn-outline-secondary w-100">返回列表</a>
              </div>
            </div>
          </div>
        </div>
      `;

      loadClaims(taskId);
    }

    function loadClaims(taskId) {
      apiRequest('/business/tasks/' + taskId + '/claims', 'GET')
        .then(data => {
          const container = document.getElementById('claims-list');
          if (data.code === 0 && data.data && data.data.length > 0) {
            container.innerHTML = ensureArray(data.data).map(claim => `
              <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
                <div>
                  <div class="fw-bold">${escapeHtml(claim.creator_name || '创作者')}</div>
                  <div class="small text-muted">认领时间: ${formatDate(claim.created_at)}</div>
                </div>
                <span class="badge bg-${getClaimStatusColor(claim.status)}">${getClaimStatusText(claim.status)}</span>
              </div>
            `).join('');
          } else {
            container.innerHTML = '<div class="text-center py-3 text-muted">暂无认领</div>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('claims-list').innerHTML = '<div class="text-center py-3 text-danger">加载失败</div>';
        });
    }

    function cancelTask(taskId) {
      showConfirm('确认取消此任务？', function() {
        apiRequest('/tasks/' + taskId, 'DELETE')
          .then(data => {
            if (data.code === 0) {
              showSuccess('任务已取消');
              setTimeout(() => window.location.href = '/business/task_list.html', 1000);
            } else {
              showError(data.message || '取消失败');
            }
          })
          .catch(err => {
            showError('取消失败');
            console.error(err);
          });
      });
    }

    function showConfirm(message, onConfirm) {
      const modal = document.createElement('div');
      modal.className = 'modal fade';
      modal.innerHTML = `
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">确认操作</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">${message}</div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
              <button type="button" class="btn btn-primary" id="confirm-btn">确认</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const bsModal = new bootstrap.Modal(modal);
      modal.querySelector('#confirm-btn').addEventListener('click', function() {
        bsModal.hide();
        onConfirm();
      });
      modal.addEventListener('hidden.bs.modal', function() {
        document.body.removeChild(modal);
      });
      bsModal.show();
    }

    function getStatusColor(status) {
      const colors = { 'pending': 'success', 'in_progress': 'primary', 'completed': 'secondary', 'cancelled': 'danger' };
      return colors[status] || 'secondary';
    }

    function getStatusText(status) {
      const texts = { 'pending': '待认领', 'in_progress': '进行中', 'completed': '已完成', 'cancelled': '已取消' };
      return texts[status] || status;
    }

    function getClaimStatusColor(status) {
      const colors = { 'claimed': 'primary', 'submitted': 'warning', 'approved': 'success', 'rejected': 'danger' };
      return colors[status] || 'secondary';
    }

    function getClaimStatusText(status) {
      const texts = { 'claimed': '已认领', 'submitted': '已提交', 'approved': '已通过', 'rejected': '已拒绝' };
      return texts[status] || status;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
{{ end }}
