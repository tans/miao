{{ define "title" }}任务详情 - 创意喵{{ end }}

{{ define "content" }}
<div class="row">
  <div class="col-md-3">
    <div class="list-group">
      <a href="/business/dashboard.html" class="list-group-item list-group-item-action">首页</a>
      <a href="/business/task_create.html" class="list-group-item list-group-item-action">发布任务</a>
      <a href="/business/task_list.html" class="list-group-item list-group-item-action">我的任务</a>
      <a href="/business/claim_review.html" class="list-group-item list-group-item-action active">认领审核</a>
    </div>
  </div>
  <div class="col-md-9">
    <div id="loading" class="text-center py-4">加载中...</div>
    <div id="content" style="display: none;">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="task-title">任务详情</h2>
        <a href="/business/task_list.html" class="btn btn-outline-secondary">返回列表</a>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <div class="row">
            <div class="col-md-8">
              <h4 class="card-title" id="title"></h4>
              <p class="text-muted small" id="category"></p>
              <p id="description" class="card-text"></p>
            </div>
            <div class="col-md-4 text-md-end">
              <span id="status-badge" class="badge"></span>
              <h3 class="text-primary mt-2">¥<span id="unit-price"></span></h3>
              <small class="text-muted">单价</small>
            </div>
          </div>
          <hr>
          <div class="row text-center">
            <div class="col-4">
              <div class="small text-muted">总数量</div>
              <div class="fw-bold" id="total-count"></div>
            </div>
            <div class="col-4">
              <div class="small text-muted">剩余数量</div>
              <div class="fw-bold text-success" id="remaining-count"></div>
            </div>
            <div class="col-4">
              <div class="small text-muted">已结算</div>
              <div class="fw-bold text-warning" id="paid-count"></div>
            </div>
          </div>
        </div>
      </div>

      <h4>认领列表</h4>
      <div class="card">
        <div class="card-body">
          <div id="claim-list" class="list-group list-group-flush">
            <div class="text-center py-3 text-muted">暂无认领</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 审核 Modal -->
<div class="modal fade" id="reviewModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">审核认领</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="review-claim-id">
        <div class="mb-3">
          <label for="review-result" class="form-label">审核结果</label>
          <select class="form-select" id="review-result">
            <option value="1">通过</option>
            <option value="2">退回</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="review-comment" class="form-label">审核意见</label>
          <textarea class="form-control" id="review-comment" rows="3" placeholder="请输入审核意见（可选）"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="submitReview()">提交审核</button>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script>
const statusMap = {
  0: { label: '待审核', class: 'bg-secondary' },
  1: { label: '待提交', class: 'bg-info' },
  2: { label: '已提交', class: 'bg-warning' },
  3: { label: '已通过', class: 'bg-success' },
  4: { label: '已退回', class: 'bg-danger' }
};

const categoryMap = {
  1: '文案创作',
  2: '设计创意',
  3: '视频制作',
  4: '摄影拍照',
  5: '音乐音频',
  6: '程序开发',
  7: '其他'
};

let currentTask = null;
let reviewModal = null;

if (!requireAuth() || getUserRole() !== 'business') {
  // 已重定向
} else {
  const taskId = new URLSearchParams(window.location.search).get('id');
  if (!taskId) {
    showError('任务ID不存在');
    window.location.href = '/business/task_list.html';
  }

  loadTask();
  loadClaims();

  document.addEventListener('DOMContentLoaded', function() {
    reviewModal = new bootstrap.Modal(document.getElementById('reviewModal'));
  });

  function loadTask() {
    apiRequest('/business/tasks')
      .then(data => {
        if (data.code === 0) {
          const tasks = data.data || [];
          currentTask = tasks.find(t => t.id == taskId);
          if (currentTask) {
            renderTask(currentTask);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
          } else {
            showError('任务不存在');
            window.location.href = '/business/task_list.html';
          }
        }
      })
      .catch(() => {
        showError('加载失败');
      });
  }

  function loadClaims() {
    apiRequest('/business/task/' + taskId + '/claims')
      .then(data => {
        if (data.code === 0) {
          renderClaims(data.data || []);
        }
      });
  }

  function renderTask(task) {
    document.getElementById('task-title').textContent = task.title;
    document.getElementById('title').textContent = task.title;
    document.getElementById('description').textContent = task.description;
    document.getElementById('category').textContent = categoryMap[task.category] || '其他';
    document.getElementById('unit-price').textContent = task.unit_price || 0;
    document.getElementById('total-count').textContent = task.total_count || 0;
    document.getElementById('remaining-count').textContent = task.remaining_count || 0;
    document.getElementById('paid-count').textContent = (task.total_count || 0) - (task.remaining_count || 0);

    const status = statusMap[task.status] || statusMap[0];
    const badge = document.getElementById('status-badge');
    badge.textContent = status.label;
    badge.className = 'badge ' + status.class;
  }

  function renderClaims(claims) {
    const container = document.getElementById('claim-list');
    if (claims.length === 0) {
      container.innerHTML = '<div class="text-center py-3 text-muted">暂无认领</div>';
      return;
    }

    container.innerHTML = claims.map(claim => {
      const status = statusMap[claim.status] || statusMap[0];
      const submitTime = claim.submit_at ? new Date(claim.submit_at).toLocaleString('zh-CN') : '-';
      const expiresTime = claim.expires_at ? new Date(claim.expires_at).toLocaleString('zh-CN') : '-';

      return `
        <div class="list-group-item">
          <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1">
              <div class="d-flex align-items-center gap-2 mb-2">
                <span class="badge ${status.class}">${status.label}</span>
                <small class="text-muted">认领人ID: ${claim.creator_id}</small>
                <small class="text-muted">提交时间: ${submitTime}</small>
              </div>
              <p class="mb-1">${escapeHtml(claim.content || '暂无交付内容')}</p>
              ${claim.review_comment ? `<p class="mb-0 text-muted small"><strong>审核意见:</strong> ${escapeHtml(claim.review_comment)}</p>` : ''}
            </div>
            <div class="ms-3">
              ${claim.status === 2 ? `
                <button class="btn btn-sm btn-success" onclick="openReviewModal(${claim.id})">验收</button>
              ` : ''}
              ${claim.status === 4 ? `
                <span class="badge bg-warning">已退回</span>
              ` : ''}
              ${claim.status === 3 ? `
                <span class="badge bg-success">已验收</span>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function openReviewModal(claimId) {
    document.getElementById('review-claim-id').value = claimId;
    document.getElementById('review-result').value = '1';
    document.getElementById('review-comment').value = '';
    if (!reviewModal) {
      reviewModal = new bootstrap.Modal(document.getElementById('reviewModal'));
    }
    reviewModal.show();
  }

  function submitReview() {
    const claimId = document.getElementById('review-claim-id').value;
    const result = parseInt(document.getElementById('review-result').value);
    const comment = document.getElementById('review-comment').value;

    apiRequest('/business/claim/' + claimId + '/review', 'PUT', {
      result: result,
      comment: comment
    })
      .then(data => {
        if (data.code === 0) {
          showSuccess(result === 1 ? '验收通过' : '已退回');
          if (reviewModal) reviewModal.hide();
          loadClaims();
        } else {
          showError(data.message || '操作失败');
        }
      })
      .catch(handleApiError);
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
}
</script>
{{ end }}
