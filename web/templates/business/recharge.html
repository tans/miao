{{ define "business/recharge.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户充值 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">账户充值</h1>
        <p class="page-subtitle">为账户充值以发布任务</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card mb-4 animate-fade-in-up">
            <div class="card-body">
              <div class="text-center mb-4">
                <div class="text-muted small mb-2">当前余额</div>
                <div class="display-5 text-success fw-bold" id="current-balance">¥0.00</div>
              </div>

              <form id="recharge-form">
                <div class="mb-4">
                  <label class="form-label fw-medium">充值金额</label>
                  <div class="row g-2 mb-3">
                    <div class="col-4">
                      <button type="button" class="btn btn-outline-secondary w-100" onclick="selectAmount(100)">¥100</button>
                    </div>
                    <div class="col-4">
                      <button type="button" class="btn btn-outline-secondary w-100" onclick="selectAmount(500)">¥500</button>
                    </div>
                    <div class="col-4">
                      <button type="button" class="btn btn-outline-secondary w-100" onclick="selectAmount(1000)">¥1000</button>
                    </div>
                  </div>
                  <input type="number" class="form-control" id="amount" placeholder="或输入自定义金额" min="1" step="0.01">
                </div>

                <div class="alert alert-primary d-flex align-items-start gap-2">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flex-shrink-0 mt-1"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                  <small>充值金额将用于发布任务和支付创作者费用</small>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-action">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                  确认充值
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1090;"></div>

  <style>
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action svg { flex-shrink: 0; }
  </style>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadBalance() {
      apiRequest('/business/balance', 'GET')
        .then(data => {
          if (data.code === 0) {
            document.getElementById('current-balance').textContent = '¥' + (data.data.balance || 0).toFixed(2);
          }
        })
        .catch(err => console.error(err));
    }

    function selectAmount(amount) {
      document.getElementById('amount').value = amount;
    }

    document.getElementById('recharge-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);

      if (!amount || amount <= 0) {
        showError('请输入有效金额');
        return;
      }

      apiRequest('/business/recharge', 'POST', { amount })
        .then(data => {
          if (data.code === 0) {
            showSuccess('充值成功');
            loadBalance();
            document.getElementById('amount').value = '';
          } else {
            showError(data.message || '充值失败');
          }
        })
        .catch(err => {
          showError('充值失败');
          console.error(err);
        });
    });

    loadBalance();
  </script>
</body>
</html>
{{ end }}
