<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户充值 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">账户充值</h1>
        <p class="page-subtitle">为账户充值以发布任务</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="card mb-4">
            <div class="card-body">
              <div class="text-center mb-4">
                <div class="text-muted small mb-2">当前余额</div>
                <div class="h2 text-success" id="current-balance">¥0.00</div>
              </div>

              <form id="recharge-form">
                <div class="mb-4">
                  <label class="form-label">充值金额</label>
                  <div class="row g-2 mb-3">
                    <div class="col-4">
                      <button type="button" class="btn btn-outline-secondary w-100" onclick="selectAmount(100)">¥100</button>
                    </div>
                    <div class="col-4">
                      <button type="button" class="btn btn-outline-secondary w-100" onclick="selectAmount(500)">¥500</button>
                    </div>
                    <div class="col-4">
                      <button type="button" class="btn btn-outline-secondary w-100" onclick="selectAmount(1000)">¥1000</button>
                    </div>
                  </div>
                  <input type="number" class="form-control" id="amount" placeholder="或输入自定义金额" min="1" step="0.01">
                </div>

                <div class="alert alert-primary">
                  <small>充值金额将用于发布任务和支付创作者费用</small>
                </div>

                <button type="submit" class="btn btn-primary w-100">确认充值</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();
    requireRole('business');

    function loadBalance() {
      apiRequest('/business/balance', 'GET')
        .then(data => {
          if (data.code === 0) {
            document.getElementById('current-balance').textContent = '¥' + (data.data.balance || 0).toFixed(2);
          }
        })
        .catch(err => console.error(err));
    }

    function selectAmount(amount) {
      document.getElementById('amount').value = amount;
    }

    document.getElementById('recharge-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const amount = parseFloat(document.getElementById('amount').value);

      if (!amount || amount <= 0) {
        showError('请输入有效金额');
        return;
      }

      apiRequest('/business/recharge', 'POST', { amount })
        .then(data => {
          if (data.code === 0) {
            showSuccess('充值成功');
            loadBalance();
            document.getElementById('amount').value = '';
          } else {
            showError(data.message || '充值失败');
          }
        })
        .catch(err => {
          showError('充值失败');
          console.error(err);
        });
    });

    loadBalance();
  </script>
</body>
</html>
