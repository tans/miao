{{ define "user/profile.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container" style="max-width: 800px;">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">个人资料</h1>
        <p class="page-subtitle">管理您的账户信息</p>
      </div>

      <!-- 用户信息卡片 -->
      <div class="card mb-4 animate-fade-in-up">
        <div class="card-body">
          <div class="row">
            <div class="col-md-4 text-center mb-3 mb-md-0">
              <div class="mb-3" style="font-size: 5rem;" aria-hidden="true">👤</div>
              <div class="text-muted small">用户头像</div>
            </div>
            <div class="col-md-8">
              <div class="row g-3">
                <div class="col-sm-6">
                  <div class="text-muted small">用户名</div>
                  <div id="display-username" class="fw-medium">-</div>
                </div>
                <div class="col-sm-6">
                  <div class="text-muted small">手机号</div>
                  <div id="display-phone" class="fw-medium">-</div>
                </div>
                <div class="col-sm-6">
                  <div class="text-muted small">角色</div>
                  <div id="display-role" class="fw-medium">-</div>
                </div>
                <div class="col-sm-6">
                  <div class="text-muted small">注册时间</div>
                  <div id="display-created" class="fw-medium">-</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 编辑资料 -->
      <div class="card mb-4 animate-fade-in-up stagger-2">
        <div class="card-header">
          <h5 class="mb-0">编辑资料</h5>
        </div>
        <div class="card-body">
          <form id="profile-form">
            <div class="mb-4">
              <label class="form-label">昵称</label>
              <input type="text" class="form-control" id="nickname" placeholder="请输入昵称">
            </div>

            <div class="mb-4">
              <label class="form-label">邮箱</label>
              <input type="email" class="form-control" id="email" placeholder="请输入邮箱">
            </div>

            <div class="mb-4">
              <label class="form-label">个人简介</label>
              <textarea class="form-control" id="bio" rows="3" placeholder="介绍一下自己..."></textarea>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">保存修改</button>
              <a href="/user/password.html" class="btn btn-outline-secondary">修改密码</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    function loadProfile() {
      apiRequest('/user/profile', 'GET')
        .then(data => {
          if (data.code === 0 && data.data) {
            const user = data.data;
            document.getElementById('display-username').textContent = user.username || '-';
            document.getElementById('display-phone').textContent = user.phone || '-';
            document.getElementById('display-role').textContent = getRoleText(user.role);
            document.getElementById('display-created').textContent = user.created_at || '-';

            document.getElementById('nickname').value = user.nickname || '';
            document.getElementById('email').value = user.email || '';
            document.getElementById('bio').value = user.bio || '';
          }
        })
        .catch(err => console.error(err));
    }

    document.getElementById('profile-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const formData = {
        nickname: document.getElementById('nickname').value,
        email: document.getElementById('email').value,
        bio: document.getElementById('bio').value
      };

      apiRequest('/user/profile', 'PUT', formData)
        .then(data => {
          if (data.code === 0) {
            showToast('保存成功', 'success');
            loadProfile();
          } else {
            showToast(data.message || '保存失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('保存失败', 'danger');
        });
    });

    function getRoleText(role) {
      const texts = { 'business': '商家', 'creator': '创作者', 'admin': '管理员' };
      return texts[role] || role;
    }

    loadProfile();
  </script>
</body>
</html>
{{ end }}
