{{ define "profile.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; margin: 2rem 0; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container">
    <div class="content-area">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">个人资料</h4>
        <a href="/user/password.html" class="btn btn-outline-primary btn-sm">修改密码</a>
      </div>

      <!-- 用户信息卡片 -->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <div class="row align-items-center">
            <div class="col-md-3 text-center mb-3 mb-md-0">
              <img id="avatar-preview" src="/static/images/default-avatar.png" alt="头像" class="rounded-circle" style="width: 120px; height: 120px; object-fit: cover; border: 3px solid #dee2e6;">
              <div class="mt-2 small text-muted">头像</div>
            </div>
            <div class="col-md-9">
              <h5 id="display-nickname" class="mb-3">加载中...</h5>
              <div class="row g-3">
                <div class="col-sm-6">
                  <div class="text-muted small">用户名</div>
                  <div id="display-username" class="fw-medium">-</div>
                </div>
                <div class="col-sm-6">
                  <div class="text-muted small">手机号</div>
                  <div id="display-phone" class="fw-medium">-</div>
                </div>
                <div class="col-sm-6">
                  <div class="text-muted small">角色</div>
                  <div id="display-role" class="fw-medium">-</div>
                </div>
                <div class="col-sm-6">
                  <div class="text-muted small">注册时间</div>
                  <div id="display-created" class="fw-medium">-</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 编辑资料 -->
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h6 class="mb-0">编辑资料</h6>
        </div>
        <div class="card-body">
          <form id="profile-form">
            <div class="mb-3">
              <label for="nickname" class="form-label">昵称 <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="nickname" required maxlength="50">
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">手机号</label>
              <input type="tel" class="form-control" id="phone" pattern="^1[3-9]\d{9}$">
              <div class="form-text">请输入11位手机号</div>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-check-circle"></i> 保存修改
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      loadProfile();
    });

    function loadProfile() {
      showLoading('加载资料...');
      apiRequest('/user/profile', 'GET')
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            const user = data.data;
            document.getElementById('display-nickname').textContent = user.nickname || user.username;
            document.getElementById('display-username').textContent = user.username;
            document.getElementById('display-phone').textContent = user.phone || '未设置';
            document.getElementById('display-role').textContent = getRoleName(user.role);
            document.getElementById('display-created').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '-';

            document.getElementById('nickname').value = user.nickname || user.username;
            document.getElementById('phone').value = user.phone || '';

            if (user.avatar) {
              document.getElementById('avatar-preview').src = user.avatar;
            }
          } else {
            showError('加载失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error('加载失败:', err);
          showError('加载失败，请稍后重试');
        });
    }

    function getRoleName(role) {
      if (!role) return '-';
      const roles = role.split(',');
      const roleMap = {
        'business': '商家',
        'creator': '创作者',
        'admin': '管理员'
      };
      return roles.map(r => roleMap[r] || r).join('、');
    }

    document.getElementById('profile-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const nickname = document.getElementById('nickname').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!nickname) {
        showError('请输入昵称');
        return;
      }

      showLoading('保存中...');
      apiRequest('/user/profile', 'PUT', { nickname, phone })
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            showSuccess('资料保存成功');
            loadProfile();
          } else {
            showError('保存失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error('保存失败:', err);
          showError('保存失败，请稍后重试');
        });
    });
  </script>
</body>
</html>
{{ end }}
