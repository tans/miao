<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人资料 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold text-primary" href="/">创意喵</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/messages.html">消息</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="username">用户</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="/user/profile.html">个人资料</a></li>
              <li><a class="dropdown-item" href="/user/password.html">修改密码</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#" onclick="logout()">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>个人资料</h2>
          <a href="/user/password.html" class="btn btn-outline-primary">修改密码</a>
        </div>

        <div class="card shadow-sm mb-4">
          <div class="card-body">
            <div class="row align-items-center">
              <div class="col-md-3 text-center mb-3 mb-md-0">
                <img id="avatar-preview" src="/static/images/default-avatar.png" alt="头像" class="rounded-circle" style="width: 120px; height: 120px; object-fit: cover; border: 3px solid #dee2e6;">
                <div class="mt-2 small text-muted">头像</div>
              </div>
              <div class="col-md-9">
                <h4 id="display-nickname" class="mb-3">加载中...</h4>
                <div class="row g-3">
                  <div class="col-sm-6">
                    <div class="text-muted small">用户名</div>
                    <div id="display-username" class="fw-medium">-</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="text-muted small">手机号</div>
                    <div id="display-phone" class="fw-medium">-</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="text-muted small">角色</div>
                    <div id="display-role" class="fw-medium">-</div>
                  </div>
                  <div class="col-sm-6">
                    <div class="text-muted small">注册时间</div>
                    <div id="display-created" class="fw-medium">-</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0">编辑资料</h5>
          </div>
          <div class="card-body">
            <form id="profile-form">
              <div class="mb-3">
                <label for="nickname" class="form-label">昵称</label>
                <input type="text" class="form-control" id="nickname" required maxlength="50">
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">手机号</label>
                <input type="tel" class="form-control" id="phone" pattern="^1[3-9]\d{9}$">
              </div>
              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="submit" class="btn btn-primary px-4">保存修改</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script>
    if (!requireAuth()) {
      // 已重定向
    } else {
      const user = getUser();
      if (user && user.username) {
        document.getElementById('username').textContent = user.username;
      }
      loadProfile();
    }

    function loadProfile() {
      showLoading('加载资料...');
      apiRequest('/api/v1/user/profile', 'GET', null, false)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            const user = data.data;
            document.getElementById('display-nickname').textContent = user.nickname || user.username;
            document.getElementById('display-username').textContent = user.username;
            document.getElementById('display-phone').textContent = user.phone || '未设置';
            document.getElementById('display-role').textContent = getRoleName(user.role);
            document.getElementById('display-created').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('zh-CN') : '-';

            document.getElementById('nickname').value = user.nickname || user.username;
            document.getElementById('phone').value = user.phone || '';

            if (user.avatar) {
              document.getElementById('avatar-preview').src = user.avatar;
            }
          } else {
            alert('加载失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error('加载失败:', err);
          alert('加载失败，请稍后重试');
        });
    }

    function getRoleName(role) {
      const roleMap = {
        'business': '商家',
        'creator': '创作者',
        'admin': '管理员'
      };
      return roleMap[role] || role;
    }

    document.getElementById('profile-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const nickname = document.getElementById('nickname').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!nickname) {
        alert('请输入昵称');
        return;
      }

      showLoading('保存中...');
      apiRequest('/api/v1/user/profile', 'PUT', { nickname, phone }, false)
        .then(data => {
          hideLoading();
          if (data.code === 0) {
            alert('资料保存成功');
            loadProfile();
          } else {
            alert('保存失败: ' + (data.message || '未知错误'));
          }
        })
        .catch(err => {
          hideLoading();
          console.error('保存失败:', err);
          alert('保存失败，请稍后重试');
        });
    });

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/auth/login.html';
    }
  </script>
</body>
</html>
