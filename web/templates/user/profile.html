
{{ define "title" }}个人中心 - 创意喵{{ end }}

{{ define "content" }}
<div class="row">
  <div class="col-lg-8 mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>个人中心</h2>
      <a href="/user/password.html" class="btn btn-outline-primary">修改密码</a>
    </div>

    <!-- 个人资料卡片 -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="row align-items-center">
          <div class="col-md-3 text-center mb-3 mb-md-0">
            <div class="position-relative d-inline-block">
              <img id="avatar-preview" src="/static/images/default-avatar.png" alt="头像" class="rounded-circle" style="width: 120px; height: 120px; object-fit: cover; cursor: pointer; border: 3px solid #dee2e6;">
              <input type="file" id="avatar-input" accept="image/*" class="d-none">
              <div class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer;" id="avatar-upload-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                  <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
                </svg>
              </div>
            </div>
            <div class="mt-2 small text-muted">点击头像上传</div>
          </div>
          <div class="col-md-9">
            <h4 id="display-nickname" class="mb-3">加载中...</h4>
            <div class="row g-3">
              <div class="col-sm-6">
                <div class="text-muted small">用户名</div>
                <div id="display-username" class="fw-medium">-</div>
              </div>
              <div class="col-sm-6">
                <div class="text-muted small">手机号</div>
                <div id="display-phone" class="fw-medium">-</div>
              </div>
              <div class="col-sm-6">
                <div class="text-muted small">角色</div>
                <div id="display-role" class="fw-medium">-</div>
              </div>
              <div class="col-sm-6">
                <div class="text-muted small">注册时间</div>
                <div id="display-created" class="fw-medium">-</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 编辑资料表单 -->
    <div class="card">
      <div class="card-header bg-white">
        <h5 class="mb-0">编辑资料</h5>
      </div>
      <div class="card-body">
        <form id="profile-form">
          <div class="mb-3">
            <label for="nickname" class="form-label">昵称</label>
            <input type="text" class="form-control" id="nickname" name="nickname" required maxlength="50">
            <div class="invalid-feedback">请输入昵称（最多50个字符）</div>
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">手机号</label>
            <input type="tel" class="form-control" id="phone" name="phone" pattern="^1[3-9]\d{9}$">
            <div class="invalid-feedback">请输入有效的手机号</div>
          </div>
          <div class="d-grid gap-2 d-md-flex justify-content-md-end">
            <button type="submit" class="btn btn-primary px-4">保存修改</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script src="/static/js/validation.js"></script>
<script>
const API_BASE = '/api/v1';

// 获取用户信息
async function loadProfile() {
  try {
    showLoading('加载中...');
    const token = localStorage.getItem('token');
    const response = await fetch(`${API_BASE}/user/profile`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (!response.ok) throw new Error('获取用户信息失败');

    const result = await response.json();
    if (result.code !== 0) throw new Error(result.message);

    const user = result.data;

    // 显示用户信息
    document.getElementById('display-nickname').textContent = user.nickname || user.username;
    document.getElementById('display-username').textContent = user.username;
    document.getElementById('display-phone').textContent = user.phone || '未设置';
    document.getElementById('display-role').textContent = getRoleName(user.role);
    document.getElementById('display-created').textContent = new Date(user.created_at).toLocaleDateString();

    // 填充表单
    document.getElementById('nickname').value = user.nickname || user.username;
    document.getElementById('phone').value = user.phone || '';

    // 显示头像
    if (user.avatar) {
      document.getElementById('avatar-preview').src = user.avatar;
    }

    hideLoading();
  } catch (error) {
    hideLoading();
    showError(error.message);
  }
}

function getRoleName(role) {
  const roleMap = {
    'business': '商家',
    'creator': '创作者',
    'admin': '管理员'
  };
  return roleMap[role] || role;
}

// 头像上传
document.getElementById('avatar-preview').addEventListener('click', () => {
  document.getElementById('avatar-input').click();
});

document.getElementById('avatar-upload-btn').addEventListener('click', () => {
  document.getElementById('avatar-input').click();
});

document.getElementById('avatar-input').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  // 验证文件类型
  if (!file.type.startsWith('image/')) {
    showError('请选择图片文件');
    return;
  }

  // 验证文件大小（最大2MB）
  if (file.size > 2 * 1024 * 1024) {
    showError('图片大小不能超过2MB');
    return;
  }

  try {
    showLoading('上传中...');

    const formData = new FormData();
    formData.append('file', file);

    const token = localStorage.getItem('token');
    const response = await fetch(`${API_BASE}/upload/avatar`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData
    });

    if (!response.ok) throw new Error('上传失败');

    const result = await response.json();
    if (result.code !== 0) throw new Error(result.message);

    // 更新头像显示
    document.getElementById('avatar-preview').src = result.data.url;
    showSuccess('头像上传成功');
    hideLoading();
  } catch (error) {
    hideLoading();
    showError(error.message);
  }
});

// 保存资料
document.getElementById('profile-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const form = e.target;
  if (!form.checkValidity()) {
    form.classList.add('was-validated');
    return;
  }

  const nickname = document.getElementById('nickname').value.trim();
  const phone = document.getElementById('phone').value.trim();

  try {
    showLoading('保存中...');

    const token = localStorage.getItem('token');
    const response = await fetch(`${API_BASE}/user/profile`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ nickname, phone })
    });

    if (!response.ok) throw new Error('保存失败');

    const result = await response.json();
    if (result.code !== 0) throw new Error(result.message);

    showSuccess('资料保存成功');
    hideLoading();

    // 重新加载资料
    setTimeout(() => loadProfile(), 1000);
  } catch (error) {
    hideLoading();
    showError(error.message);
  }
});

// 页面加载时获取用户信息
document.addEventListener('DOMContentLoaded', loadProfile);
</script>
{{ end }}
