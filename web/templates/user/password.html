{{ define "password.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - 创意喵</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/custom.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .content-area { background-color: white; border-radius: 8px; padding: 2rem; max-width: 600px; margin: 2rem auto; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <div class="container mt-4">
    <div class="content-area">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">修改密码</h4>
        <a href="/user/profile.html" class="btn btn-outline-secondary btn-sm">返回个人中心</a>
      </div>

      <form id="password-form">
        <div class="mb-3">
          <label for="old-password" class="form-label">当前密码 <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="old-password" required minlength="6">
        </div>

        <div class="mb-3">
          <label for="new-password" class="form-label">新密码 <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="new-password" required minlength="6" maxlength="50">
          <div class="form-text">密码长度至少6个字符</div>
        </div>

        <div class="mb-3">
          <label for="confirm-password" class="form-label">确认新密码 <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="confirm-password" required minlength="6">
          <div class="invalid-feedback">两次密码输入不一致</div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-circle"></i> 确认修改
          </button>
        </div>
      </form>

      <div class="alert alert-info mt-4 mb-0">
        <h6 class="alert-heading">🔒 密码安全提示</h6>
        <ul class="mb-0 small">
          <li>密码长度至少6个字符</li>
          <li>建议使用字母、数字和符号的组合</li>
          <li>不要使用过于简单的密码</li>
          <li>定期更换密码以保证账户安全</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/components.js"></script>
  <script src="/static/js/role-switcher.js"></script>
  <script src="/static/js/navbar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 密码验证
      document.getElementById('confirm-password').addEventListener('input', function() {
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = this.value;

        if (confirmPassword && newPassword !== confirmPassword) {
          this.setCustomValidity('两次密码输入不一致');
          this.classList.add('is-invalid');
        } else {
          this.setCustomValidity('');
          this.classList.remove('is-invalid');
        }
      });

      document.getElementById('new-password').addEventListener('input', function() {
        const confirmPassword = document.getElementById('confirm-password');
        if (confirmPassword.value) {
          confirmPassword.dispatchEvent(new Event('input'));
        }
      });

      // 提交表单
      document.getElementById('password-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const oldPassword = document.getElementById('old-password').value;
        const newPassword = document.getElementById('new-password').value;
        const confirmPassword = document.getElementById('confirm-password').value;

        if (newPassword !== confirmPassword) {
          document.getElementById('confirm-password').classList.add('is-invalid');
          showError('两次密码输入不一致');
          return;
        }

        if (!this.checkValidity()) {
          this.classList.add('was-validated');
          return;
        }

        showLoading('修改中...');

        apiRequest('/user/password', 'PUT', {
          old_password: oldPassword,
          new_password: newPassword
        })
          .then(data => {
            hideLoading();
            if (data.code === 0) {
              showSuccess('密码修改成功，请重新登录');
              setTimeout(() => {
                localStorage.clear();
                window.location.href = '/auth/login.html';
              }, 2000);
            } else {
              showError(data.message || '修改失败');
            }
          })
          .catch(err => {
            hideLoading();
            showError('修改失败');
            console.error(err);
          });
      });
    });
  </script>
</body>
</html>
{{ end }}
