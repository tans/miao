{{ define "title" }}修改密码 - 创意喵{{ end }}

{{ define "content" }}
<div class="row">
  <div class="col-lg-6 mx-auto">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>修改密码</h2>
      <a href="/user/profile.html" class="btn btn-outline-secondary">返回个人中心</a>
    </div>

    <div class="card">
      <div class="card-body">
        <form id="password-form">
          <div class="mb-3">
            <label for="old-password" class="form-label">当前密码</label>
            <input type="password" class="form-control" id="old-password" name="old_password" required minlength="6">
            <div class="invalid-feedback">请输入当前密码</div>
          </div>

          <div class="mb-3">
            <label for="new-password" class="form-label">新密码</label>
            <input type="password" class="form-control" id="new-password" name="new_password" required minlength="6" maxlength="50">
            <div class="form-text">密码长度至少6个字符</div>
            <div class="invalid-feedback">密码长度至少6个字符</div>
          </div>

          <div class="mb-3">
            <label for="confirm-password" class="form-label">确认新密码</label>
            <input type="password" class="form-control" id="confirm-password" name="confirm_password" required minlength="6">
            <div class="invalid-feedback">两次密码输入不一致</div>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary">确认修改</button>
          </div>
        </form>
      </div>
    </div>

    <div class="alert alert-info mt-3">
      <h6 class="alert-heading">密码安全提示</h6>
      <ul class="mb-0 small">
        <li>密码长度至少6个字符</li>
        <li>建议使用字母、数字和符号的组合</li>
        <li>不要使用过于简单的密码</li>
        <li>定期更换密码以保证账户安全</li>
      </ul>
    </div>
  </div>
</div>
{{ end }}

{{ define "extra_js" }}
<script src="/static/js/validation.js"></script>
<script>
const API_BASE = '/api/v1';

// 密码验证
document.getElementById('confirm-password').addEventListener('input', function() {
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = this.value;

  if (confirmPassword && newPassword !== confirmPassword) {
    this.setCustomValidity('两次密码输入不一致');
    this.classList.add('is-invalid');
  } else {
    this.setCustomValidity('');
    this.classList.remove('is-invalid');
  }
});

document.getElementById('new-password').addEventListener('input', function() {
  const confirmPassword = document.getElementById('confirm-password');
  if (confirmPassword.value) {
    confirmPassword.dispatchEvent(new Event('input'));
  }
});

// 提交表单
document.getElementById('password-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const form = e.target;
  const newPassword = document.getElementById('new-password').value;
  const confirmPassword = document.getElementById('confirm-password').value;

  // 验证两次密码是否一致
  if (newPassword !== confirmPassword) {
    document.getElementById('confirm-password').classList.add('is-invalid');
    showError('两次密码输入不一致');
    return;
  }

  if (!form.checkValidity()) {
    form.classList.add('was-validated');
    return;
  }

  const oldPassword = document.getElementById('old-password').value;

  try {
    showLoading('修改中...');

    const token = localStorage.getItem('token');
    const response = await fetch(`${API_BASE}/user/password`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        old_password: oldPassword,
        new_password: newPassword
      })
    });

    if (!response.ok) throw new Error('修改失败');

    const result = await response.json();
    if (result.code !== 0) throw new Error(result.message);

    hideLoading();
    showSuccess('密码修改成功，请重新登录');

    // 清除登录信息，跳转到登录页
    setTimeout(() => {
      localStorage.clear();
      window.location.href = '/auth/login.html';
    }, 2000);
  } catch (error) {
    hideLoading();
    showError(error.message);
  }
});
</script>
{{ end }}

{{ template "layout.html" . }}
