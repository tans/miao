{{ define "user/password.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - 创意喵</title>
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"></noscript>
  <link rel="preload" as="style" href="/static/css/custom.css">
<link rel="stylesheet" href="/static/css/custom.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/custom.css" rel="stylesheet"></noscript>
<link rel="preload" as="style" href="/static/css/ui-enhancements.css">
<link rel="stylesheet" href="/static/css/ui-enhancements.css" media="print" onload="this.media='all'">
<noscript><link href="/static/css/ui-enhancements.css" rel="stylesheet"></noscript>
  <link rel="icon" href="/static/images/favicon.svg" type="image/svg+xml">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="page-shell">
    <div class="container" style="max-width: 600px;">
      <div class="page-hero text-center mb-5">
        <h1 class="page-title">修改密码</h1>
        <p class="page-subtitle">保护您的账户安全</p>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <form id="password-form">
            <div class="mb-4">
              <label class="form-label fw-medium">当前密码 <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="old-password" required minlength="6">
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">新密码 <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="new-password" required minlength="6" maxlength="50">
              <div class="form-text">密码长度至少6个字符</div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">确认新密码 <span class="text-danger">*</span></label>
              <input type="password" class="form-control" id="confirm-password" required minlength="6">
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">确认修改</button>
              <a href="/user/profile.html" class="btn btn-outline-secondary">返回个人中心</a>
            </div>
          </form>
        </div>
      </div>

      <div class="alert alert-info">
        <strong>🔒 密码安全提示</strong>
        <ul class="mb-0 small mt-2">
          <li>密码长度至少6个字符</li>
          <li>建议使用字母、数字和符号的组合</li>
          <li>不要使用过于简单的密码</li>
          <li>定期更换密码以保证账户安全</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>

  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script defer src="/static/js/components.js"></script>
  <script defer src="/static/js/navbar.js"></script>
  <script defer src="/static/js/role-switcher.js"></script>
  <script>
    requireAuth();

    document.getElementById('password-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const oldPassword = document.getElementById('old-password').value;
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        showToast('两次密码输入不一致', 'warning');
        return;
      }

      if (newPassword.length < 6) {
        showToast('密码长度至少6个字符', 'warning');
        return;
      }

      apiRequest('/user/password', 'PUT', {
        old_password: oldPassword,
        new_password: newPassword
      })
        .then(data => {
          if (data.code === 0) {
            showToast('密码修改成功，请重新登录', 'success');
            setTimeout(() => {
              logout();
            }, 1500);
          } else {
            showToast(data.message || '修改失败', 'danger');
          }
        })
        .catch(err => {
          console.error(err);
          showToast('修改失败', 'danger');
        });
    });
  </script>
</body>
</html>
{{ end }}
